<!-- ═══════════════════════════════════════════ -->
<!--  PILLAR 1 — THEORY                         -->
<!-- ═══════════════════════════════════════════ -->
<section data-pillar="theory">

  <div data-block="definition">
    <p data-az="<strong>Perimetr</strong> — düzxətli fiqurun bütün tərəflərinin uzunluqlarının cəmidir. P hərfi ilə işarə olunur."
       data-ru="<strong>Периметр</strong> — это сумма длин всех сторон многоугольника. Обозначается буквой P."
       data-en="<strong>Perimeter</strong> is the sum of the lengths of all sides of a polygon. Denoted by P."></p>
  </div>

  <!-- SVG: Square perimeter -->
  <div data-block="svg">
    <svg viewBox="0 0 420 160" aria-label="Kvadrat perimetri: P = 4 × a, a=5 sm, P=20 sm" style="width:100%;max-width:420px">
      <!-- Square -->
      <rect x="30" y="30" width="120" height="120" fill="#ede9fe" stroke="#6366f1" stroke-width="2.5"/>
      <!-- Side labels -->
      <text x="90" y="22" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="700">a = 5 sm</text>
      <text x="90" y="165" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="700">a = 5 sm</text>
      <text x="18" y="95" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="700">a</text>
      <text x="165" y="95" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="700">a</text>
      <!-- Formula box -->
      <rect x="195" y="40" width="210" height="90" rx="10" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="300" y="65" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">Kvadrat Perimetri</text>
      <text x="300" y="88" text-anchor="middle" font-size="16" fill="#6366f1" font-weight="900">P = 4 × a</text>
      <text x="300" y="108" text-anchor="middle" font-size="12" fill="#065f46">P = 4 × 5 = 20 sm</text>
    </svg>
  </div>

  <!-- SVG: Rectangle perimeter -->
  <div data-block="svg">
    <svg viewBox="0 0 420 145" aria-label="Düzbucaqlı perimetri: P = 2×(a+b), a=7 b=4" style="width:100%;max-width:420px">
      <rect x="30" y="30" width="160" height="90" fill="#d1fae5" stroke="#16a34a" stroke-width="2.5"/>
      <text x="110" y="22" text-anchor="middle" font-size="13" fill="#16a34a" font-weight="700">a = 7 sm</text>
      <text x="110" y="138" text-anchor="middle" font-size="13" fill="#16a34a" font-weight="700">a = 7 sm</text>
      <text x="16" y="78" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">b=4</text>
      <text x="202" y="78" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">b=4</text>
      <rect x="215" y="30" width="190" height="90" rx="10" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="310" y="55" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">Düzbucaqlı Perimetri</text>
      <text x="310" y="78" text-anchor="middle" font-size="15" fill="#16a34a" font-weight="900">P = 2 × (a + b)</text>
      <text x="310" y="100" text-anchor="middle" font-size="12" fill="#065f46">P = 2×(7+4) = 22 sm</text>
    </svg>
  </div>

  <div data-block="rule" data-title-az="Perimetr Düsturları" data-title-ru="Формулы периметра" data-title-en="Perimeter Formulas">
    <ul>
      <li data-az="<strong>Kvadrat:</strong> P = 4 × a"
          data-ru="<strong>Квадрат:</strong> P = 4 × a"
          data-en="<strong>Square:</strong> P = 4 × a"></li>
      <li data-az="<strong>Düzbucaqlı:</strong> P = 2 × (a + b)"
          data-ru="<strong>Прямоугольник:</strong> P = 2 × (a + b)"
          data-en="<strong>Rectangle:</strong> P = 2 × (a + b)"></li>
      <li data-az="<strong>Üçbucaq:</strong> P = a + b + c"
          data-ru="<strong>Треугольник:</strong> P = a + b + c"
          data-en="<strong>Triangle:</strong> P = a + b + c"></li>
      <li data-az="<strong>Düzgün çoxbucaqlı (n tərəf):</strong> P = n × a"
          data-ru="<strong>Правильный многоугольник (n сторон):</strong> P = n × a"
          data-en="<strong>Regular polygon (n sides):</strong> P = n × a"></li>
    </ul>
  </div>

  <!-- SVG: Triangle perimeter -->
  <div data-block="svg">
    <svg viewBox="0 0 420 150" aria-label="Üçbucaq perimetri a=5 b=7 c=6 P=18" style="width:100%;max-width:420px">

      <!-- Side labels -->
      <text x="120" y="90" font-size="12" fill="#dc2626" font-weight="700">a=5</text>
      <text x="255" y="90" font-size="12" fill="#dc2626" font-weight="700">b=7</text>
      <text x="178" y="148" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="700">c=6</text>
      <!-- Vertices -->

      <text x="68" y="142" text-anchor="middle" font-size="11" fill="#991b1b">B</text>
      <text x="298" y="142" text-anchor="middle" font-size="11" fill="#991b1b">C</text>
      <!-- Formula -->
      <rect x="305" y="40" width="105" height="60" rx="8" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="357" y="63" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">P = a+b+c</text>
      <text x="357" y="83" text-anchor="middle" font-size="12" fill="#065f46" font-weight="700">= 18 sm</text>
    </svg>
  </div>

  <div data-block="note">
    <p data-az="Perimetr həmişə uzunluq vahidi ilə (sm, m, km) ifadə olunur. Bütün tərəfləri <em>eyni vahidə</em> çevirdikdən sonra topla."
       data-ru="Периметр всегда выражается в единицах длины (см, м, км). Переведи все стороны в <em>одну единицу</em>, потом складывай."
       data-en="Perimeter is always in length units (cm, m, km). Convert all sides to the <em>same unit</em> before adding."></p>
  </div>

  <!-- Worked examples -->
  <div data-block="example"
       data-az="Misal 1: Kvadratın tərəfi 8 sm-dir. Perimetri tapın."
       data-ru="Пример 1: Сторона квадрата 8 см. Найдите периметр."
       data-en="Example 1: Square side 8 cm. Find the perimeter.">
    <div data-step data-az="P = 4 × a = 4 × 8 = 32 sm"
                   data-ru="P = 4 × a = 4 × 8 = 32 см"
                   data-en="P = 4 × a = 4 × 8 = 32 cm"></div>
    <div data-answer data-az="Cavab: P = 32 sm" data-ru="Ответ: P = 32 см" data-en="Answer: P = 32 cm"></div>
  </div>

  <div data-block="example"

       data-ru="Пример 2: Прямоугольник: длина 12 см, ширина 7 см. Найдите периметр."
       data-en="Example 2: Rectangle: length 12 cm, width 7 cm. Find the perimeter.">
    <div data-step data-az="P = 2 × (a + b) = 2 × (12 + 7)"
                   data-ru="P = 2 × (a + b) = 2 × (12 + 7)"
                   data-en="P = 2 × (a + b) = 2 × (12 + 7)"></div>
    <div data-step data-az="= 2 × 19 = 38 sm"
                   data-ru="= 2 × 19 = 38 см"
                   data-en="= 2 × 19 = 38 cm"></div>
    <div data-answer data-az="Cavab: P = 38 sm" data-ru="Ответ: P = 38 см" data-en="Answer: P = 38 cm"></div>
  </div>

  <div data-block="example"
       data-az="Misal 3: Üçbucağın tərəfləri 5 m, 8 m, 6 m. Perimetri tapın."
       data-ru="Пример 3: Стороны треугольника 5 м, 8 м, 6 м. Найдите периметр."
       data-en="Example 3: Triangle sides 5 m, 8 m, 6 m. Find the perimeter.">
    <div data-step data-az="P = a + b + c = 5 + 8 + 6 = 19 m"
                   data-ru="P = a + b + c = 5 + 8 + 6 = 19 м"
                   data-en="P = a + b + c = 5 + 8 + 6 = 19 m"></div>
    <div data-answer data-az="Cavab: P = 19 m" data-ru="Ответ: P = 19 м" data-en="Answer: P = 19 m"></div>
  </div>

  <div data-block="example"
       data-az="Misal 4: Düzbucaqlının perimetri 36 sm, uzunluğu 11 sm-dir. Eni tapın."
       data-ru="Пример 4: Периметр прямоугольника 36 см, длина 11 см. Найдите ширину."
       data-en="Example 4: Rectangle perimeter 36 cm, length 11 cm. Find the width.">
    <div data-step data-az="P = 2 × (a + b) → 36 = 2 × (11 + b)"
                   data-ru="P = 2×(a+b) → 36 = 2×(11+b)"
                   data-en="P = 2×(a+b) → 36 = 2×(11+b)"></div>
    <div data-step data-az="11 + b = 18 → b = 7 sm"
                   data-ru="11 + b = 18 → b = 7 см"
                   data-en="11 + b = 18 → b = 7 cm"></div>
    <div data-answer data-az="Cavab: en = 7 sm" data-ru="Ответ: ширина = 7 см" data-en="Answer: width = 7 cm"></div>
  </div>

  <div data-block="example"
       data-az="Misal 5: Düzgün beşbucaqlının tərəfi 6 sm. Perimetri tapın."
       data-ru="Пример 5: Сторона правильного пятиугольника 6 см. Найдите периметр."
       data-en="Example 5: Regular pentagon side 6 cm. Find the perimeter.">
    <div data-step data-az="P = n × a = 5 × 6 = 30 sm"
                   data-ru="P = n × a = 5 × 6 = 30 см"
                   data-en="P = n × a = 5 × 6 = 30 cm"></div>
    <div data-answer data-az="Cavab: P = 30 sm" data-ru="Ответ: P = 30 см" data-en="Answer: P = 30 cm"></div>
  </div>

</section>

<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
let currentShape = 'square';

function setShape(s) {
  currentShape = s;
  const map = {square:'inpSquare',rect:'inpRect',tri:'inpTri',poly:'inpPoly'};
  const btnMap = {square:'btnSq',rect:'btnRe',tri:'btnTr',poly:'btnPo'};
  Object.keys(map).forEach(k => {
    document.getElementById(map[k]).style.display = (k===s)?'block':'none';
    const btn = document.getElementById(btnMap[k]);
    if (k===s) { btn.style.background='#6366f1'; btn.style.color='#fff'; btn.style.borderColor='#6366f1'; }
    else { btn.style.background='var(--surface-2)'; btn.style.color='var(--text)'; btn.style.borderColor='var(--border)'; }
  });
  runSim();
}

function fmt(n) { return Number.isInteger(n) ? n : parseFloat(n.toFixed(4)); }

function squareSVG(a, P) {
  const side = 100;
  return `<svg viewBox="0 0 240 160" style="width:200px">
    <rect x="60" y="30" width="${side}" height="${side}" fill="#ede9fe" stroke="#6366f1" stroke-width="2"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="700">a=${fmt(a)}</text>
    <text x="110" y="148" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="700">a=${fmt(a)}</text>
    <text x="48" y="83" text-anchor="middle" font-size="11" fill="#6366f1">a</text>
    <text x="173" y="83" text-anchor="middle" font-size="11" fill="#6366f1">a</text>
    <text x="110" y="175" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">P = ${fmt(P)}</text>
  </svg>`;
}

function rectSVG(a, b, P) {
  const W = 130, H = 80;
  return `<svg viewBox="0 0 260 155" style="width:220px">
    <rect x="50" y="30" width="${W}" height="${H}" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
    <text x="115" y="22" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">a=${fmt(a)}</text>
    <text x="115" y="125" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">a=${fmt(a)}</text>
    <text x="36" y="73" text-anchor="middle" font-size="11" fill="#16a34a">b=${fmt(b)}</text>
    <text x="192" y="73" text-anchor="middle" font-size="11" fill="#16a34a">b=${fmt(b)}</text>
    <text x="115" y="148" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">P = ${fmt(P)}</text>
  </svg>`;
}

function triSVG(a, b, c, P) {
  return `<svg viewBox="0 0 240 155" style="width:200px">
    <polygon points="120,25 30,130 210,130" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="65" y="90" font-size="10" fill="#dc2626" font-weight="700">a=${fmt(a)}</text>
    <text x="165" y="90" font-size="10" fill="#dc2626" font-weight="700">b=${fmt(b)}</text>
    <text x="120" y="148" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">c=${fmt(c)}</text>
    <text x="120" y="165" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">P = ${fmt(P)}</text>
  </svg>`;
}

function polySVG(n, a, P) {
  const cx=110, cy=75, r=65;
  let pts='';
  for(let i=0;i<n;i++){
    const ang=(2*Math.PI*i/n) - Math.PI/2;
    pts += `${cx+r*Math.cos(ang)},${cy+r*Math.sin(ang)} `;
  }
  return `<svg viewBox="0 0 220 165" style="width:190px">
    <polygon points="${pts.trim()}" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="110" y="155" text-anchor="middle" font-size="11" fill="#d97706" font-weight="700">${n}-bucaqlı, a=${fmt(a)}</text>
    <text x="110" y="170" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">P = ${fmt(P)}</text>
  </svg>`;
}

function runSim() {
  const out = document.getElementById('simOut');
  const svgDiv = document.getElementById('simSVG');
  if (currentShape === 'square') {
    const a = parseFloat(document.getElementById('sqA').value)||0;
    if (!a) { out.innerHTML='<span style="color:var(--muted)">Tərəf uzunluğunu daxil edin...</span>'; svgDiv.innerHTML=''; return; }
    const P = 4*a;
    out.innerHTML=`<div style="display:grid;gap:6px">
      <div>🔢 <strong>Düstur:</strong> P = 4 × a = 4 × ${fmt(a)}</div>
      <div>📐 <strong>Perimetr:</strong> <span style="color:#16a34a;font-weight:700;font-size:18px">${fmt(P)}</span></div>
    </div>`;
    svgDiv.innerHTML=squareSVG(a,P);
  } else if (currentShape === 'rect') {
    const a=parseFloat(document.getElementById('reA').value)||0;
    const b=parseFloat(document.getElementById('reB').value)||0;
    if(!a||!b){out.innerHTML='<span style="color:var(--muted)">Ölçüləri daxil edin...</span>';svgDiv.innerHTML='';return;}
    const P=2*(a+b);
    out.innerHTML=`<div style="display:grid;gap:6px">
      <div>🔢 <strong>Düstur:</strong> P = 2×(a+b) = 2×(${fmt(a)}+${fmt(b)}) = 2×${fmt(a+b)}</div>
      <div>📐 <strong>Perimetr:</strong> <span style="color:#16a34a;font-weight:700;font-size:18px">${fmt(P)}</span></div>
    </div>`;
    svgDiv.innerHTML=rectSVG(a,b,P);
  } else if (currentShape === 'tri') {
    const a=parseFloat(document.getElementById('trA').value)||0;
    const b=parseFloat(document.getElementById('trB').value)||0;

      <div>📐 <strong>Perimetr:</strong> <span style="color:#16a34a;font-weight:700;font-size:18px">${fmt(P)}</span></div>
    </div>`;

  } else {
    const n=parseInt(document.getElementById('poN').value)||0;
    const a=parseFloat(document.getElementById('poA').value)||0;
    if(n<3||!a){out.innerHTML='<span style="color:var(--muted)">Tərəf sayı ≥ 3 olmalıdır...</span>';svgDiv.innerHTML='';return;}
    const P=n*a;

      <div>📐 <strong>Perimetr:</strong> <span style="color:#16a34a;font-weight:700;font-size:18px">${fmt(P)}</span></div>
    </div>`;
    svgDiv.innerHTML=polySVG(n,a,P);
  }
}

</script>
