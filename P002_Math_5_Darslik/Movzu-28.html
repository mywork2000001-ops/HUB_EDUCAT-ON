<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
function quadrant(x, y) {
  if (x === 0 && y === 0) return 'Başlanğıc nöqtəsi O(0,0)';
  if (x === 0) return `Oy oxu üzərindədir (rübə aid deyil)`;
  if (y === 0) return `Ox oxu üzərindədir (rübə aid deyil)`;
  if (x > 0 && y > 0) return 'I rüb (+, +)';
  if (x < 0 && y > 0) return 'II rüb (−, +)';
  if (x < 0 && y < 0) return 'III rüb (−, −)';
  return 'IV rüb (+, −)';
}

function planeSVG(px, py) {
  const W=280, H=280, cx=140, cy=140, step=22;
  const sx = cx + px*step, sy = cy - py*step;
  // grid
  let gridLines='';
  for(let i=-6;i<=6;i++){
    gridLines+=`<line x1="${cx+i*step}" y1="10" x2="${cx+i*step}" y2="${H-10}" stroke="#e5e7eb" stroke-width="0.5"/>`;
    gridLines+=`<line x1="10" y1="${cy+i*step}" x2="${W-10}" y2="${cy+i*step}" stroke="#e5e7eb" stroke-width="0.5"/>`;
  }
  // tick numbers x-axis
  let ticks='';
  for(let i=-5;i<=5;i++){
    if(i===0) continue;
    ticks+=`<text x="${cx+i*step}" y="${cy+14}" text-anchor="middle" font-size="8" fill="#9ca3af">${i}</text>`;
    ticks+=`<text x="${cx-10}" y="${cy-i*step+3}" text-anchor="end" font-size="8" fill="#9ca3af">${i}</text>`;
  }
  // dashed projection lines
  const projLines = (sx!==cx||sy!==cy) ? `
    <line x1="${sx}" y1="${cy}" x2="${sx}" y2="${sy}" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <line x1="${cx}" y1="${sy}" x2="${sx}" y2="${sy}" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  ` : '';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:280px">
    ${gridLines}
    <line x1="10" y1="${cy}" x2="${W-10}" y2="${cy}" stroke="#374151" stroke-width="1.5" marker-end="url(#aArr)"/>
    <line x1="${cx}" y1="${H-10}" x2="${cx}" y2="10" stroke="#374151" stroke-width="1.5" marker-end="url(#aArr)"/>
    <defs><marker id="aArr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0L7,3.5L0,7Z" fill="#374151"/></marker></defs>
    <text x="${W-12}" y="${cy-4}" font-size="11" fill="#374151" font-weight="700">x</text>
    <text x="${cx+4}" y="14" font-size="11" fill="#374151" font-weight="700">y</text>
    <text x="${cx-10}" y="${cy+12}" font-size="9" fill="#374151">O</text>
    ${ticks}
    ${projLines}
    <circle cx="${sx}" cy="${sy}" r="6" fill="#6366f1" stroke="#fff" stroke-width="2"/>
    <text x="${sx+8}" y="${sy-6}" font-size="10" fill="#6366f1" font-weight="700">(${px},${py})</text>
  </svg>`;
}

function runSim() {
  const x = parseInt(document.getElementById('simX').value)||0;
  const y = parseInt(document.getElementById('simY').value)||0;
  const q = quadrant(x, y);
  const col = x>0&&y>0?'#6366f1':x<0&&y>0?'#dc2626':x<0&&y<0?'#16a34a':'#d97706';
  document.getElementById('simOut').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:22px;font-weight:900;color:${col}">(${x}, ${y})</div>
      <div>
        <div style="font-size:12px;color:var(--muted)">Absis: <strong>${x}</strong> &nbsp; Ordinat: <strong>${y}</strong></div>
        <div style="font-size:13px;font-weight:700;color:${col};margin-top:2px">${q}</div>
      </div>
    </div>`;
  document.getElementById('simSVG').innerHTML=planeSVG(x, y);
}

window.initSim = function() { runSim(); };
</script>
