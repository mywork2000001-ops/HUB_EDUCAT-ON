<!-- ═══════════════════════════════════════════ -->
<!--  PILLAR 1 — THEORY                         -->
<!-- ═══════════════════════════════════════════ -->
<section data-pillar="theory">

  <div data-block="definition">
    <p data-az="<strong>Sahə</strong> — düzxətli fiqurun tutduğu səthin ölçüsüdür. Sahə sm², m², km² kimi kvadrat vahidlərlə ifadə olunur. <em>S</em> hərfi ilə işarə olunur."
       data-ru="<strong>Площадь</strong> — мера поверхности, занятой фигурой. Измеряется в квадратных единицах: см², м², км². Обозначается <em>S</em>."
       data-en="<strong>Area</strong> is the measure of the surface occupied by a figure. Expressed in square units (cm², m², km²). Denoted <em>S</em>."></p>
  </div>

  <!-- SVG: Square area grid -->
  <div data-block="svg">
    <svg viewBox="0 0 420 165" aria-label="Kvadrat sahəsi: a=4 sm, S=16 sm² — hər kiçik kvadrat 1 sm²" style="width:100%;max-width:420px">
      <!-- Grid 4×4 -->
      <g transform="translate(20,20)">
        <rect width="120" height="120" fill="#ede9fe" stroke="#6366f1" stroke-width="2"/>
        <!-- Grid lines -->
        <line x1="30" y1="0" x2="30" y2="120" stroke="#a5b4fc" stroke-width="0.8"/>
        <line x1="60" y1="0" x2="60" y2="120" stroke="#a5b4fc" stroke-width="0.8"/>
        <line x1="90" y1="0" x2="90" y2="120" stroke="#a5b4fc" stroke-width="0.8"/>
        <line x1="0" y1="30" x2="120" y2="30" stroke="#a5b4fc" stroke-width="0.8"/>
        <line x1="0" y1="60" x2="120" y2="60" stroke="#a5b4fc" stroke-width="0.8"/>
        <line x1="0" y1="90" x2="120" y2="90" stroke="#a5b4fc" stroke-width="0.8"/>
        <!-- Labels -->
        <text x="60" y="-6" text-anchor="middle" font-size="12" fill="#6366f1" font-weight="700">a = 4 sm</text>
        <text x="-12" y="64" text-anchor="middle" font-size="12" fill="#6366f1" font-weight="700" transform="rotate(-90,-12,64)">a = 4 sm</text>
        <text x="60" y="60" text-anchor="middle" font-size="11" fill="#4f46e5" font-weight="700">16 sm²</text>
        <text x="60" y="75" text-anchor="middle" font-size="9" fill="#6366f1">(16 kiçik kvadrat)</text>
      </g>
      <!-- Formula -->
      <rect x="165" y="35" width="240" height="90" rx="10" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="285" y="60" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">Kvadrat Sahəsi</text>
      <text x="285" y="84" text-anchor="middle" font-size="18" fill="#6366f1" font-weight="900">S = a²</text>
      <text x="285" y="108" text-anchor="middle" font-size="12" fill="#065f46">S = 4² = 16 sm²</text>
    </svg>
  </div>

  <!-- SVG: Rectangle area -->
  <div data-block="svg">
    <svg viewBox="0 0 420 145" aria-label="Düzbucaqlı sahəsi: a=6 b=4 S=24 sm²" style="width:100%;max-width:420px">
      <rect x="20" y="25" width="150" height="90" fill="#d1fae5" stroke="#16a34a" stroke-width="2.5"/>
      <!-- Row/col grid hint -->
      <line x1="45" y1="25" x2="45" y2="115" stroke="#86efac" stroke-width="0.7"/>
      <line x1="70" y1="25" x2="70" y2="115" stroke="#86efac" stroke-width="0.7"/>
      <line x1="95" y1="25" x2="95" y2="115" stroke="#86efac" stroke-width="0.7"/>
      <line x1="120" y1="25" x2="120" y2="115" stroke="#86efac" stroke-width="0.7"/>
      <line x1="145" y1="25" x2="145" y2="115" stroke="#86efac" stroke-width="0.7"/>
      <line x1="20" y1="47" x2="170" y2="47" stroke="#86efac" stroke-width="0.7"/>
      <line x1="20" y1="69" x2="170" y2="69" stroke="#86efac" stroke-width="0.7"/>
      <line x1="20" y1="91" x2="170" y2="91" stroke="#86efac" stroke-width="0.7"/>
      <text x="95" y="16" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">a = 6</text>
      <text x="8" y="73" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">b=4</text>
      <text x="95" y="73" text-anchor="middle" font-size="12" fill="#065f46" font-weight="700">S = 24 sm²</text>
      <rect x="185" y="35" width="220" height="75" rx="10" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="295" y="58" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">Düzbucaqlı Sahəsi</text>
      <text x="295" y="80" text-anchor="middle" font-size="17" fill="#16a34a" font-weight="900">S = a × b</text>
      <text x="295" y="100" text-anchor="middle" font-size="12" fill="#065f46">S = 6 × 4 = 24 sm²</text>
    </svg>
  </div>

  <!-- SVG: Triangle area with height -->
  <div data-block="svg">
    <svg viewBox="0 0 420 155" aria-label="Üçbucaq sahəsi: əsas a=8 sm, hündürlük h=5 sm, S=20 sm²" style="width:100%;max-width:420px">
      <!-- Triangle -->
      <polygon points="40,130 180,130 130,30" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
      <!-- Height line -->
      <line x1="130" y1="30" x2="130" y2="130" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
      <rect x="126" y="126" width="8" height="8" fill="none" stroke="#dc2626" stroke-width="1.5"/>
      <!-- Labels -->
      <text x="110" y="148" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="700">a = 8 sm</text>
      <text x="140" y="82" font-size="12" fill="#dc2626" font-weight="700">h = 5</text>
      <!-- Formula -->
      <rect x="195" y="30" width="215" height="85" rx="10" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="302" y="54" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">Üçbucaq Sahəsi</text>
      <text x="302" y="78" text-anchor="middle" font-size="17" fill="#dc2626" font-weight="900">S = (a × h) ÷ 2</text>
      <text x="302" y="100" text-anchor="middle" font-size="12" fill="#065f46">S = (8 × 5) ÷ 2 = 20 sm²</text>
    </svg>
  </div>

  <div data-block="rule" data-title-az="Sahə Düsturları" data-title-ru="Формулы площади" data-title-en="Area Formulas">
    <ul>
      <li data-az="<strong>Kvadrat:</strong> S = a²"
          data-ru="<strong>Квадрат:</strong> S = a²"
          data-en="<strong>Square:</strong> S = a²"></li>
      <li data-az="<strong>Düzbucaqlı:</strong> S = a × b"
          data-ru="<strong>Прямоугольник:</strong> S = a × b"
          data-en="<strong>Rectangle:</strong> S = a × b"></li>
      <li data-az="<strong>Üçbucaq:</strong> S = (a × h) ÷ 2 &nbsp;&nbsp;(a — əsas, h — hündürlük)"
          data-ru="<strong>Треугольник:</strong> S = (a × h) ÷ 2 &nbsp;&nbsp;(a — основание, h — высота)"
          data-en="<strong>Triangle:</strong> S = (a × h) ÷ 2 &nbsp;&nbsp;(a — base, h — height)"></li>
      <li data-az="<strong>Paraleloquram:</strong> S = a × h &nbsp;&nbsp;(a — əsas, h — hündürlük)"
          data-ru="<strong>Параллелограмм:</strong> S = a × h &nbsp;&nbsp;(a — основание, h — высота)"
          data-en="<strong>Parallelogram:</strong> S = a × h &nbsp;&nbsp;(a — base, h — height)"></li>
    </ul>
  </div>

  <div data-block="note">
    <p data-az="<strong>Vahid çevirmə:</strong> 1 m² = 10 000 sm² &nbsp;|&nbsp; 1 km² = 1 000 000 m² &nbsp;|&nbsp; 1 hektar (ha) = 10 000 m²"
       data-ru="<strong>Перевод единиц:</strong> 1 м² = 10 000 см² &nbsp;|&nbsp; 1 км² = 1 000 000 м² &nbsp;|&nbsp; 1 гектар (га) = 10 000 м²"
       data-en="<strong>Unit conversions:</strong> 1 m² = 10 000 cm² &nbsp;|&nbsp; 1 km² = 1 000 000 m² &nbsp;|&nbsp; 1 hectare (ha) = 10 000 m²"></p>
  </div>

  <!-- Worked examples -->
  <div data-block="example"
       data-az="Misal 1: Tərəfi 7 sm olan kvadratın sahəsi neçədir?"
       data-ru="Пример 1: Сторона квадрата 7 см. Найдите площадь."
       data-en="Example 1: Square side 7 cm. Find the area.">
    <div data-step data-az="S = a² = 7² = 7 × 7 = 49 sm²"
                   data-ru="S = a² = 7² = 7 × 7 = 49 см²"
                   data-en="S = a² = 7² = 7 × 7 = 49 cm²"></div>
    <div data-answer data-az="Cavab: S = 49 sm²" data-ru="Ответ: S = 49 см²" data-en="Answer: S = 49 cm²"></div>
  </div>

  <div data-block="example"
       data-az="Misal 2: Uzunluğu 12 m, eni 8 m olan düzbucaqlının sahəsi neçədir?"
       data-ru="Пример 2: Прямоугольник 12 м × 8 м. Площадь?"
       data-en="Example 2: Rectangle 12 m × 8 m. Find the area.">
    <div data-step data-az="S = a × b = 12 × 8 = 96 m²"
                   data-ru="S = a × b = 12 × 8 = 96 м²"
                   data-en="S = a × b = 12 × 8 = 96 m²"></div>
    <div data-answer data-az="Cavab: S = 96 m²" data-ru="Ответ: S = 96 м²" data-en="Answer: S = 96 m²"></div>
  </div>

  <div data-block="example"
       data-az="Misal 3: Üçbucağın əsası 10 sm, hündürlüyü 6 sm-dir. Sahəsini tapın."
       data-ru="Пример 3: Основание треугольника 10 см, высота 6 см. Найдите площадь."
       data-en="Example 3: Triangle base 10 cm, height 6 cm. Find the area.">
    <div data-step data-az="S = (a × h) ÷ 2 = (10 × 6) ÷ 2 = 60 ÷ 2 = 30 sm²"
                   data-ru="S = (10 × 6) ÷ 2 = 30 см²"
                   data-en="S = (10 × 6) ÷ 2 = 30 cm²"></div>
    <div data-answer data-az="Cavab: S = 30 sm²" data-ru="Ответ: S = 30 см²" data-en="Answer: S = 30 cm²"></div>
  </div>

  <div data-block="example"
       data-az="Misal 4: Düzbucaqlının sahəsi 56 sm², uzunluğu 8 sm-dir. Enini tapın."
       data-ru="Пример 4: Площадь прямоугольника 56 см², длина 8 см. Найдите ширину."
       data-en="Example 4: Rectangle area 56 cm², length 8 cm. Find width.">
    <div data-step data-az="S = a × b → 56 = 8 × b → b = 56 ÷ 8 = 7 sm"
                   data-ru="56 = 8 × b → b = 7 см"
                   data-en="56 = 8 × b → b = 7 cm"></div>
    <div data-answer data-az="Cavab: en = 7 sm" data-ru="Ответ: ширина = 7 см" data-en="Answer: width = 7 cm"></div>
  </div>

  <div data-block="example"
       data-az="Misal 5: Kvadratın sahəsi 64 m²-dir. Tərəfini tapın."
       data-ru="Пример 5: Площадь квадрата 64 м². Найдите сторону."
       data-en="Example 5: Square area 64 m². Find the side.">
    <div data-step data-az="S = a² → a = √64 = 8 m"
                   data-ru="S = a² → a = √64 = 8 м"
                   data-en="S = a² → a = √64 = 8 m"></div>
    <div data-answer data-az="Cavab: a = 8 m" data-ru="Ответ: a = 8 м" data-en="Answer: a = 8 m"></div>
  </div>

</section>

        style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;margin-bottom:8px;box-sizing:border-box"

<!-- ═══════════════════════════════════════════ -->
<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
let currentShape = 'square';

function setShape(s) {
  currentShape = s;
  const map = {square:'inpSquare',rect:'inpRect',tri:'inpTri',para:'inpPara'};
  const btnMap = {square:'btnSq',rect:'btnRe',tri:'btnTr',para:'btnPa'};
  Object.keys(map).forEach(k => {
    document.getElementById(map[k]).style.display = (k===s)?'block':'none';
    const btn = document.getElementById(btnMap[k]);
    if (k===s) { btn.style.background='#6366f1'; btn.style.color='#fff'; btn.style.borderColor='#6366f1'; }
    else { btn.style.background='var(--surface-2)'; btn.style.color='var(--text)'; btn.style.borderColor='var(--border)'; }
  });
  runSim();
}

function fmt(n) { return parseFloat(n.toFixed(4)); }

function squareSVG(a, S) {
  const sz = Math.min(100, Math.max(50, 100));
  return `<svg viewBox="0 0 220 145" style="width:180px">
    <rect x="50" y="20" width="${sz}" height="${sz}" fill="#ede9fe" stroke="#6366f1" stroke-width="2"/>
    <text x="${50+sz/2}" y="14" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="700">a=${fmt(a)}</text>
    <text x="${50+sz/2}" y="${130}" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">S = ${fmt(S)}</text>
  </svg>`;
}

function rectSVG(a, b, S) {
  const W=130, H=80;
  return `<svg viewBox="0 0 250 135" style="width:210px">
    <rect x="40" y="20" width="${W}" height="${H}" fill="#d1fae5" stroke="#16a34a" stroke-width="2"/>
    <text x="${40+W/2}" y="14" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">a=${fmt(a)}</text>
    <text x="26" y="${20+H/2+4}" text-anchor="middle" font-size="10" fill="#16a34a">b=${fmt(b)}</text>
    <text x="${40+W/2}" y="${20+H/2+5}" text-anchor="middle" font-size="11" fill="#065f46" font-weight="700">S=${fmt(S)}</text>
    <text x="${40+W/2}" y="120" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">S = ${fmt(S)}</text>
  </svg>`;
}

function triSVG(a, h, S) {
  return `<svg viewBox="0 0 220 150" style="width:190px">
    <polygon points="110,20 30,130 190,130" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <line x1="110" y1="20" x2="110" y2="130" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="106" y="126" width="8" height="8" fill="none" stroke="#dc2626" stroke-width="1.5"/>
    <text x="110" y="147" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">a=${fmt(a)}</text>
    <text x="122" y="78" font-size="10" fill="#dc2626" font-weight="700">h=${fmt(h)}</text>
    <text x="110" y="162" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">S = ${fmt(S)}</text>
  </svg>`;
}

function paraSVG(a, h, S) {
  return `<svg viewBox="0 0 230 145" style="width:190px">
    <polygon points="50,120 180,120 200,40 70,40" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <line x1="50" y1="120" x2="50" y2="40" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="46" y="36" width="8" height="8" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <text x="115" y="137" text-anchor="middle" font-size="10" fill="#d97706" font-weight="700">a=${fmt(a)}</text>
    <text x="35" y="84" text-anchor="middle" font-size="10" fill="#d97706">h=${fmt(h)}</text>
    <text x="115" y="152" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">S = ${fmt(S)}</text>
  </svg>`;
}

function runSim() {
  const out = document.getElementById('simOut');
  const svgDiv = document.getElementById('simSVG');
  if (currentShape === 'square') {
    const a = parseFloat(document.getElementById('sqA').value)||0;
    if (!a) { out.innerHTML='<span style="color:var(--muted)">Tərəf uzunluğunu daxil edin...</span>'; svgDiv.innerHTML=''; return; }
    const S = a*a;
    out.innerHTML=`<div style="display:grid;gap:6px">
      <div>🔢 <strong>Düstur:</strong> S = a² = ${fmt(a)}² = ${fmt(a)} × ${fmt(a)}</div>
