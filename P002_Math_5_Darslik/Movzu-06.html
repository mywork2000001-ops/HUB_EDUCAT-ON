<script>
function runMulSim(){
  const x=parseFloat(document.getElementById('simX').value)||1;
  const y=parseFloat(document.getElementById('simY').value)||1;
  const op=document.getElementById('simMOp').value;
  const out=document.getElementById('simOutput');
  let result,steps;
  if(op==='*'){
    result=x*y;
    steps=`Paylanma yoxlaması: ${x} × ${y}<br/>= ${x} × ${Math.floor(y/10)*10} + ${x} × ${y%10}<br/>= ${x*Math.floor(y/10)*10} + ${x*(y%10)}<br/>= <strong style="color:var(--accent);font-size:1.1rem">${result.toLocaleString()}</strong>`;
  } else {
    if(y===0){out.innerHTML='<span style="color:var(--wrong)">Sıfıra bölmə mümkün deyil!</span>';return;}
    result=x/y;
    steps=`${x.toLocaleString()} ÷ ${y.toLocaleString()} = <strong style="color:var(--accent);font-size:1.1rem">${Number.isInteger(result)?result:result.toFixed(4)}</strong><br/>Yoxlama: ${result.toFixed(0)} × ${y} = ${(Math.round(result)*y).toLocaleString()}`;
  }
  out.innerHTML=`<div style="background:var(--surface-2);border-radius:.5rem;padding:1rem;line-height:1.8;font-size:.9rem">${steps}</div>
  <div style="margin-top:.75rem;text-align:center;font-size:1.4rem;font-weight:900">${x.toLocaleString()} ${op==='*'?'×':'÷'} ${y.toLocaleString()} = <span style="color:var(--accent)">${Number.isInteger(result)?result.toLocaleString():result.toFixed(4)}</span></div>`;
}
window.initSim=()=>runMulSim();
</script>
