<script>
function runCmpSim(){
  const a=parseInt(document.getElementById('simA').value,10)||0;
  const b=parseInt(document.getElementById('simB').value,10)||0;
  const out=document.getElementById('simOutput');
  const sign=a>b?'>':a<b?'<':'=';
  const maxV=Math.max(a,b)||1;
  const hA=Math.round((a/maxV)*120);
  const hB=Math.round((b/maxV)*120);
  const col=a>b?'#6366f1':'#f43f5e';
  out.innerHTML=`
  <div class="cmp-bars">
    <div style="text-align:center;flex:1">
      <div style="height:${hA}px;background:#6366f1;border-radius:.4rem .4rem 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:4px">
        <span style="font-size:.75rem;font-weight:800;color:#fff">${a.toLocaleString()}</span>
      </div>
      <div style="font-size:.7rem;margin-top:.25rem;color:var(--muted)">A</div>
    </div>
    <div class="cmp-sign">${sign}</div>
    <div style="text-align:center;flex:1">
      <div style="height:${hB}px;background:#f43f5e;border-radius:.4rem .4rem 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:4px">
        <span style="font-size:.75rem;font-weight:800;color:#fff">${b.toLocaleString()}</span>
      </div>
      <div style="font-size:.7rem;margin-top:.25rem;color:var(--muted)">B</div>
    </div>
  </div>
  <p style="text-align:center;font-weight:800;font-size:1rem;color:var(--accent);margin-top:.5rem">
    ${a.toLocaleString()} ${sign} ${b.toLocaleString()}
  </p>`;
}
window.initSim=()=>runCmpSim();
</script>
