<script>
function runPowerSim(){
  const base=parseInt(document.getElementById('simBase').value,10)||2;
  const exp=parseInt(document.getElementById('simExp').value,10)||2;
  const out=document.getElementById('simOutput');
  if(base<1||base>20||exp<1||exp>6){out.innerHTML='<span style="color:var(--wrong)">Əsas: 1-20, Göstərici: 1-6</span>';return;}
  const result=Math.pow(base,exp);
  const steps=Array.from({length:exp},(_,i)=>`${base}${i<exp-1?'×':''}`).join('');
  out.innerHTML=`<div style="background:var(--surface-2);border-radius:.5rem;padding:1rem;font-size:.9rem">
    <p><strong>${base}<sup>${exp}</sup></strong> = ${steps} = <span style="font-size:1.3rem;font-weight:900;color:var(--accent)">${result.toLocaleString()}</span></p>
    <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem">
      ${Array.from({length:exp},(_,i)=>`<div style="width:2.5rem;height:2.5rem;background:var(--accent);color:#fff;border-radius:.4rem;display:flex;align-items:center;justify-content:center;font-weight:900">${base}</div>`).join('<span style="display:flex;align-items:center;font-weight:900;color:var(--accent)">×</span>')}
      <span style="display:flex;align-items:center;font-size:1.1rem;font-weight:900;color:var(--accent)"> = ${result.toLocaleString()}</span>
    </div>
  </div>`;
}
window.initSim=()=>runPowerSim();
</script>
