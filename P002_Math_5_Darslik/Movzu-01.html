<!-- ═══ SIMULATION ═══ -->
<script>
const PLACES=[
  {az:'Milyonlar',ru:'Миллионы',en:'Millions',val:1000000},
  {az:'Yüz minlər',ru:'Сотни тысяч',en:'Hundred Thousands',val:100000},
  {az:'On minlər',ru:'Десятки тысяч',en:'Ten Thousands',val:10000},
  {az:'Minlər',ru:'Тысячи',en:'Thousands',val:1000},
  {az:'Yüzlər',ru:'Сотни',en:'Hundreds',val:100},
  {az:'Onlar',ru:'Десятки',en:'Tens',val:10},
  {az:'Birlər',ru:'Единицы',en:'Ones',val:1},
];
function getLang(){return document.querySelector('.lang-btn.lang-active')?.dataset.langBtn||'az';}
function runSim(){
  const l=getLang(),n=parseInt(document.getElementById('simInput').value,10);
  const out=document.getElementById('simOutput');
  if(!n||n<1||n>9999999){out.innerHTML='<span style="color:var(--wrong)">1–9 999 999</span>';return;}
  const s=String(n),ds=s.split('').map(Number),ps=PLACES.slice(7-s.length);
  let tbl=`<table class="pv-table"><thead><tr>${ps.map(p=>`<th>${p[l]}</th>`).join('')}</tr></thead><tbody>
  <tr class="pv-val-row">${ds.map(d=>`<td class="pv-cell-h">${d}</td>`).join('')}</tr>
  <tr>${ps.map((p,i)=>`<td style="font-size:.72rem;color:var(--muted)">${ds[i]}×${p.val.toLocaleString()}<br/><strong style="color:var(--accent)">${(ds[i]*p.val).toLocaleString()}</strong></td>`).join('')}</tr>
  </tbody></table>
  <p style="margin-top:.6rem;font-size:.82rem;font-weight:700;color:var(--accent)">${n.toLocaleString()} = ${ds.map((d,i)=>d?d+'×'+ps[i].val.toLocaleString():'').filter(Boolean).join(' + ')}</p>`;
  out.innerHTML=tbl;
}
function simRandom(){document.getElementById('simInput').value=Math.floor(Math.random()*9999999)+1;runSim();}
window.initSim=()=>runSim();
</script>
