<!-- ═══════════════════════════════════════════ -->
<!--  PILLAR 1 — THEORY                         -->
<!-- ═══════════════════════════════════════════ -->
<section data-pillar="theory">

  <div data-block="definition">
    <p data-az="<strong>Miqyas</strong> — xəritədəki (plandakı) məsafənin həqiqi məsafəyə nisbətidir."
       data-ru="<strong>Масштаб</strong> — это отношение расстояния на карте (плане) к действительному расстоянию."
       data-en="<strong>Scale</strong> is the ratio of a distance on a map (plan) to the actual distance."></p>
    <p data-az="Miqyas <em>1 : N</em> şəklində yazılır. Bu o deməkdir ki, xəritədəki <strong>1</strong> vahid, həqiqətdə <strong>N</strong> vahidə bərabərdir."
       data-ru="Масштаб записывается в виде <em>1 : N</em>. Это означает, что <strong>1</strong> единица на карте равна <strong>N</strong> единицам в действительности."
       data-en="Scale is written as <em>1 : N</em>. This means <strong>1</strong> unit on the map equals <strong>N</strong> units in reality."></p>
  </div>

  <!-- SVG: Scale ruler diagram -->
  <div data-block="svg">
    <svg viewBox="0 0 420 160" aria-label="Miqyas diaqramı: 1:100000, xəritədə 3 sm = həqiqətdə 3 km" style="width:100%;max-width:420px">
      <!-- Map ruler -->
      <rect x="20" y="30" width="180" height="22" rx="4" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
      <text x="110" y="46" text-anchor="middle" font-size="12" fill="#4f46e5" font-weight="700">Xəritədə: 3 sm</text>
      <!-- Arrow down -->
      <line x1="110" y1="55" x2="110" y2="100" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
      <text x="120" y="80" font-size="10" fill="#6366f1">× 100 000</text>
      <!-- Real ruler -->
      <rect x="20" y="103" width="180" height="22" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
      <text x="110" y="119" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="700">Həqiqətdə: 300 000 sm = 3 km</text>
      <!-- Scale label -->
      <rect x="240" y="50" width="160" height="60" rx="8" fill="#fef9c3" stroke="#d97706" stroke-width="1.5"/>
      <text x="320" y="72" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">Miqyas</text>
      <text x="320" y="91" text-anchor="middle" font-size="16" fill="#92400e" font-weight="900">1 : 100 000</text>
      <text x="320" y="106" text-anchor="middle" font-size="9" fill="#92400e">1 sm → 100 000 sm = 1 km</text>
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
        </marker>
      </defs>
    </svg>
  </div>

  <div data-block="rule" data-title-az="Əsas Düsturlar" data-title-ru="Основные формулы" data-title-en="Key Formulas">
    <p data-az="Miqyas <strong>1 : N</strong> olduqda:"
       data-ru="При масштабе <strong>1 : N</strong>:"
       data-en="For scale <strong>1 : N</strong>:"></p>
    <ul>
      <li data-az="<strong>Həqiqi məsafə = Xəritə məsafəsi × N</strong>"
          data-ru="<strong>Действительное расстояние = Расстояние на карте × N</strong>"
          data-en="<strong>Real distance = Map distance × N</strong>"></li>
      <li data-az="<strong>Xəritə məsafəsi = Həqiqi məsafə ÷ N</strong>"
          data-ru="<strong>Расстояние на карте = Действительное расстояние ÷ N</strong>"
          data-en="<strong>Map distance = Real distance ÷ N</strong>"></li>
      <li data-az="<strong>N = Həqiqi məsafə ÷ Xəritə məsafəsi</strong>"
          data-ru="<strong>N = Действительное расстояние ÷ Расстояние на карте</strong>"
          data-en="<strong>N = Real distance ÷ Map distance</strong>"></li>
    </ul>
  </div>

  <div data-block="note">
    <p data-az="<strong>Vacib:</strong> Məsafələr eyni vahiddə olmalıdır (adətən santimetrdə). Cavabı m və ya km-ə çevirmək tez-tez tələb olunur."
       data-ru="<strong>Важно:</strong> Расстояния должны быть в одних единицах (обычно в сантиметрах). Часто нужно перевести ответ в м или км."
       data-en="<strong>Important:</strong> Distances must be in the same units (usually centimetres). The answer is often converted to m or km."></p>
  </div>

  <!-- SVG: Scale comparison — larger vs smaller scale -->
  <div data-block="svg">
    <svg viewBox="0 0 420 140" aria-label="Miqyas müqayisəsi: 1:1000 böyük miqyas, 1:1000000 kiçik miqyas" style="width:100%;max-width:420px">
      <!-- Left: large scale -->
      <rect x="10" y="20" width="185" height="100" rx="8" fill="#d1fae5" stroke="#16a34a" stroke-width="1.5"/>
      <text x="103" y="42" text-anchor="middle" font-size="12" fill="#065f46" font-weight="700">Böyük miqyas</text>
      <text x="103" y="62" text-anchor="middle" font-size="16" fill="#16a34a" font-weight="900">1 : 1 000</text>
      <text x="103" y="80" text-anchor="middle" font-size="9" fill="#065f46">1 sm → 10 m</text>
      <text x="103" y="96" text-anchor="middle" font-size="9" fill="#065f46">Bina planı, otaq sxemi</text>
      <text x="103" y="112" text-anchor="middle" font-size="9" fill="#065f46">Daha ətraflı, kiçik ərazi</text>
      <!-- Right: small scale -->
      <rect x="225" y="20" width="185" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="318" y="42" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="700">Kiçik miqyas</text>
      <text x="318" y="62" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="900">1 : 1 000 000</text>
      <text x="318" y="80" text-anchor="middle" font-size="9" fill="#991b1b">1 sm → 10 km</text>
      <text x="318" y="96" text-anchor="middle" font-size="9" fill="#991b1b">Ölkə xəritəsi, atlas</text>
      <text x="318" y="112" text-anchor="middle" font-size="9" fill="#991b1b">Az ətraflı, böyük ərazi</text>
    </svg>
  </div>

  <div data-block="rule" data-title-az="Çevirmə Cədvəli" data-title-ru="Таблица перевода" data-title-en="Conversion Table">
    <p data-az="1 km = 1000 m = 100 000 sm &nbsp;|&nbsp; 1 m = 100 sm &nbsp;|&nbsp; 1 sm = 10 mm"
       data-ru="1 км = 1000 м = 100 000 см &nbsp;|&nbsp; 1 м = 100 см &nbsp;|&nbsp; 1 см = 10 мм"
       data-en="1 km = 1000 m = 100 000 cm &nbsp;|&nbsp; 1 m = 100 cm &nbsp;|&nbsp; 1 cm = 10 mm"></p>
    <p data-az="Geniş istifadə olunan miqyaslar: 1:100 (otaq), 1:500 (bina), 1:10 000 (rayon), 1:100 000 (şəhər), 1:1 000 000 (ölkə)"
       data-ru="Часто используемые масштабы: 1:100 (комната), 1:500 (здание), 1:10 000 (район), 1:100 000 (город), 1:1 000 000 (страна)"
       data-en="Common scales: 1:100 (room), 1:500 (building), 1:10 000 (district), 1:100 000 (city), 1:1 000 000 (country)"></p>
  </div>

  <!-- Worked examples -->
  <div data-block="example"
       data-az="Misal 1: Miqyas 1:50 000. Xəritədə 4 sm. Həqiqi məsafə neçə km-dir?"
       data-ru="Пример 1: Масштаб 1:50 000. На карте 4 см. Какое действительное расстояние в км?"
       data-en="Example 1: Scale 1:50 000. Map distance 4 cm. What is the real distance in km?">
    <div data-step data-az="Həqiqi məsafə (sm) = 4 × 50 000 = 200 000 sm"
                   data-ru="Действительное расстояние (см) = 4 × 50 000 = 200 000 см"
                   data-en="Real distance (cm) = 4 × 50 000 = 200 000 cm"></div>
    <div data-step data-az="200 000 sm ÷ 100 000 = 2 km"
                   data-ru="200 000 см ÷ 100 000 = 2 км"
                   data-en="200 000 cm ÷ 100 000 = 2 km"></div>
    <div data-answer data-az="Cavab: 2 km" data-ru="Ответ: 2 км" data-en="Answer: 2 km"></div>
  </div>

  <div data-block="example"
       data-az="Misal 2: Miqyas 1:25 000. İki şəhər arasındakı həqiqi məsafə 5 km-dir. Xəritədə neçə sm olacaq?"
       data-ru="Пример 2: Масштаб 1:25 000. Действительное расстояние 5 км. Сколько см на карте?"
       data-en="Example 2: Scale 1:25 000. Real distance 5 km. How many cm on the map?">
    <div data-step data-az="5 km = 500 000 sm"
                   data-ru="5 км = 500 000 см"
                   data-en="5 km = 500 000 cm"></div>
    <div data-step data-az="Xəritə məsafəsi = 500 000 ÷ 25 000 = 20 sm"
                   data-ru="Расстояние на карте = 500 000 ÷ 25 000 = 20 см"
                   data-en="Map distance = 500 000 ÷ 25 000 = 20 cm"></div>
    <div data-answer data-az="Cavab: 20 sm" data-ru="Ответ: 20 см" data-en="Answer: 20 cm"></div>
  </div>

  <div data-block="example"
       data-az="Misal 3: Xəritədə 6 sm, həqiqətdə 3 km-dir. Miqyası tapın."
       data-ru="Пример 3: На карте 6 см, в действительности 3 км. Найдите масштаб."
       data-en="Example 3: Map shows 6 cm, real distance is 3 km. Find the scale.">
    <div data-step data-az="3 km = 300 000 sm"
                   data-ru="3 км = 300 000 см"
                   data-en="3 km = 300 000 cm"></div>
    <div data-step data-az="N = 300 000 ÷ 6 = 50 000"
                   data-ru="N = 300 000 ÷ 6 = 50 000"
                   data-en="N = 300 000 ÷ 6 = 50 000"></div>
    <div data-answer data-az="Cavab: Miqyas 1 : 50 000" data-ru="Ответ: Масштаб 1 : 50 000" data-en="Answer: Scale 1 : 50 000"></div>
  </div>

  <div data-block="example"
       data-az="Misal 4: Otağın planı miqyas 1:50 ilə çəkilib. Planda otaq 6 sm × 4 sm-dir. Otağın həqiqi ölçüləri nədir?"
       data-ru="Пример 4: План комнаты в масштабе 1:50. На плане 6 см × 4 см. Каковы реальные размеры комнаты?"
       data-en="Example 4: Room plan drawn at scale 1:50. On the plan: 6 cm × 4 cm. Find the real dimensions.">
    <div data-step data-az="Uzunluq: 6 × 50 = 300 sm = 3 m"
                   data-ru="Длина: 6 × 50 = 300 см = 3 м"
                   data-en="Length: 6 × 50 = 300 cm = 3 m"></div>
    <div data-step data-az="En: 4 × 50 = 200 sm = 2 m"
                   data-ru="Ширина: 4 × 50 = 200 см = 2 м"
                   data-en="Width: 4 × 50 = 200 cm = 2 m"></div>
    <div data-answer data-az="Cavab: 3 m × 2 m" data-ru="Ответ: 3 м × 2 м" data-en="Answer: 3 m × 2 m"></div>
  </div>

  <div data-block="example"
       data-az="Misal 5: Xəritənin miqyası 1:200 000-dir. İki şəhər arasındakı xəritə məsafəsi 8,5 sm-dir. Həqiqi məsafəni km ilə tapın."
       data-ru="Пример 5: Масштаб карты 1:200 000. Расстояние на карте 8,5 см. Найдите расстояние в км."
       data-en="Example 5: Map scale 1:200 000. Map distance 8.5 cm. Find real distance in km.">
    <div data-step data-az="Həqiqi məsafə (sm) = 8,5 × 200 000 = 1 700 000 sm"
                   data-ru="Действительное расстояние (см) = 8,5 × 200 000 = 1 700 000 см"
                   data-en="Real distance (cm) = 8.5 × 200 000 = 1 700 000 cm"></div>
    <div data-step data-az="1 700 000 ÷ 100 000 = 17 km"
                   data-ru="1 700 000 ÷ 100 000 = 17 км"
                   data-en="1 700 000 ÷ 100 000 = 17 km"></div>
    <div data-answer data-az="Cavab: 17 km" data-ru="Ответ: 17 км" data-en="Answer: 17 km"></div>
  </div>

</section>

        🔍 Miqyası tap
      </button>

    <!-- Mode 1: find real distance -->

        oninput="runSim()"/>

    <!-- Mode 2: find map distance -->

      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">Miqyas (N) — 1 : N</label>
      <input id="m2n" type="number" min="1" value="50000"
        style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;margin-bottom:10px;box-sizing:border-box"
        oninput="runSim()"/>
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">Həqiqi məsafə (km)</label>
      <input id="m2r" type="number" min="0.001" step="0.001" value="5"
        style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;margin-bottom:10px;box-sizing:border-box"
        oninput="runSim()"/>
      <div id="m2out" style="background:var(--surface-2);border-radius:12px;padding:14px;margin-top:4px;min-height:60px;font-size:14px"></div>
    </div>

    <!-- Mode 3: find scale -->
    <div id="mode3" style="display:none">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">Xəritə məsafəsi (sm)</label>
      <input id="m3d" type="number" min="0.01" step="0.01" value="4"
        style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;margin-bottom:10px;box-sizing:border-box"
        oninput="runSim()"/>
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">Həqiqi məsafə (km)</label>
      <input id="m3r" type="number" min="0.001" step="0.001" value="2"

<!-- ═══════════════════════════════════════════ -->
<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
let currentMode = 1;

function setMode(m) {
  currentMode = m;
  [1,2,3].forEach(i => {
    document.getElementById('mode'+i).style.display = (i===m) ? 'block' : 'none';
    const btn = document.getElementById('btn'+i);
    if (i===m) {
      btn.style.background='#6366f1'; btn.style.color='#fff'; btn.style.borderColor='#6366f1';
    } else {
      btn.style.background='var(--surface-2)'; btn.style.color='var(--text)'; btn.style.borderColor='var(--border)';
    }
  });
  runSim();
}

function fmt(n, decimals=2) {
  if (Number.isInteger(n)) return n.toString();
  return parseFloat(n.toFixed(decimals)).toString();
}

function scaleBarSVG(mapCm, realKm) {
  const barW = 260;
  const labels = [];
  // show 0, mapCm/2, mapCm on bar
  labels.push({x:0, map:'0 sm', real:'0 km'});
  labels.push({x:barW/2, map: fmt(mapCm/2)+' sm', real: fmt(realKm/2)+' km'});
  labels.push({x:barW, map: fmt(mapCm)+' sm', real: fmt(realKm)+' km'});
  let ticks = '';
  labels.forEach(l => {
    ticks += `<line x1="${l.x+30}" y1="30" x2="${l.x+30}" y2="50" stroke="#6366f1" stroke-width="1.5"/>`;
    ticks += `<text x="${l.x+30}" y="25" text-anchor="middle" font-size="9" fill="#6366f1">${l.map}</text>`;
    ticks += `<text x="${l.x+30}" y="62" text-anchor="middle" font-size="9" fill="#16a34a">${l.real}</text>`;
  });
  return `<svg viewBox="0 0 320 75" style="width:100%;max-width:320px">
    <rect x="30" y="30" width="${barW}" height="20" rx="4" fill="#6366f1" opacity="0.18" stroke="#6366f1" stroke-width="1.5"/>
    ${ticks}
    <text x="160" y="12" text-anchor="middle" font-size="9" fill="#4f46e5" font-weight="700">Xəritə (sm)</text>
    <text x="160" y="74" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="700">Həqiqət (km)</text>
  </svg>`;
}

function runSim() {
  if (currentMode === 1) {
    const N = parseFloat(document.getElementById('m1n').value)||0;
    const d = parseFloat(document.getElementById('m1d').value)||0;
    const out = document.getElementById('m1out');
    if (!N||!d) { out.innerHTML='<span style="color:var(--muted)">Dəyərləri daxil edin...</span>'; return; }
    const realCm = d * N;
    const realM  = realCm / 100;
    const realKm = realCm / 100000;
    out.innerHTML = `
      <div style="display:grid;gap:6px">
        <div>📐 <strong>Hesab:</strong> ${fmt(d)} × ${N.toLocaleString()} = <span style="color:#6366f1;font-weight:700">${realCm.toLocaleString()} sm</span></div>
        <div>📏 <strong>Məsafə:</strong>
          <span style="color:#16a34a;font-weight:700">${realKm >= 1 ? fmt(realKm)+' km' : realM >= 1 ? fmt(realM)+' m' : fmt(realCm)+' sm'}</span>
          ${realKm>=1 ? ' = '+realM.toLocaleString()+' m = '+realCm.toLocaleString()+' sm' : ''}
        </div>
      </div>`;
    document.getElementById('scaleBar').innerHTML = scaleBarSVG(d, realKm);
  } else if (currentMode === 2) {
    const N = parseFloat(document.getElementById('m2n').value)||0;
    const rKm = parseFloat(document.getElementById('m2r').value)||0;
    const out = document.getElementById('m2out');
    if (!N||!rKm) { out.innerHTML='<span style="color:var(--muted)">Dəyərləri daxil edin...</span>'; return; }
    const rCm = rKm * 100000;
    const mapCm = rCm / N;
    out.innerHTML = `
      <div style="display:grid;gap:6px">
        <div>📐 <strong>Çevir:</strong> ${fmt(rKm)} km = ${rCm.toLocaleString()} sm</div>
        <div>📐 <strong>Hesab:</strong> ${rCm.toLocaleString()} ÷ ${N.toLocaleString()} = <span style="color:#6366f1;font-weight:700">${fmt(mapCm)} sm</span></div>

      </div>`;

  } else {
    const dCm = parseFloat(document.getElementById('m3d').value)||0;
    const rKm = parseFloat(document.getElementById('m3r').value)||0;
    const out = document.getElementById('m3out');
    if (!dCm||!rKm) { out.innerHTML='<span style="color:var(--muted)">Dəyərləri daxil edin...</span>'; return; }

    const N = rCm / dCm;
    out.innerHTML = `
      <div style="display:grid;gap:6px">
        <div>📐 <strong>Çevir:</strong> ${fmt(rKm)} km = ${rCm.toLocaleString()} sm</div>
        <div>📐 <strong>N =</strong> ${rCm.toLocaleString()} ÷ ${fmt(dCm)} = <span style="color:#6366f1;font-weight:700">${Math.round(N).toLocaleString()}</span></div>
        <div>🔍 <strong>Miqyas:</strong> <span style="color:#16a34a;font-weight:700">1 : ${Math.round(N).toLocaleString()}</span></div>
      </div>`;
    document.getElementById('scaleBar').innerHTML = scaleBarSVG(dCm, rKm);
  }
}

window.initSim = function() { runSim(); };
</script>
