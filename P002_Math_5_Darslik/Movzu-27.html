<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
const PI = 3.14;
let mode = 'r';

function setMode(m) {
  mode = m;
  ['r','d','c'].forEach(k => {
    document.getElementById('inp'+k.toUpperCase()).style.display = (k===m)?'block':'none';
    const btn = document.getElementById('btn'+k.toUpperCase());
    if (k===m) { btn.style.background='#6366f1'; btn.style.color='#fff'; btn.style.borderColor='#6366f1'; }
    else { btn.style.background='var(--surface-2)'; btn.style.color='var(--text)'; btn.style.borderColor='var(--border)'; }
  });
  runSim();
}

function fmt(n, d=2) { return parseFloat(n.toFixed(d)); }

function circleSVG(r, C) {
  const maxR = 70, minR = 20;
  const vis = Math.min(maxR, Math.max(minR, r * 5));
  return `<svg viewBox="0 0 220 180" style="width:190px">
    <circle cx="110" cy="90" r="${vis}" fill="#ede9fe" stroke="#6366f1" stroke-width="2.5"/>
    <line x1="110" y1="90" x2="${110+vis}" y2="90" stroke="#dc2626" stroke-width="2"/>
    <circle cx="110" cy="90" r="4" fill="#6366f1"/>
    <text x="${110+vis/2}" y="84" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">r=${fmt(r)}</text>
    <text x="110" y="${90+vis+18}" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="700">d=${fmt(r*2)}</text>
    <text x="110" y="${90+vis+34}" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">C=${fmt(C)}</text>
  </svg>`;
}

function runSim() {
  const out = document.getElementById('simOut');
  const svgDiv = document.getElementById('simSVG');
  let r, d, C;
  if (mode==='r') {
    r = parseFloat(document.getElementById('valR').value)||0;
    if(!r){out.innerHTML='<span style="color:var(--muted)">Radiusu daxil edin...</span>';svgDiv.innerHTML='';return;}
    d=r*2; C=fmt(2*PI*r);
    out.innerHTML=`<div style="display:grid;gap:6px">
      <div>📏 <strong>Radius:</strong> r = ${fmt(r)}</div>
      <div>📏 <strong>Diametr:</strong> d = 2r = 2 × ${fmt(r)} = <span style="color:#6366f1;font-weight:700">${fmt(d)}</span></div>
      <div>〇 <strong>Çevrə uzunluğu:</strong> C = 2 × 3,14 × ${fmt(r)} = <span style="color:#16a34a;font-weight:700;font-size:16px">${C}</span></div>
    </div>`;
    svgDiv.innerHTML=circleSVG(r, C);
  } else if (mode==='d') {
    d = parseFloat(document.getElementById('valD').value)||0;
    if(!d){out.innerHTML='<span style="color:var(--muted)">Diametri daxil edin...</span>';svgDiv.innerHTML='';return;}
    r=d/2; C=fmt(PI*d);
    out.innerHTML=`<div style="display:grid;gap:6px">
      <div>📏 <strong>Diametr:</strong> d = ${fmt(d)}</div>
      <div>📏 <strong>Radius:</strong> r = d÷2 = ${fmt(d)}÷2 = <span style="color:#6366f1;font-weight:700">${fmt(r)}</span></div>
      <div>〇 <strong>Çevrə uzunluğu:</strong> C = 3,14 × ${fmt(d)} = <span style="color:#16a34a;font-weight:700;font-size:16px">${C}</span></div>
    </div>`;
    svgDiv.innerHTML=circleSVG(r, C);
  } else {
    C = parseFloat(document.getElementById('valC').value)||0;
    if(!C){out.innerHTML='<span style="color:var(--muted)">Çevrə uzunluğunu daxil edin...</span>';svgDiv.innerHTML='';return;}
    r=fmt(C/(2*PI)); d=fmt(r*2);
    out.innerHTML=`<div style="display:grid;gap:6px">
      <div>〇 <strong>Çevrə uzunluğu:</strong> C = ${fmt(C)}</div>
      <div>📏 <strong>Radius:</strong> r = C ÷ (2×3,14) = ${fmt(C)} ÷ 6,28 = <span style="color:#6366f1;font-weight:700">${r}</span></div>
      <div>📏 <strong>Diametr:</strong> d = 2r = <span style="color:#16a34a;font-weight:700;font-size:16px">${d}</span></div>
    </div>`;
    svgDiv.innerHTML=circleSVG(r, C);
  }
}

window.initSim = function() { runSim(); };
</script>
