<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
function calcMedian(sorted) {
  const n = sorted.length;
  if (n === 0) return null;
  const mid = Math.floor(n / 2);
  return n % 2 !== 0 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
}

function calcMode(arr) {
  const freq = {};
  arr.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
  const maxF = Math.max(...Object.values(freq));
  if (maxF === 1) return { modes: [], maxFreq: 1 };
  const modes = Object.keys(freq).filter(k => freq[k] === maxF).map(Number).sort((a,b)=>a-b);
  return { modes, maxFreq: maxF };
}

function runSim() {
  const raw = document.getElementById('simNums').value;
  const nums = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
  if (!nums.length) {
    document.getElementById('simSorted').innerHTML  = '<span style="color:var(--muted)">Ədədlər daxil edin...</span>';
    document.getElementById('simResults').innerHTML = '';
    document.getElementById('simMode').innerHTML    = '';
    return;
  }
  const sorted = [...nums].sort((a,b)=>a-b);
  const n = sorted.length;
  const sum = nums.reduce((a,b)=>a+b,0);
  const mean = Math.round(sum/n*100)/100;
  const median = calcMedian(sorted);
  const { modes, maxFreq } = calcMode(nums);

  // Sorted row
  const midIdx1 = n%2!==0 ? Math.floor(n/2) : n/2-1;
  const midIdx2 = n%2!==0 ? Math.floor(n/2) : n/2;
  const sortedBoxes = sorted.map((v,i) => {
    const isMid = (n%2!==0 && i===midIdx1) || (n%2===0 && (i===midIdx1||i===midIdx2));
    const bg = isMid ? '#16a34a' : '#e0f2fe';
    const col = isMid ? 'white' : '#0369a1';
    return `<span style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:${bg};color:${col};font-weight:800;font-size:14px;margin:2px">${v}</span>`;
  }).join('');
  document.getElementById('simSorted').innerHTML =
    `<span style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Sıralanmış (yaşıl = orta ədəd${n%2===0?'lər':''}):</span>` + sortedBoxes;

  // Stats cards
  document.getElementById('simResults').innerHTML = `
    <div style="background:var(--surface-2);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px">
      <div style="font-size:10px;color:var(--muted)">Orta (x̄)</div>
      <div style="font-size:22px;font-weight:900;color:#2563eb">${mean}</div>
    </div>
    <div style="background:var(--surface-2);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px">
      <div style="font-size:10px;color:var(--muted)">Mediana</div>
      <div style="font-size:22px;font-weight:900;color:#16a34a">${median}</div>
    </div>
    <div style="background:var(--surface-2);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px">
      <div style="font-size:10px;color:var(--muted)">Moda</div>
      <div style="font-size:22px;font-weight:900;color:#dc2626">${modes.length ? modes.join(', ') : '—'}</div>
    </div>`;

  // Mode explanation
  const modeText = modes.length
    ? `<strong style="color:#dc2626">${modes.join(', ')}</strong> — ${maxFreq} dəfə təkrarlanır`
    : `<span style="color:var(--muted)">Moda yoxdur (hər ədəd yalnız 1 dəfə rast gəlinir)</span>`;
  document.getElementById('simMode').innerHTML = `Moda: ${modeText}`;
}

window.initSim = function() { runSim(); };
</script>
