<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
const BAR_COLORS = ['#6366f1','#16a34a','#dc2626','#f59e0b','#06b6d4','#8b5cf6','#ec4899','#14b8a6'];

function buildBarChart(labels, vals) {
  if (!labels.length || !vals.length) return '';
  const n = Math.min(labels.length, vals.length);
  if (!n) return '';
  const W = 320, padL = 38, padR = 12, padT = 20, padB = 46;
  const chartW = W - padL - padR;
  const maxVal = Math.max(...vals.slice(0, n), 1);
  const chartH = 120;
  const fullH = chartH + padT + padB;
  const bw = Math.max(24, Math.floor((chartW - 4*(n-1)) / n));
  // y grid: 5 lines
  let gridLines = '';
  for (let g = 0; g <= 4; g++) {
    const gy = padT + chartH - (g/4)*chartH;
    const gv = Math.round((g/4)*maxVal*10)/10;
    gridLines += `<line x1="${padL}" y1="${gy}" x2="${padL+chartW}" y2="${gy}" stroke="#e5e7eb" stroke-width="0.5"/>`;
    gridLines += `<text x="${padL-4}" y="${gy+3}" font-size="8" fill="#9ca3af" text-anchor="end">${gv}</text>`;
  }
  let bars = '';
  for (let i = 0; i < n; i++) {
    const bh = Math.max(4, Math.round((vals[i] / maxVal) * chartH));
    const bx = padL + i*(bw+4);
    const by = padT + chartH - bh;
    const col = BAR_COLORS[i % BAR_COLORS.length];
    bars += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="3" fill="${col}" opacity="0.88"/>`;
    bars += `<text x="${bx+bw/2}" y="${by-4}" font-size="9" fill="${col}" text-anchor="middle" font-weight="700">${vals[i]}</text>`;
    const lbl = labels[i].length > 8 ? labels[i].substring(0,7)+'…' : labels[i];
    bars += `<text x="${bx+bw/2}" y="${padT+chartH+14}" font-size="8" fill="#6b7280" text-anchor="middle">${lbl}</text>`;
  }
  const axisB = padT + chartH;
  return `<svg viewBox="0 0 ${W} ${fullH}" style="width:100%;max-width:${W}px">
    ${gridLines}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${axisB}" stroke="#374151" stroke-width="1.5"/>
    <line x1="${padL}" y1="${axisB}" x2="${padL+chartW}" y2="${axisB}" stroke="#374151" stroke-width="1.5"/>
    ${bars}
  </svg>`;
}

function runSim() {
  const rawL = document.getElementById('simLabels').value;
  const rawV = document.getElementById('simVals').value;
  const labels = rawL.split(',').map(s => s.trim()).filter(Boolean);
  const vals = rawV.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
  const n = Math.min(labels.length, vals.length);
  if (!n) {
    document.getElementById('simInfo').textContent = 'Zəhmət olmasa məlumat daxil edin.';
    document.getElementById('simChart').innerHTML = '';
    return;
  }
  const sum = vals.slice(0,n).reduce((a,b)=>a+b,0);
  const mean = Math.round(sum/n*100)/100;
  const maxV = Math.max(...vals.slice(0,n));
  const maxL = labels[vals.slice(0,n).indexOf(maxV)];
  document.getElementById('simInfo').innerHTML =
    `<span style="margin-right:12px">Cəm: <strong>${sum}</strong></span>` +
    `<span style="margin-right:12px">Say: <strong>${n}</strong></span>` +
    `<span style="margin-right:12px">Orta: <strong>${mean}</strong></span>` +
    `<span>Maks: <strong>${maxV}</strong> (${maxL})</span>`;
  document.getElementById('simChart').innerHTML = buildBarChart(labels.slice(0,n), vals.slice(0,n));
}

window.initSim = function() { runSim(); };
</script>
