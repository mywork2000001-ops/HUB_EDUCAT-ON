<script>
function runRoundSim(){
  const n=parseInt(document.getElementById('simN').value,10);
  const p=parseInt(document.getElementById('simPlace').value,10);
  const out=document.getElementById('simOutput');
  if(isNaN(n)||n<0){out.innerHTML='<span style="color:var(--wrong)">Düzgün ədəd daxil edin</span>';return;}
  const rounded=Math.round(n/p)*p;
  const lower=Math.floor(n/p)*p;
  const upper=lower+p;
  const rightDigit=Math.floor((n%p)/(p/10));
  const dir=rounded>n?'↑ Yuxarı':'↓ Aşağı';
  out.innerHTML=`
  <div style="background:var(--surface-2);border-radius:.5rem;padding:1rem;font-size:.9rem">
    <p><strong>${n.toLocaleString()}</strong> → <strong>${p.toLocaleString()}-ə qədər yuvarlaqlaşdır</strong></p>
    <p style="margin-top:.5rem">Aşağı hədd: <strong>${lower.toLocaleString()}</strong> &nbsp;|&nbsp; Yuxarı hədd: <strong>${upper.toLocaleString()}</strong></p>
    <p style="margin-top:.5rem">Sağdakı rəqəm: <strong>${rightDigit}</strong> — ${rightDigit>=5?'≥5 → yuxarı yuvarlaqlaşdır':'<5 → aşağı yuvarlaqlaşdır'}</p>
    <p style="margin-top:.75rem;font-size:1.1rem;font-weight:900;color:var(--accent)">${n.toLocaleString()} ≈ <span style="background:var(--accent);color:#fff;padding:.1rem .5rem;border-radius:.3rem">${rounded.toLocaleString()}</span></p>
    <!-- mini number line SVG -->
    <svg viewBox="0 0 400 50" width="100%" style="margin-top:.75rem">
      <line x1="30" y1="25" x2="370" y2="25" stroke="var(--border)" stroke-width="2"/>
      <rect x="30" y="20" width="2" height="10" fill="#6366f1"/>
      <rect x="370" y="20" width="2" height="10" fill="#6366f1"/>
      <text x="30" y="15" font-size="9" fill="#6366f1" text-anchor="middle">${lower.toLocaleString()}</text>
      <text x="370" y="15" font-size="9" fill="#6366f1" text-anchor="middle">${upper.toLocaleString()}</text>
      <circle cx="${30+(n-lower)/(p)*340}" cy="25" r="5" fill="#f43f5e"/>
      <text x="${30+(n-lower)/(p)*340}" y="42" font-size="9" fill="#f43f5e" text-anchor="middle">${n.toLocaleString()}</text>
      <rect x="${rounded===lower?30:370}" y="18" width="2" height="14" fill="#16a34a"/>
      <text x="${rounded===lower?30:370}" y="45" font-size="9" fill="#16a34a" text-anchor="middle">≈${rounded.toLocaleString()}</text>
    </svg>
  </div>`;
}
window.initSim=()=>runRoundSim();
</script>
