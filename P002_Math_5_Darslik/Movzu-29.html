<!--  SIMULATOR LOGIC                           -->
<!-- ═══════════════════════════════════════════ -->
<script>
function fmt(n) { return Math.round(n * 100) / 100; }

function barChart(nums, mean) {
  if (!nums.length) return '';
  const W = 320, H = 120, pad = 28, barGap = 6;
  const maxVal = Math.max(...nums, mean, 1);
  const bw = Math.max(18, Math.floor((W - 2*pad - barGap*(nums.length-1)) / nums.length));
  const totalW = nums.length * bw + (nums.length-1)*barGap + 2*pad;
  const usedW = Math.max(W, totalW);
  let bars = '';
  nums.forEach((v, i) => {
    const bh = Math.max(4, Math.round((v / maxVal) * (H - 30)));
    const bx = pad + i * (bw + barGap);
    const by = H - 10 - bh;
    bars += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="3" fill="#3b82f6" opacity="0.8"/>`;
    bars += `<text x="${bx + bw/2}" y="${by - 4}" font-size="9" fill="#2563eb" text-anchor="middle" font-weight="700">${v}</text>`;
  });
  const meanY = H - 10 - Math.round((mean / maxVal) * (H - 30));
  return `<svg viewBox="0 0 ${usedW} ${H}" style="width:100%;max-width:${usedW}px">
    ${bars}
    <line x1="${pad-6}" y1="${meanY}" x2="${usedW-pad+6}" y2="${meanY}" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="${usedW-pad+8}" y="${meanY+4}" font-size="10" fill="#16a34a" font-weight="700">x̄=${mean}</text>
  </svg>`;
}

function runSim() {
  const raw = document.getElementById('simNums').value;
  const parts = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
  const stepsEl = document.getElementById('simSteps');
  const chartEl = document.getElementById('simChart');
  if (!parts.length) {
    stepsEl.innerHTML = '<div style="color:var(--muted);font-size:12px">Zəhmət olmasa ədədlər daxil edin...</div>';
    chartEl.innerHTML = '';
    return;
  }
  const sum = parts.reduce((a, b) => a + b, 0);
  const count = parts.length;
  const mean = fmt(sum / count);
  const col = '#16a34a';
  stepsEl.innerHTML = `
    <div style="background:var(--surface-2);border-radius:8px;padding:10px">
      <span style="font-size:12px;color:var(--muted)">Ədədlər:</span>
      <strong style="color:#2563eb"> ${parts.join(' + ')}</strong>
    </div>
    <div style="background:var(--surface-2);border-radius:8px;padding:10px;display:flex;gap:16px;flex-wrap:wrap">
      <div><span style="font-size:11px;color:var(--muted)">Cəm</span><br><strong style="font-size:18px;color:#2563eb">${fmt(sum)}</strong></div>
      <div><span style="font-size:11px;color:var(--muted)">Say</span><br><strong style="font-size:18px;color:#d97706">${count}</strong></div>
      <div><span style="font-size:11px;color:var(--muted)">Orta (Cəm ÷ Say)</span><br><strong style="font-size:22px;color:${col}">${mean}</strong></div>
    </div>
    <div style="background:#dcfce7;border-radius:8px;padding:10px;font-size:13px;color:#166534;font-weight:700">
      x̄ = ${fmt(sum)} ÷ ${count} = <span style="font-size:18px">${mean}</span>
    </div>`;
  chartEl.innerHTML = barChart(parts, mean);
}

window.initSim = function() { runSim(); };
</script>
