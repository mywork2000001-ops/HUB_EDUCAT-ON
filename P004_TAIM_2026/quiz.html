<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viktorina — TAİM MİQ 2026</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3c72">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .builder-card { background:#fff; border-radius:10px; padding:22px; box-shadow:0 2px 8px rgba(0,0,0,.07); margin-bottom:18px; }
    .builder-card h3 { color:#2a5298; font-size:16px; margin-bottom:14px; }
    .stats-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; padding:14px 18px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); justify-content:space-around; }
    .stat-pill { text-align:center; min-width:70px; }
    .stat-pill .sv { font-size:22px; font-weight:700; color:#2a5298; }
    .stat-pill .sl { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.4px; }
    .time-chip { display:inline-flex; align-items:center; gap:5px; background:#fff3cd; padding:7px 16px; border-radius:20px; font-size:15px; font-weight:700; color:#856404; }
    .ctrl-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .lesson-list { max-height:360px; overflow-y:auto; border:1px solid #e9ecef; border-radius:8px; }
    .group-header { background:#f4f6f9; padding:6px 14px; font-size:11px; font-weight:700; color:#6c757d; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid #e9ecef; position:sticky; top:0; z-index:1; }
    .lesson-item { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid #f4f4f4; cursor:pointer; transition:background .12s; }
    .lesson-item:last-child { border-bottom:none; }
    .lesson-item:hover { background:#f8f9fa; }
    .lesson-item input[type=checkbox] { width:17px; height:17px; cursor:pointer; accent-color:#2a5298; flex-shrink:0; }
    .lesson-item label { cursor:pointer; flex:1; font-size:13px; line-height:1.4; -webkit-user-select:none; user-select:none; }
    .lesson-num { font-weight:700; color:#2a5298; font-size:11px; margin-right:4px; }
    .lesson-qs { font-size:11px; color:#888; white-space:nowrap; background:#f0f4ff; padding:2px 7px; border-radius:10px; }
    .q-count-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
    .q-count-row label { font-size:14px; font-weight:600; color:#333; }
    .q-count-row input[type=number] { width:90px; padding:9px 12px; border:2px solid #dee2e6; border-radius:8px; font-size:20px; font-weight:700; color:#2a5298; text-align:center; outline:none; font-family:inherit; -moz-appearance:textfield; }
    .q-count-row input[type=number]::-webkit-outer-spin-button,
    .q-count-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
    .q-count-row input[type=number]:focus { border-color:#2a5298; }
    .q-max-lbl { font-size:13px; color:#888; }
    .range-wrap { margin-bottom:14px; }
    .range-wrap input[type=range] { width:100%; accent-color:#2a5298; cursor:pointer; }
    .err-box { background:#f8d7da; border:1px solid #f5c6cb; border-radius:8px; padding:12px 16px; color:#721c24; font-size:14px; margin-top:10px; display:none; }
    .loading-box { text-align:center; padding:60px 20px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
    .spin { font-size:48px; display:inline-block; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>

  /* ── Crypto ────────────────────────────────────────── */
  const _KEY = [0x4A, 0x1F, 0x63, 0x2B, 0x77, 0x0E, 0x55, 0x3C];
  function decryptK(b64, n) {
    const raw = atob(b64);
    return Array.from({length: n}, (_, i) => (raw.charCodeAt(i) ^ _KEY[i%8] ^ (i&0xFF)) - 65);
  }
  function encryptK(arr) {
    const bytes = arr.map((a, i) => (a + 65) ^ _KEY[i%8] ^ (i&0xFF));
    return btoa(String.fromCharCode(...bytes));
  }

  /* ── Extract CONFIG from HTML ──────────────────────── */
  function extractConfig(html) {
    const marker = 'var CONFIG =';
    const pos = html.indexOf(marker);
    if (pos === -1) return null;
    const objStart = html.indexOf('{', pos + marker.length);
    if (objStart === -1) return null;
    let depth = 0, inStr = false, strCh = '', i = objStart;
    while (i < html.length) {
      const ch = html[i];
      if (inStr) { if (ch === '\\') { i += 2; continue; } if (ch === strCh) inStr = false; }
      else { if (ch === '"' || ch === "'") { inStr = true; strCh = ch; } else if (ch === '{') depth++; else if (ch === '}') { depth--; if (depth === 0) break; } }
      i++;
    }
    try { return (new Function('return ' + html.slice(objStart, i + 1)))(); } catch(e) { return null; }
  }

  /* ── State ─────────────────────────────────────────── */
  const selected = new Set();

  /* ── Build lesson list ─────────────────────────────── */
  function buildList() {
    const container = document.getElementById('lessonList');
    container.innerHTML = '';
    GROUPS.forEach(g => {
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.textContent = g[lang];
      container.appendChild(gh);
      for (let i = g.from; i <= g.to; i++) {
        const L = LESSONS[i];
        const row = document.createElement('div');
        row.className = 'lesson-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.id = 'cb_' + i; cb.checked = selected.has(i);
        cb.addEventListener('change', () => { selected[cb.checked ? 'add' : 'delete'](i); updateStats(); });
        const lbl = document.createElement('label');
        lbl.htmlFor = 'cb_' + i;
        lbl.innerHTML = `<span class="lesson-num">${L.num}</span>${L.icon} ${L[lang]}`;
        const qs = document.createElement('span');
        qs.className = 'lesson-qs'; qs.textContent = L.qs + 'Q';
        row.appendChild(cb); row.appendChild(lbl); row.appendChild(qs);
        row.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } });
        container.appendChild(row);
      }
    });
  }

  /* ── Update stats ──────────────────────────────────── */
  function updateStats() {
    const totalQ = [...selected].reduce((s, i) => s + LESSONS[i].qs, 0);

    const range = document.getElementById('qRange');
    range.max = totalQ || 1;
    inp.max = totalQ;
    let count = parseInt(inp.value) || 0;
    if (totalQ > 0 && count > totalQ) { count = totalQ; inp.value = totalQ; }
    if (count < 1 && totalQ > 0) { count = 1; inp.value = 1; }
    range.value = count;

    const mins = count > 0 && totalQ > 0 ? Math.max(10, Math.ceil(count * 1.5)) : 0;
    document.getElementById('statTopics').textContent = selected.size;
    document.getElementById('statAvail').textContent = totalQ;
    document.getElementById('statSel').textContent = (count > 0 && count <= totalQ) ? count : '—';
    document.getElementById('statTime').textContent = '⏱ ' + (mins || '—') + (mins ? ' ' + u().min : '');
    document.getElementById('qMaxLbl').textContent = '/ max ' + totalQ;
    document.getElementById('quizStartBtn').disabled = !(selected.size > 0 && count >= 1 && count <= totalQ);
    document.getElementById('errMsg').style.display = 'none';
  }

  function onCountChange() {
    const range = document.getElementById('qRange');
    range.value = document.getElementById('qCountInp').value;
    updateStats();
  }
  function onRangeChange(v) {
    document.getElementById('qCountInp').value = v;
    updateStats();
  }
  function selectAll(v) {
    LESSONS.forEach((_, i) => selected[v ? 'add' : 'delete'](i));
    document.querySelectorAll('#lessonList input[type=checkbox]').forEach(cb => { cb.checked = v; });
    updateStats();
  }

  /* ── Start quiz ─────────────────────────────────────── */
  async function startQuiz() {
    const totalQ = [...selected].reduce((s, i) => s + LESSONS[i].qs, 0);
    const count = parseInt(document.getElementById('qCountInp').value);
    if (selected.size === 0) { showErr(u().errNoSel); return; }
    if (!count || count < 1 || count > totalQ) { showErr(u().errCount.replace('{max}', totalQ)); return; }

    document.getElementById('builderScreen').classList.add('hidden');
    document.getElementById('loadingScreen').classList.remove('hidden');
    document.getElementById('loadingTxt').textContent = u().loading;

    try {
      const allQ = [];
      const selArr = [...selected];
      for (let fi = 0; fi < selArr.length; fi++) {
        const L = LESSONS[selArr[fi]];
        document.getElementById('loadingProg').textContent =
          `${fi + 1} / ${selArr.length}  —  ${L[lang]}`;
        const html = await fetch(L.file).then(r => r.text());
        const config = extractConfig(html);
        if (!config || !config._k || !config.questions?.length) continue;
        const answers = decryptK(config._k, config.questions.length);
        config.questions.forEach((q, qi) => allQ.push({ ...q, _c: answers[qi] }));
      }

      if (allQ.length === 0) throw new Error('empty');

      // Fisher-Yates shuffle
      for (let i = allQ.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
      }

      const picked = allQ.slice(0, Math.min(count, allQ.length));
      const correctArr = picked.map(q => q._c);
      const cleanQ = picked.map(({ _c, ...rest }) => rest);

      const n = selected.size;
      const topicAz = n === 1 ? LESSONS[[...selected][0]].az : n + ' mövzu üzrə viktorina';
      const topicRu = n === 1 ? LESSONS[[...selected][0]].ru : 'Викторина по ' + n + ' темам';

      window.CONFIG = {
        topicAz, topicRu,
        sectionAz: 'TAİM MİQ — Viktorina',
        sectionRu: 'TAİM MİQ — Викторина',
        totalTimeMin: Math.max(10, Math.ceil(picked.length * 1.5)),
        backLink: 'quiz.html',
        _k: encryptK(correctArr),
        questions: cleanQ,
      };

      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      const s = document.createElement('script');
      s.src = 'engine.js';
      document.head.appendChild(s);

    } catch(e) {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('builderScreen').classList.remove('hidden');
      showErr(u().errFetch);
      console.error('Quiz load error:', e);
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = 'block';
  }

  /* ── Init ───────────────────────────────────────────── */
  LESSONS.forEach((_, i) => selected.add(i));
  buildList();
  updateStats();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', {updateViaCache: 'none'})
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  }
  </script>
</body>
