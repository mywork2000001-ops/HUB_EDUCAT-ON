    <!-- ── Loading screen styles (removed once React mounts) ───────────── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 28px;
        background: #0f172a;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      .splash-logo {
        width: 72px; height: 72px; border-radius: 20px;
        background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        display: flex; align-items: center; justify-content: center;
        font-size: 2.2rem; font-weight: 900; color: #fff;
        box-shadow: 0 0 40px rgba(245,158,11,0.35);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 30px rgba(245,158,11,0.30); transform: scale(1); }
        50%       { box-shadow: 0 0 55px rgba(245,158,11,0.55); transform: scale(1.04); }
      }

      .splash-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em;
        color: #f8fafc; text-align: center;
      }
      .splash-sub {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.8rem; color: #64748b; text-align: center;
        max-width: 240px; line-height: 1.5;
      }

      .splash-bar {
        width: 200px; height: 3px; background: #1e293b; border-radius: 99px; overflow: hidden;
      }
      .splash-fill {
        height: 100%; border-radius: 99px;
        background: linear-gradient(90deg, #f59e0b, #ef4444);
        animation: load 1.6s ease-in-out infinite;
      }
      @keyframes load {
        0%   { width: 0%;    margin-left: 0%; }
        50%  { width: 70%;   margin-left: 15%; }
        100% { width: 0%;    margin-left: 100%; }
      }

      /* Platform structure badge row */
      .splash-badges {
        display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        max-width: 300px;
      }
      .splash-badge {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.68rem; font-weight: 600; padding: 3px 10px;
        border-radius: 99px; background: #1e293b; color: #94a3b8;
        border: 1px solid #334155;
      }

      /* Prevent flash of unstyled content */
      body { background: #0f172a; }
      #root:empty + #splash { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/index-CsFFV4R6.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CCcbMy-F.css">
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Loading splash (hidden once React mounts) -->
    <div id="splash" role="status" aria-label="Yüklənir...">
      <div class="splash-logo">🎓</div>
      <div>
        <div class="splash-title">DİM Riyaziyyat</div>
        <div class="splash-sub">Blok İmtahanına Hazırlıq Platforması</div>
      </div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
      <div class="splash-badges">
        <span class="splash-badge">📚 28 Mövzu</span>
        <span class="splash-badge">📝 Testlər</span>
        <span class="splash-badge">🔬 İsbatlar</span>
        <span class="splash-badge">🧩 Situasiya</span>
        <span class="splash-badge">⚡ XP Sistemi</span>
        <span class="splash-badge">AZ · RU · EN</span>
      </div>
    </div>

    <!-- Entry point -->

    <!-- Hide splash once React has painted -->
    <script>
      (function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        // Use MutationObserver to detect when #root gets children
        var mo = new MutationObserver(function () {
          if (document.getElementById('root').firstChild) {
            mo.disconnect();
            setTimeout(function () { splash.classList.add('hidden'); }, 120);
          }
        });
        mo.observe(document.getElementById('root'), { childList: true });
        // Fallback: hide after 6s regardless
        setTimeout(function () { splash.classList.add('hidden'); }, 6000);
      })();
    </script>
  </body>
