<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест: Производные</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 2rem;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .question {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .question h3 { font-size: 1rem; margin-bottom: 0.75rem; }
    label {
      display: block;
      padding: 0.5rem 0;
      cursor: pointer;
    }
    label:hover { color: #2563eb; }
    input[type="radio"] { margin-right: 0.5rem; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1rem;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    #result { margin-top: 1.5rem; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Тест: Производные функций</h1>

    <div class="question">
      <h3>1. Чему равна производная f(x) = x<sup>2</sup>?</h3>
      <label><input type="radio" name="q1" value="0"> x</label>
      <label><input type="radio" name="q1" value="1"> 2x</label>
      <label><input type="radio" name="q1" value="0"> x<sup>2</sup></label>
    </div>

    <div class="question">
      <h3>2. Производная константы c = 5 равна:</h3>
      <label><input type="radio" name="q2" value="0"> 5</label>
      <label><input type="radio" name="q2" value="1"> 0</label>
      <label><input type="radio" name="q2" value="0"> 1</label>
    </div>

    <div class="question">
      <h3>3. Производная f(x) = sin(x) равна:</h3>
      <label><input type="radio" name="q3" value="1"> cos(x)</label>
      <label><input type="radio" name="q3" value="0"> -cos(x)</label>
      <label><input type="radio" name="q3" value="0"> -sin(x)</label>
    </div>

    <button class="btn" id="submitBtn">Проверить</button>
    <div id="result"></div>
  </div>

  <script>
    document.getElementById('submitBtn').addEventListener('click', () => {
      let points = 0;
      const q1 = document.querySelector('input[name="q1"]:checked');
      const q2 = document.querySelector('input[name="q2"]:checked');
      const q3 = document.querySelector('input[name="q3"]:checked');

      if (q1) points += parseInt(q1.value);
      if (q2) points += parseInt(q2.value);
      if (q3) points += parseInt(q3.value);

      const resultEl = document.getElementById('result');
      resultEl.textContent = 'Результат: ' + points + ' / 3';
      resultEl.style.color = points === 3 ? '#16a34a' : points >= 2 ? '#ca8a04' : '#dc2626';

      window.parent.postMessage({
        type: 'LESSON_COMPLETE',
        payload: {
          lessonId: 'testbank-derivatives-001',
          points: points,
          maxPoints: 3,
          timeSpentSeconds: 180
        }
      }, '*');

      // Also send score update for real-time display
      window.parent.postMessage({
        type: 'SCORE_UPDATE',
        payload: {
          lessonId: 'testbank-derivatives-001',
          points: points,
          maxPoints: 3,
          timeSpentSeconds: 180
        }
      }, '*');

      document.getElementById('submitBtn').disabled = true;
    });
  </script>
</body>
</html>
