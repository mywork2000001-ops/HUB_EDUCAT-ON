        buildDots();
        renderQ();
        tmrId = setInterval(tick, 1000);
      }

      function tick() {
        elapsed++;
        timeLeft--;
        const m = Math.floor(timeLeft / 60),
          s = timeLeft % 60;
        const el = document.getElementById("tmr");
        el.textContent = pad(m) + ":" + pad(s);
        el.className =
          "timer" +
          (timeLeft <= 60 ? " danger" : timeLeft <= 300 ? " warn" : "");
        if (timeLeft <= 0) {
          clearInterval(tmrId);
          showResult();
        }
      }
      function pad(n) {
        return String(n).padStart(2, "0");
      }

      function buildDots() {
        const dc = document.getElementById("dots");
        dc.innerHTML = QS.map(
          (_, i) =>
            `<div class="dot" id="d${i}" onclick="goQ(${i})">${i + 1}</div>`,
        ).join("");
      }

      function updateDots() {
        QS.forEach((_, i) => {
          const d = document.getElementById("d" + i);
          d.className =
            "dot" + (i === idx ? " current" : ans[i] >= 0 ? " done" : "");
        });
      }

      function renderQ() {
        const q = QS[idx];
        document.getElementById("qc").textContent =
          `Sual ${idx + 1} / ${QS.length}`;
        const done = ans.filter((a) => a >= 0).length;
        document.getElementById("qa-count").textContent = `${done} cavablandńĪ`;
        document.getElementById("qt").innerHTML = q.q;
        document.getElementById("opts").innerHTML = q.o
          .map(
            (o, i) =>
              `<button class="opt${ans[idx] === i ? " sel" : ""}" onclick="selectOpt(${i})">
      <span class="opt-lbl">${LABELS[i]}</span>${o}
    </button>`,
          )
          .join("");
        document.getElementById("pg").style.width =
          ((idx + 1) / QS.length) * 100 + "%";
        document.getElementById("bp").style.visibility =
          idx > 0 ? "visible" : "hidden";
        document.getElementById("bn").textContent =
          idx === QS.length - 1 ? "Son sual" : "N√∂vb…ôti ‚Üí";
        updateDots();
      }

      function selectOpt(i) {
        ans[idx] = i;
        document
          .querySelectorAll(".opt")
          .forEach((b, j) => b.classList.toggle("sel", j === i));
        updateDots();
      }

      function prevQ() {
        if (idx > 0) {
          idx--;
          renderQ();
        }
      }
      function nextQ() {
        if (idx < QS.length - 1) {
          idx++;
          renderQ();
        }
      }
      function goQ(i) {
        idx = i;
        renderQ();
      }

      function finishTest() {
        const unanswered = ans.filter((a) => a < 0).length;
        if (
          unanswered > 0 &&
          !confirm(
            `${unanswered} sual cavabsńĪz qalńĪb. Testi bitirm…ôk ist…ôyirsiniz?`,
          )
        )
          return;
        clearInterval(tmrId);
        showResult();
      }

      function showResult() {
        document.getElementById("qp").style.display = "none";
        document.getElementById("hdr").classList.add("hidden");
        const res = document.getElementById("res");
        res.style.display = "block";
        const correct = ans.reduce(
          (acc, a, i) => acc + (a === QS[i].a ? 1 : 0),
          0,
        );
        const pct = Math.round((correct / QS.length) * 100);
        const ring = document.getElementById("ring");
        ring.style.setProperty("--p", pct);
        document.getElementById("rpct").textContent = pct + "%";
        document.getElementById("rtitle").textContent =
          pct >= 90
            ? "ūüŹÜ ∆Źla n…ôtic…ô!"
            : pct >= 70
              ? "‚úÖ YaxŇüńĪ n…ôtic…ô!"
              : pct >= 50
                ? "ūüďą Orta s…ôviyy…ô"
                : "ūüí™ Davam et!";
        document.getElementById("rsub").textContent =
          `${correct} / ${QS.length} d√ľzg√ľn ¬∑ ${pct}% ¬∑ ${Math.floor(elapsed / 60)}:${pad(elapsed % 60)} vaxt`;
        try {
          const payload = {
            itemId: TEST_ID,
            points: correct,
            maxPoints: QS.length,
            timeSpentSeconds: elapsed,
          };
          window.parent.postMessage({ type: "SCORE_UPDATE", payload }, "*");
          if (pct >= 50)
            window.parent.postMessage(
              { type: "LESSON_COMPLETE", payload },
              "*",
            );
        } catch (e) {}
      }

      function toggleReview() {
        const rev = document.getElementById("rev");
        if (!rev.classList.contains("hidden")) {
          rev.classList.add("hidden");
          return;
        }
        rev.classList.remove("hidden");
        rev.innerHTML = QS.map((q, i) => {
          const ok = ans[i] === q.a;
          const myAns =
            ans[i] >= 0 ? LABELS[ans[i]] + ") " + q.o[ans[i]] : "CavabsńĪz";
          return `<div class="ri ${ok ? "ok" : "ng"}">
      <div class="rq">${i + 1}. ${q.q}</div>
      <div class="ra">
        ${!ok ? `<span class="ng-a">CavabńĪnńĪz: ${myAns}</span> &nbsp;¬∑&nbsp; ` : ""}
        <span class="ok-a">D√ľzg√ľn: ${LABELS[q.a]}) ${q.o[q.a]}</span>
      </div>
      ${q.e ? `<div class="re">ūüí° ${q.e}</div>` : ""}
    </div>`;
        }).join("");
        rev.scrollIntoView({ behavior: "smooth" });
      }

      function restartTest() {
        clearInterval(tmrId);
        elapsed = 0;
        timeLeft = TIME_LIMIT;
        idx = 0;
        document.getElementById("res").style.display = "none";
        document.getElementById("start").classList.remove("hidden");
      }
    </script>
  </body>
</html>
