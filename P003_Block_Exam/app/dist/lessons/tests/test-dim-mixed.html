<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DİM — Qarışıq Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.exam-header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.exam-title{font-weight:700;font-size:14px;color:#ef4444}
.timer{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;background:#0f172a;padding:4px 12px;border-radius:8px;border:1px solid #334155;color:#e2e8f0}
.timer.warn{color:#f97316}.timer.danger{color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.prog-bar{height:4px;background:#1e293b}
.prog-fill{height:100%;background:#ef4444;transition:width .3s}
.body{max-width:700px;margin:0 auto;padding:28px 16px}
.start{text-align:center;padding:40px 20px}
.start h2{font-size:26px;font-weight:800;color:#ef4444;margin-bottom:8px}
.start p{color:#94a3b8;font-size:14px;margin-bottom:20px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.info-card{background:#1e293b;border-radius:10px;padding:14px;text-align:center}
.info-card .val{font-size:24px;font-weight:800;color:#ef4444}
.info-card .lbl{font-size:11px;color:#94a3b8;margin-top:3px}
.note{font-size:12px;color:#475569;margin-bottom:24px}
.q-panel{display:none}
.q-counter{font-size:12px;color:#94a3b8;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.q-text{font-size:16px;line-height:1.65;font-weight:500;margin-bottom:22px;color:#f1f5f9}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:#1e293b;border:1.5px solid #334155;border-radius:10px;padding:12px 16px;text-align:left;cursor:pointer;transition:all .15s;font-size:14px;color:#e2e8f0;display:flex;align-items:center;gap:12px;width:100%}
.opt:hover{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4)}
.opt.sel{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444;font-weight:600}
.opt-lbl{width:26px;height:26px;background:#334155;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.opt.sel .opt-lbl{background:#ef4444;color:#fff}
.nav{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-outline{background:transparent;border:1.5px solid #475569;color:#94a3b8}
.btn-outline:hover{border-color:#94a3b8;color:#e2e8f0}
.btn-primary{background:#ef4444;color:#fff}
.btn-primary:hover{background:#dc2626}
.q-dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:16px}
.dot{width:22px;height:22px;border-radius:4px;background:#1e293b;border:1px solid #334155;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#64748b;transition:all .1s}
.dot.done{background:rgba(239,68,68,.2);border-color:#ef4444;color:#ef4444;font-weight:700}
.dot.current{background:#ef4444;color:#fff;font-weight:700}
.result{display:none;text-align:center;padding:32px 20px}
.score-ring{width:130px;height:130px;border-radius:50%;border:10px solid #1e293b;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;position:relative}
.score-ring::before{content:'';position:absolute;inset:-10px;border-radius:50%;background:conic-gradient(#ef4444 calc(var(--p,0)*1%),#1e293b 0);z-index:-1}
.res-title{font-size:22px;font-weight:800;margin-bottom:6px}
.res-sub{color:#94a3b8;font-size:14px;margin-bottom:20px}
.res-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.review{text-align:left;margin-top:28px;display:flex;flex-direction:column;gap:8px}
.ri{background:#1e293b;border-radius:8px;padding:12px 14px;border-left:4px solid}
.ri.ok{border-color:#22c55e}.ri.ng{border-color:#ef4444}
.rq{font-size:13px;color:#cbd5e1;margin-bottom:5px}
.ra{font-size:12px;margin-bottom:3px}
.ra .ok-a{color:#22c55e}.ra .ng-a{color:#ef4444}
.re{font-size:11px;color:#64748b;margin-top:3px}
.topic-tag{font-size:10px;background:#1e3a5f;color:#60a5fa;padding:2px 7px;border-radius:4px;margin-bottom:8px;display:inline-block}
.hidden{display:none!important}
@media(max-width:480px){.info-grid{grid-template-columns:1fr 1fr}.q-text{font-size:14px}}
</style>
</head>
<body>

<div class="exam-header hidden" id="hdr">
  <div class="exam-title">🔴 DİM — Qarışıq Test</div>
  <div class="timer" id="tmr">45:00</div>
</div>
<div class="prog-bar"><div class="prog-fill" id="pg" style="width:0%"></div></div>

<div class="body">

  <div class="start" id="start">
    <h2>DİM — Qarışıq Test</h2>
    <p>Bütün mövzular üzrə DİM formatında yekun qiymətləndirmə</p>
    <div class="info-grid">
      <div class="info-card"><div class="val">30</div><div class="lbl">Sual sayı</div></div>
      <div class="info-card"><div class="val">45</div><div class="lbl">Dəqiqə</div></div>
      <div class="info-card"><div class="val">3</div><div class="lbl">DİM səviyyə</div></div>
    </div>
    <p class="note">Mövzular 1–28 üzrə qarışıq suallar. Hər düzgün cavab 1 xal.</p>
    <button class="btn btn-primary" style="font-size:15px;padding:12px 30px" onclick="startTest()">Testi Başla →</button>
  </div>

  <div class="q-panel" id="qp">
    <div class="q-counter">
      <span id="qc">Sual 1 / 30</span>
      <span id="qa-count" style="color:#ef4444;font-weight:600"></span>
    </div>
    <div id="qtag" class="topic-tag"></div>
    <div class="q-text" id="qt"></div>
    <div class="options" id="opts"></div>
    <div class="nav">
      <button class="btn btn-outline" id="bp" onclick="prevQ()" style="visibility:hidden">← Əvvəlki</button>
      <button class="btn btn-primary" id="bn" onclick="nextQ()">Növbəti →</button>
      <button class="btn btn-outline" onclick="finishTest()" style="margin-left:auto">Bitir ✓</button>
    </div>
    <div class="q-dots" id="dots"></div>
  </div>

  <div class="result" id="res">
    <div class="score-ring" id="ring"><span id="rpct">0%</span></div>
    <div class="res-title" id="rtitle"></div>
    <div class="res-sub" id="rsub"></div>
    <div class="res-actions">
      <button class="btn btn-primary" onclick="restartTest()">Yenidən başla</button>
      <button class="btn btn-outline" onclick="toggleReview()">📋 Analiz</button>
    </div>
    <div class="review hidden" id="rev"></div>
  </div>

</div>

<script>
const TEST_ID = 'test-dim-mixed';
const TIME_LIMIT = 45 * 60;

const QS = [
  {t:'Mövzu 1: Natural ədədlər', q:'3⁵ − 2⁵ = ?', o:['211','221','231','241'], a:0,
   e:'3⁵ = 243, 2⁵ = 32. 243 − 32 = 211.'},
  {t:'Mövzu 2: Çoxluqlar', q:'n(A) = 20, n(B) = 15, n(A∪B) = 28. n(A∩B) = ?', o:['5','7','9','13'], a:1,
   e:'n(A∩B) = n(A) + n(B) − n(A∪B) = 20 + 15 − 28 = 7.'},
  {t:'Mövzu 3: Kəsrlər', q:'(5/6 − 1/3) × 18 = ?', o:['6','9','12','15'], a:1,
   e:'5/6 − 1/3 = 5/6 − 2/6 = 1/2. Sonra: 1/2 × 18 = 9.'},
  {t:'Mövzu 4: Həndəsənin əsasları', q:'Bərabəryanlı üçbucaqda taban bucaqlarından biri 35°-dir. Zirvə bucağı neçədir?', o:['35°','70°','110°','145°'], a:2,
   e:'Taban bucaqları bərabərdir: 35° + 35° = 70°. Zirvə = 180° − 70° = 110°.'},
  {t:'Mövzu 5: Nisbət və faiz', q:'Bir fabrik 100 işçi ilə 20 gündə mal istehsal edir. Eyni işi 50 işçi neçə günə görər?', o:['10 gün','20 gün','30 gün','40 gün'], a:3,
   e:'Tərs mütənasiblik: 100 × 20 = 50 × d → d = 40 gün.'},
  {t:'Mövzu 6: Real ədədlər', q:'(2 + √3)(2 − √3) = ?', o:['1','4','1 + 4√3','4 − √3'], a:0,
   e:'(2+√3)(2−√3) = 2² − (√3)² = 4 − 3 = 1.'},
  {t:'Mövzu 7: Üçbucaqlar', q:'Düzbucaqlı üçbucaqda bir kənar bucaq 35°-dir. Digər kənar bucaq neçədir?', o:['35°','45°','55°','65°'], a:2,
   e:'Bir kənar bucaq 35° olduqda digəri: 90° − 35° = 55°.'},
  {t:'Mövzu 8: Rasional ifadələr', q:'(x² − 4) / (x − 2) = ? (x ≠ 2)', o:['x + 2','x − 2','x² + 2','2'], a:0,
   e:'x²−4 = (x+2)(x−2). Sadələşdirmə: (x+2)(x−2)/(x−2) = x+2.'},
  {t:'Mövzu 9: Tənliklər', q:'x / (x−3) = 2 / (x−3) + 1 tənliyinin həlli?', o:['x = 5','x = 3','Həll yoxdur','x = 1'], a:2,
   e:'Hər iki tərəfi (x−3) ilə vururuq: x = 2 + (x−3) = x−1. Bu yalan bərabərlik deməkdir — həll yoxdur.'},
  {t:'Mövzu 10: Tənliklər sistemi', q:'Sistem: x + 2y = 7, 2x − y = 4. y = ?', o:['1','2','3','4'], a:1,
   e:'2-ci tənlikdən: y = 2x−4. Birinciyə qoyuruq: x + 2(2x−4) = 7 → 5x = 15 → x = 3, y = 2.'},
  {t:'Mövzu 11: Dairə', q:'Mərkəz bucağı 60°, radius 6 sm olan dairə sektorunun sahəsi?', o:['6π sm²','12π sm²','18π sm²','36π sm²'], a:0,
   e:'S = (α/360°) × πr² = (60/360) × π × 36 = π × 6 = 6π sm².'},
  {t:'Mövzu 12: Bərabərsizliklər', q:'2(x − 1) &gt; 3x − 5 bərabərsizliyini həll edin.', o:['x &gt; 3','x &lt; 3','x ≥ 3','x ≤ 3'], a:1,
   e:'2x − 2 &gt; 3x − 5 → −x &gt; −3 → x &lt; 3.'},
  {t:'Mövzu 13: Ardıcıllıqlar', q:'Ədədi silsilə: 4, 7, 10, 13, ... 20-ci hədd?', o:['55','58','61','64'], a:2,
   e:'a₂₀ = 4 + (20−1) × 3 = 4 + 57 = 61.'},
  {t:'Mövzu 14: Çoxbucaqlılar', q:'Düzgün altıbucaqlının tərəfi a = 4 sm. Perimetri?', o:['12 sm','18 sm','24 sm','30 sm'], a:2,
   e:'P = 6 × a = 6 × 4 = 24 sm.'},
  {t:'Mövzu 15: Dördbucaqlılar', q:'Kvadratın diaqonalı d = 6√2 sm. Tərəfi?', o:['6 sm','6√2 sm','3 sm','12 sm'], a:0,
   e:'d = a√2 → a = d/√2 = 6√2/√2 = 6 sm.'},
  {t:'Mövzu 16: Funksiyalar', q:'f(x) = x² − 4. f(−2) = ?', o:['0','4','−4','8'], a:0,
   e:'f(−2) = (−2)² − 4 = 4 − 4 = 0.'},
  {t:'Mövzu 17: Triqonometriya', q:'cos 0° = ?', o:['0','1/2','√3/2','1'], a:3,
   e:'cos 0° = 1. (Vahid dairəsindəki (1,0) nöqtənin x-koordinatı.)'},
  {t:'Mövzu 18: Loqarifm', q:'log₂(8 × 4) = ?', o:['4','5','12','32'], a:1,
   e:'log₂(8×4) = log₂ 32. 2⁵ = 32, buna görə log₂ 32 = 5.'},
  {t:'Mövzu 19: Eksponensial tənliklər', q:'4ˣ = 64. x = ?', o:['2','3','4','6'], a:1,
   e:'4ˣ = 64. 4 = 2², 64 = 2⁶. (2²)ˣ = 2⁶ → 2x = 6 → x = 3.'},
  {t:'Mövzu 20: Loqarifmik tənliklər', q:'log₃(2x − 1) = 2. x = ?', o:['4','5','10','13/2'], a:1,
   e:'2x − 1 = 3² = 9 → 2x = 10 → x = 5.'},
  {t:'Mövzu 21: Kombinatorika', q:'A(5, 2) = ?', o:['10','15','20','60'], a:2,
   e:'A(5,2) = 5! / (5−2)! = 5 × 4 = 20.'},
  {t:'Mövzu 22: Ehtimal', q:'Müntəzəm bir zər atıldıqda tək ədəd gəlmə ehtimalı?', o:['1/3','1/2','2/3','3/4'], a:1,
   e:'Tək ədədlər: {1, 3, 5} — 3 hadisə. Cəmi 6 hadisə. P = 3/6 = 1/2.'},
  {t:'Mövzu 23: Statistika', q:'5, 3, 7, 5, 9, 5, 3 sırasının modu?', o:['3','5','7','9'], a:1,
   e:'5 ədədi 3 dəfə, 3 ədədi 2 dəfə, 7 və 9 ədədləri 1 dəfə. Mod = 5.'},
  {t:'Mövzu 24: Vektorlar', q:'a⃗ = (1, 2), b⃗ = (3, 4). a⃗ + b⃗ = ?', o:['(2, 6)','(4, 6)','(3, 8)','(4, 8)'], a:1,
   e:'a⃗ + b⃗ = (1+3, 2+4) = (4, 6).'},
  {t:'Mövzu 25: Koordinat üsulu', q:'A(2, 3), B(5, 7). AB-nin ortasının koordinatları?', o:['(3; 4)','(3,5; 5)','(7; 10)','(1,5; 2)'], a:1,
   e:'M = ((2+5)/2 ; (3+7)/2) = (3,5 ; 5).'},
  {t:'Mövzu 26: Törəmə', q:'f(x) = x⁴. f\'(x) = ?', o:['4x','4x²','4x³','x³'], a:2,
   e:'(xⁿ)\' = nxⁿ⁻¹. f\'(x) = 4x³.'},
  {t:'Mövzu 27: İnteqral', q:'∫cos x dx = ?', o:['−sin x + C','sin x + C','cos x + C','−cos x + C'], a:1,
   e:'∫cos x dx = sin x + C — əsas inteqral düsturu.'},
  {t:'Qarışıq', q:'360° = ? radian', o:['π','2π','π/2','4π'], a:1,
   e:'180° = π radian, ona görə 360° = 2π radian.'},
  {t:'Qarışıq', q:'Ardıcıllıq: 1, 4, 9, 16, 25, ... Növbəti hədd?', o:['30','34','36','42'], a:2,
   e:'Bu natural ədədlərin kvadratları: 1²,2²,3²,4²,5²,... Növbəti: 6² = 36.'},
  {t:'Qarışıq', q:'Trapeziyanın əsasları a = 8 sm, b = 4 sm, hündürlüyü h = 6 sm. Sahəsi?', o:['24 sm²','36 sm²','48 sm²','72 sm²'], a:1,
   e:'S = (a+b)/2 × h = (8+4)/2 × 6 = 6 × 6 = 36 sm².'},
];

const LABELS = ['A','B','C','D'];
let idx=0, ans=[], elapsed=0, timeLeft=TIME_LIMIT, tmrId=null;

function startTest(){
  ans = new Array(QS.length).fill(-1);
  document.getElementById('start').classList.add('hidden');
  document.getElementById('qp').style.display='block';
  document.getElementById('hdr').classList.remove('hidden');
  buildDots(); renderQ();
  tmrId = setInterval(tick, 1000);
}
function tick(){
  elapsed++; timeLeft--;
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  const el=document.getElementById('tmr');
  el.textContent=pad(m)+':'+pad(s);
  el.className='timer'+(timeLeft<=60?' danger':timeLeft<=300?' warn':'');
  if(timeLeft<=0){clearInterval(tmrId);showResult();}
}
function pad(n){return String(n).padStart(2,'0')}
function buildDots(){
  document.getElementById('dots').innerHTML=QS.map((_,i)=>`<div class="dot" id="d${i}" onclick="goQ(${i})">${i+1}</div>`).join('');
}
function updateDots(){
  QS.forEach((_,i)=>{const d=document.getElementById('d'+i);d.className='dot'+(i===idx?' current':ans[i]>=0?' done':'');});
}
function renderQ(){
  const q=QS[idx];
  document.getElementById('qc').textContent=`Sual ${idx+1} / ${QS.length}`;
  document.getElementById('qa-count').textContent=`${ans.filter(a=>a>=0).length} cavablandı`;
  document.getElementById('qtag').textContent=q.t;
  document.getElementById('qt').innerHTML=q.q;
  document.getElementById('opts').innerHTML=q.o.map((o,i)=>
    `<button class="opt${ans[idx]===i?' sel':''}" onclick="selectOpt(${i})"><span class="opt-lbl">${LABELS[i]}</span>${o}</button>`
  ).join('');
  document.getElementById('pg').style.width=((idx+1)/QS.length*100)+'%';
  document.getElementById('bp').style.visibility=idx>0?'visible':'hidden';
  document.getElementById('bn').textContent=idx===QS.length-1?'Son sual':'Növbəti →';
  updateDots();
}
function selectOpt(i){ans[idx]=i;document.querySelectorAll('.opt').forEach((b,j)=>b.classList.toggle('sel',j===i));updateDots();}
function prevQ(){if(idx>0){idx--;renderQ();}}
function nextQ(){if(idx<QS.length-1){idx++;renderQ();}}
function goQ(i){idx=i;renderQ();}
function finishTest(){
  const u=ans.filter(a=>a<0).length;
  if(u>0&&!confirm(`${u} sual cavabsız qalıb. Testi bitirmək istəyirsiniz?`))return;
  clearInterval(tmrId);showResult();
}
function showResult(){
  document.getElementById('qp').style.display='none';
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('res').style.display='block';
  const correct=ans.reduce((acc,a,i)=>acc+(a===QS[i].a?1:0),0);
  const pct=Math.round(correct/QS.length*100);
  document.getElementById('ring').style.setProperty('--p',pct);
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=90?'🏆 DİM şampioni!':pct>=70?'✅ Yaxşı nəticə!':pct>=50?'📈 Orta':'💪 Davam et!';
  document.getElementById('rsub').textContent=`${correct} / ${QS.length} düzgün · ${pct}% · ${Math.floor(elapsed/60)}:${pad(elapsed%60)} vaxt`;
  try{
    const p={itemId:TEST_ID,points:correct,maxPoints:QS.length,timeSpentSeconds:elapsed};
    window.parent.postMessage({type:'SCORE_UPDATE',payload:p},'*');
    if(pct>=50)window.parent.postMessage({type:'LESSON_COMPLETE',payload:p},'*');
  }catch(e){}
}
function toggleReview(){
  const rev=document.getElementById('rev');
  if(!rev.classList.contains('hidden')){rev.classList.add('hidden');return;}
  rev.classList.remove('hidden');
  rev.innerHTML=QS.map((q,i)=>{
    const ok=ans[i]===q.a;
    const my=ans[i]>=0?LABELS[ans[i]]+') '+q.o[ans[i]]:'Cavabsız';
    return `<div class="ri ${ok?'ok':'ng'}"><div class="rq">${i+1}. <span style="font-size:10px;color:#60a5fa">${q.t}</span><br>${q.q}</div><div class="ra">${!ok?`<span class="ng-a">Cavabınız: ${my}</span> &nbsp;·&nbsp; `:''}<span class="ok-a">Düzgün: ${LABELS[q.a]}) ${q.o[q.a]}</span></div>${q.e?`<div class="re">💡 ${q.e}</div>`:''}</div>`;
  }).join('');
  rev.scrollIntoView({behavior:'smooth'});
}
function restartTest(){
  clearInterval(tmrId);elapsed=0;timeLeft=TIME_LIMIT;idx=0;
  document.getElementById('res').style.display='none';
  document.getElementById('start').classList.remove('hidden');
}
</script>
</body>
</html>
