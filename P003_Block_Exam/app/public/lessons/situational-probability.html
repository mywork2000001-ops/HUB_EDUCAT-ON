<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ситуация: Вероятность</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 2rem;
    }
    .container { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .scenario {
      background: #fff;
      border-left: 4px solid #2563eb;
      border-radius: 0 8px 8px 0;
      padding: 1.25rem;
      margin: 1.5rem 0;
    }
    .scenario h3 { font-size: 1rem; margin-bottom: 0.5rem; color: #2563eb; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin: 0.5rem 0.5rem 0 0;
    }
    .btn:hover { background: #1d4ed8; }
    .btn.outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
    .btn.outline:hover { background: #f3f4f6; }
    #feedback { margin-top: 1.5rem; padding: 1rem; border-radius: 6px; display: none; }
    #feedback.correct { background: #dcfce7; color: #166534; display: block; }
    #feedback.wrong { background: #fee2e2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ситуация: Вероятность в быту</h1>
    <p>Прочитайте сценарий и выберите правильный ответ.</p>

    <div class="scenario">
      <h3>Задача</h3>
      <p>В корзине 5 красных, 3 зелёных и 2 синих шара. Какова вероятность
      вытащить красный шар при случайном выборе?</p>
    </div>

    <button class="btn outline" data-answer="wrong">A) 1/2</button>
    <button class="btn outline" data-answer="correct">B) 1/2 → 5/10 = 1/2 ✓</button>
    <button class="btn outline" data-answer="wrong">C) 5/8</button>

    <div id="feedback"></div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.btn');
    const feedback = document.getElementById('feedback');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const isCorrect = btn.dataset.answer === 'correct';
        feedback.className = isCorrect ? 'correct' : 'wrong';
        feedback.textContent = isCorrect
          ? 'Верно! Вероятность = 5/10 = 1/2. Результат отправлен.'
          : 'Неверно. Подсказка: всего 10 шаров, 5 из них красные.';

        if (isCorrect) {
          buttons.forEach(b => b.disabled = true);
          window.parent.postMessage({
            type: 'LESSON_COMPLETE',
            payload: {
              lessonId: 'situational-probability-001',
              points: 1,
              maxPoints: 1,
              timeSpentSeconds: 90
            }
          }, '*');
          window.parent.postMessage({
            type: 'SCORE_UPDATE',
            payload: {
              lessonId: 'situational-probability-001',
              points: 1,
              maxPoints: 1,
              timeSpentSeconds: 90
            }
          }, '*');
        }
      });
    });
  </script>
</body>
</html>
