    />

    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --primary: #10b981;
        --primary-hover: #059669;
        --primary-light: #d1fae5;
        --danger: #ef4444;
        --warning: #f59e0b;
        --shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --radius: 1rem;
      }
      .dark {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --primary: #34d399;
        --primary-hover: #10b981;
        --primary-light: #064e3b;
        --shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
      }
      * {
        font-family: "Inter", system-ui, sans-serif;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.3s,
          color 0.3s;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 600;
        transition: all 0.2s;
        border: none;
        cursor: pointer;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: var(--border);
        color: var(--text);
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 500;
        transition: all 0.2s;
        border: 1px solid var(--border);
        cursor: pointer;
      }
      .btn-secondary:hover {
        background: var(--bg);
      }
      .q-btn {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.65rem;
        font-weight: 600;
        font-size: 0.875rem;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .q-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .q-btn.active {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }
      .q-btn.answered {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
      }
      .option {
        padding: 1rem;
        border: 2px solid var(--border);
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .option:hover {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .option.selected {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .option.correct {
        border-color: var(--primary);
        background: #ecfdf5;
      }
      .option.wrong {
        border-color: var(--danger);
        background: #fef2f2;
      }
      .dark .option.correct {
        background: #064e3b;
      }
      .dark .option.wrong {
        background: #450a0a;
      }
      .tab {
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: transparent;
        color: var(--muted);
      }
      .tab.active {
        background: var(--primary-light);
        color: var(--primary);
      }
      .progress-bar {
        height: 0.5rem;
        background: var(--border);
        border-radius: 9999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--primary);
        border-radius: 9999px;
        transition: width 0.5s ease;
      }
      .fade-in {
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .number-line {
        width: 100%;
        height: 80px;
      }
      @media (max-width: 640px) {
        .q-btn {
          width: 2.25rem;
          height: 2.25rem;
          font-size: 0.75rem;
        }
      }
    </style>
    <base target="_blank" />
  </head>
  <body class="min-h-screen">
    <header
      class="sticky top-0 z-50 backdrop-blur-md bg-opacity-90"
      style="background: var(--surface); border-bottom: 1px solid var(--border)"
    >
      <div
        class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg"
            style="background: var(--primary)"
          >
            DİM
          </div>
          <div>
            <h1
              class="text-sm sm:text-base font-bold leading-tight"
              id="examTitle"
            ></h1>
            <p
              class="text-xs"
              style="color: var(--muted)"
              id="examSubtitle"
            ></p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="toggleLang()" class="tab" id="langBtn">RU</button>
          <button onclick="toggleTheme()" class="tab" aria-label="Dark mode">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid gap-6">
      <div class="card p-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="timer">60:00</div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblTimer"
            ></div>
          </div>
          <div class="w-px h-10" style="background: var(--border)"></div>
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="answeredCount">
              0/40
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblAnswered"
            ></div>
          </div>
        </div>
        <div class="flex-1 min-w-[200px]">
          <div
            class="flex justify-between text-xs mb-1"
            style="color: var(--muted)"
          >
            <span id="lblProgress"></span><span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-2 overflow-x-auto pb-1" id="variantTabs"></div>

      <div class="grid lg:grid-cols-[280px_1fr] gap-6">
        <aside class="space-y-4">
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-3" id="lblGrid"></h3>
            <div class="grid grid-cols-5 gap-2" id="questionGrid"></div>
          </div>
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-2" id="lblLegend"></h3>
            <div
              class="flex items-center gap-2 text-xs mb-1"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm border"
                style="border-color: var(--border); background: var(--surface)"
              ></span>
              <span id="legEmpty"></span>
            </div>
            <div
              class="flex items-center gap-2 text-xs mb-1"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm"
                style="background: var(--primary)"
              ></span>
              <span id="legAnswered"></span>
            </div>
            <div
              class="flex items-center gap-2 text-xs"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm"
                style="
                  background: var(--primary-light);
                  border: 2px solid var(--primary);
                "
              ></span>
              <span id="legCurrent"></span>
            </div>
          </div>
        </aside>

        <section class="card p-6 flex flex-col gap-6" id="questionCard">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span
                class="px-3 py-1 rounded-lg text-sm font-bold text-white"
                style="background: var(--primary)"
                id="qBadge"
                >A1</span
              >
              <span
                class="text-sm font-medium"
                style="color: var(--muted)"
                id="qCounter"
                >1 / 10</span
              >
            </div>
            <span
              class="text-xs px-2 py-1 rounded-md"
              style="background: var(--primary-light); color: var(--primary)"
              id="qType"
            ></span>
          </div>

          <div class="fade-in" id="qContent">
            <h2
              class="text-lg font-semibold leading-relaxed mb-4"
              id="qText"
            ></h2>
            <div id="qImage" class="mb-4 flex justify-center"></div>
            <div class="space-y-3" id="qOptions"></div>
          </div>

          <div
            class="flex items-center justify-between pt-4 border-t"
            style="border-color: var(--border)"
          >
            <button
              onclick="prevQuestion()"
              class="btn-secondary"
              id="btnPrev"
            ></button>
            <div class="flex gap-2">
              <button
                onclick="finishExam()"
                class="btn-secondary text-red-500 border-red-200 hover:bg-red-50"
                id="btnFinish"
              ></button>
              <button
                onclick="nextQuestion()"
                class="btn-primary"
                id="btnNext"
              ></button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      id="resultModal"
      class="fixed inset-0 z-[100] hidden items-center justify-center p-4"
      style="background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px)"
    >
      <div
        class="card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 space-y-6"
      >
        <div class="text-center">
          <div
            class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white"
            style="background: var(--primary)"
            id="resultScoreIcon"
          >
            0
          </div>
          <h2 class="text-2xl font-bold mb-1" id="resTitle"></h2>
          <p class="text-sm" style="color: var(--muted)" id="resultMessage"></p>
        </div>

        <div class="grid grid-cols-3 gap-4">
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-emerald-500" id="correctCount">
              0
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblCorrect"
            ></div>
          </div>
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-red-500" id="wrongCount">0</div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblWrong"
            ></div>
          </div>
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-amber-500" id="emptyCount">
              0
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblEmpty"
            ></div>
          </div>
        </div>

        <div class="flex gap-3 justify-center flex-wrap">
          <button
            onclick="showReview()"
            class="btn-primary"
            id="btnReview"
          ></button>
          <button
            onclick="resetExam()"
            class="btn-secondary"
            id="btnRestart"
          ></button>
          <button
            onclick="closeResults()"
            class="btn-secondary"
            id="btnClose"
          ></button>
        </div>
      </div>
    </div>

      const STORAGE_KEY = "dim2025_natural_toplanma_cixilma_v1";

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const saved = JSON.parse(raw);
            if (saved.answers) state.answers = saved.answers;
            if (saved.timeLeft != null) state.timeLeft = saved.timeLeft;
            if (saved.finished != null) state.finished = saved.finished;
            if (saved.lang) state.lang = saved.lang;
          }
        } catch (e) {}
      }

      function saveState() {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            answers: state.answers,
            timeLeft: state.timeLeft,
            finished: state.finished,
            lang: state.lang,
          }),
        );
      }

      function clearState() {
        localStorage.removeItem(STORAGE_KEY);
        state.answers = {};
        state.timeLeft = examData.timeLimit * 60;
        state.finished = false;
        state.review = false;
      }

        document.getElementById("resTitle").textContent = L.resTitle;
        document.getElementById("lblCorrect").textContent = L.correct;
        document.getElementById("lblWrong").textContent = L.wrong;

      function renderVariantTabs() {
        const container = document.getElementById("variantTabs");
        container.innerHTML = "";
        examData.variants.forEach((v, i) => {
          const btn = document.createElement("button");
          btn.className = "tab " + (i === state.variantIndex ? "active" : "");
          btn.textContent = v.name[state.lang];
          btn.onclick = () => {
            state.variantIndex = i;
            state.questionIndex = 0;
            renderAll();
          };
          container.appendChild(btn);
        });
      }

      function renderQuestionGrid() {
        const container = document.getElementById("questionGrid");
        container.innerHTML = "";
        const variant = examData.variants[state.variantIndex];
        variant.questions.forEach((q, i) => {
          const key = variant.id + "-" + q.id;
          const btn = document.createElement("button");
          btn.className = "q-btn";
          if (i === state.questionIndex) btn.classList.add("active");
          if (state.answers[key]) btn.classList.add("answered");
          btn.textContent = q.id;
          btn.onclick = () => {
            state.questionIndex = i;
            renderAll();
          };
          container.appendChild(btn);
        });
      }

      function renderQuestion() {
        const variant = examData.variants[state.variantIndex];
        const q = variant.questions[state.questionIndex];
        const key = variant.id + "-" + q.id;
        const saved = state.answers[key];
        const L = state.lang;

        document.getElementById("qBadge").textContent = variant.id + q.id;
        document.getElementById("qCounter").textContent =
          state.questionIndex + 1 + " / " + variant.questions.length;
        document.getElementById("qText").innerHTML = q.text[L];

        const imgDiv = document.getElementById("qImage");
        imgDiv.innerHTML = q.image || "";

        const optsDiv = document.getElementById("qOptions");
        optsDiv.innerHTML = "";
        q.options[L].forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          const div = document.createElement("div");
          div.className = "option";
          if (saved === letter) div.classList.add("selected");
          if (state.review) {
            if (letter === q.correct) div.classList.add("correct");
            else if (saved === letter) div.classList.add("wrong");
          }
          div.innerHTML = `<span class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold shrink-0" style="background: var(--primary-light); color: var(--primary);">${letter}</span><span class="text-sm">${opt}</span>`;
          if (!state.review) {
            div.onclick = () => {
              state.answers[key] = letter;
              saveState();
              renderAll();
            };
          }
          optsDiv.appendChild(div);
        });

        if (window.renderMathInElement) {
          setTimeout(
            () =>
              renderMathInElement(document.getElementById("qContent"), {
                delimiters: [
                  { left: "$$", right: "$$", display: true },
                  { left: "$", right: "$", display: false },
                ],
              }),
            10,
          );
        }
      }

      function updateProgress() {
        const total = examData.variants.reduce(
          (s, v) => s + v.questions.length,
          0,
        );
        const answered = Object.keys(state.answers).length;
        const pct = Math.round((answered / total) * 100);
        document.getElementById("answeredCount").textContent =
          answered + "/" + total;
        document.getElementById("progressPercent").textContent = pct + "%";
        document.getElementById("progressBar").style.width = pct + "%";
      }

      function renderAll() {
        renderVariantTabs();
        renderQuestionGrid();
        renderQuestion();
        updateProgress();
        updateTexts();
      }

      function prevQuestion() {
        if (state.questionIndex > 0) {
          state.questionIndex--;
          renderAll();
        }
      }
      function nextQuestion() {
        const variant = examData.variants[state.variantIndex];
        if (state.questionIndex < variant.questions.length - 1) {
          state.questionIndex++;
          renderAll();
        }
      }

      let timerInterval;
      function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (state.finished) return;
          state.timeLeft--;
          saveState();
          updateTimerDisplay();
          if (state.timeLeft <= 0) {
            finishExam();
          }
        }, 1000);
      }

      function updateTimerDisplay() {
        const m = Math.floor(state.timeLeft / 60)
          .toString()
          .padStart(2, "0");
        const s = (state.timeLeft % 60).toString().padStart(2, "0");
        const el = document.getElementById("timer");
        el.textContent = m + ":" + s;
        if (state.timeLeft < 300) el.classList.add("text-red-500");
        else el.classList.remove("text-red-500");
      }

      function finishExam() {
        state.finished = true;
        saveState();
        clearInterval(timerInterval);
        showResults();
      }

      function calculateResults() {
        let correct = 0,
          wrong = 0,
          empty = 0;
        examData.variants.forEach((v) => {
          v.questions.forEach((q) => {
            const key = v.id + "-" + q.id;
            const ans = state.answers[key];
            if (!ans) empty++;
            else if (ans === q.correct) correct++;
            else wrong++;
          });
        });
        return { correct, wrong, empty, total: correct + wrong + empty };
      }

      function showResults() {
        const r = calculateResults();
        document.getElementById("correctCount").textContent = r.correct;
        document.getElementById("wrongCount").textContent = r.wrong;
        document.getElementById("emptyCount").textContent = r.empty;
        document.getElementById("resultScoreIcon").textContent = r.correct;

        const msg =
          state.lang === "ru"
            ? `Правильных ответов: ${r.correct} из ${r.total}. Точность: ${Math.round((r.correct / r.total) * 100)}%`
            : `Düzgün cavablar: ${r.correct} / ${r.total}. Dəqiqlik: ${Math.round((r.correct / r.total) * 100)}%`;
        document.getElementById("resultMessage").textContent = msg;

        document.getElementById("resultModal").classList.remove("hidden");
        document.getElementById("resultModal").classList.add("flex");
      }

      function closeResults() {
        document.getElementById("resultModal").classList.add("hidden");
        document.getElementById("resultModal").classList.remove("flex");
      }

      function showReview() {
        state.review = true;
        state.variantIndex = 0;
        state.questionIndex = 0;
        closeResults();
        renderAll();
      }

        if (
          !confirm(
            state.lang === "ru"
              ? "Начать заново? Все ответы будут удалены."
              : "Yenidən başlamaq? Bütün cavablar silinəcək.",
          )
        )
          return;
        clearState();
        closeResults();
        renderAll();
        startTimer();
      }

      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
      }

      function toggleLang() {
        const _lg = ["az", "ru", "en"];
        state.lang = _lg[(_lg.indexOf(state.lang) + 1) % 3];
        saveState();
        renderAll();
      }

      loadState();
      renderAll();
      updateTimerDisplay();
      if (!state.finished) startTimer();
      else if (state.finished) showResults();

      document.addEventListener("keydown", (e) => {
        if (state.finished && !state.review) return;
        if (e.key === "ArrowLeft") prevQuestion();
        if (e.key === "ArrowRight") nextQuestion();
        if (e.key >= "1" && e.key <= "5") {
          const variant = examData.variants[state.variantIndex];
          const q = variant.questions[state.questionIndex];
          const idx = parseInt(e.key) - 1;
          if (idx < q.options[state.lang].length) {
            const letter = String.fromCharCode(65 + idx);
            state.answers[variant.id + "-" + q.id] = letter;
            saveState();
            renderAll();
          }
        }
      });

              state.variantIndex !== undefined ? state.variantIndex : 0;
            const qs =
              typeof QS !== "undefined"
                ? QS
                : typeof examData !== "undefined" && examData.variants
                  ? examData.variants
                  : [];
            const currentVariant = qs[variant] || qs[0];

            if (currentVariant && currentVariant.questions) {
              totalQuestions = currentVariant.questions.length;
              answers = state.answers || {};
              answersCount = Object.keys(answers).length;

              // Подсчёт правильных ответов
              for (let i = 0; i < currentVariant.questions.length; i++) {
                const q = currentVariant.questions[i];
                const key = `${currentVariant.id || "A"}-${q.id}`;
                if (answers[key] === q.correct) {
                  correctCount++;
                }
              }
              completed = state.finished === true;
            }
          } else if (typeof state !== "undefined" && state.ans) {
            // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === state.v);
            totalQuestions = variantQs.length;
            answers = state.ans || {};
            answersCount = Object.keys(answers).length;

            for (let i = 0; i < variantQs.length; i++) {
              const q = variantQs[i];
              const userAns = answers[q.id];
              if (userAns !== undefined) {
                if (q.t === "choice") {
                  if (userAns === q.ans) correctCount++;
                } else if (q.t === "open" || q.t === "match") {
                  if (
                    String(userAns).trim().toLowerCase() ===
                    String(q.ans_text || "")
                      .trim()
                      .toLowerCase()
                  )
                    correctCount++;
                }
              }
            }
            completed = state.finished === true;
          } else if (typeof S !== "undefined" && S.ans) {
            // Альтернативная структура (Lesson-13, 14)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === S.v);
            totalQuestions = variantQs.length;
            answers = S.ans || {};
            answersCount = Object.keys(answers).length;
            completed = S.finished === true;
          }

          if (totalQuestions === 0) return;

          window.parent.postMessage(
            {
              type: "lessonProgress",
              lessonId: parseInt(
                window.location.pathname.match(/Lesson-(\d+)/)?.[1] || "0",
              ),
              answersCount: answersCount,
              totalQuestions: totalQuestions,
              correctCount: correctCount,
              completed: completed,
              answers: answers,
            },
            "*",
          );
        }

        // Перехватываем вызовы finishExam/resetExam/showReview для отправки прогресса
        const originalFinish = window.finishExam;
        if (originalFinish) {
          window.finishExam = function (...args) {
            const result = originalFinish.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalReset = window.resetExam;
        if (originalReset) {
          window.resetExam = function (...args) {
            const result = originalReset.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalShowReview = window.showReview;
        if (originalShowReview) {
          window.showReview = function (...args) {
            const result = originalShowReview.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        // Отправляем прогресс при каждом ответе (перехватываем выбор варианта)
        const originalPick = window.pick;
        if (originalPick) {
          window.pick = function (...args) {
            const result = originalPick.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        const originalSaveT = window.saveT;
        if (originalSaveT) {
          window.saveT = function (...args) {
            const result = originalSaveT.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Для уроков с toggleVariant и т.д.
        const originalRenderAll = window.renderAll;
        if (originalRenderAll) {
          window.renderAll = function (...args) {
            const result = originalRenderAll.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Периодическая отправка прогресса (каждые 3 секунды)
        setInterval(sendProgress, 3000);

        // Запрос времени у родителя
        if (window.parent) {
          window.parent.postMessage({ type: "requestTimer" }, "*");
        }

        // Приём сообщений от родителя
        window.addEventListener("message", function (event) {
          if (event.data && event.data.type === "syncTimer") {
            if (typeof state !== "undefined" && state.timeLeft !== undefined) {
              state.timeLeft = event.data.timeLeft;
              if (typeof updateTimerDisplay === "function")
                updateTimerDisplay();
            } else if (typeof S !== "undefined" && S.timer !== undefined) {
              S.timer = event.data.timeLeft;
            }
          }
          if (event.data && event.data.type === "forceFinish") {
            if (typeof finishExam === "function") finishExam();
          }
          if (event.data && event.data.type === "restoreProgress") {
            // Восстановление сохранённых ответов
            const saved = event.data.progress;
            if (saved && saved.answers) {
              if (typeof state !== "undefined" && state.answers) {
                state.answers = saved.answers;
                if (typeof renderAll === "function") renderAll();
              }
            }
          }
        });

        // Отправляем прогресс при загрузке
        setTimeout(sendProgress, 500);
      })();
    </script>
  </body>
</html>
