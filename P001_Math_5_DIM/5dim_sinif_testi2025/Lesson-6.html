<header class="sticky top-0 z-50 backdrop-blur-md bg-opacity-90" style="background: var(--surface); border-bottom: 1px solid var(--border);">

    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg" style="background: var(--primary);">DİM</div>
      <div>
        <h1 class="text-sm sm:text-base font-bold leading-tight" id="examTitle">Adi kəsrlərin toplanması və çıxılması</h1>
        <p class="text-xs" style="color: var(--muted);" id="examSubtitle">Riyaziyyat | V sinif | 2025</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="lang-selector"><button onclick="setLang('az')" class="lang-btn active" id="lbAZ">AZ</button><button onclick="setLang('ru')" class="lang-btn" id="lbRU">RU</button><button onclick="setLang('en')" class="lang-btn" id="lbEN">EN</button></div>

    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6 grid gap-6">
  <div class="card p-4 flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-4">

    </div>
    <div class="flex-1 min-w-[200px]">
      <div class="flex justify-between text-xs mb-1" style="color: var(--muted);"><span id="lblProgress">Tərəqqi</span><span id="progressPercent">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="flex gap-2 overflow-x-auto pb-1" id="variantTabs"></div>

  <div class="grid lg:grid-cols-[280px_1fr] gap-6">
    <aside class="space-y-4">
      <div class="card p-4">
        <h3 class="text-sm font-semibold mb-3">Sual gridi</h3>
        <div class="grid grid-cols-5 gap-2" id="questionGrid"></div>
      </div>
    </aside>

    <section class="card p-6 flex flex-col gap-6" id="questionCard">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="px-3 py-1 rounded-lg text-sm font-bold text-white" style="background: var(--primary);" id="qBadge">A1</span>
          <span class="text-sm font-medium" style="color: var(--muted);" id="qCounter">1 / 10</span>
        </div>
      </div>

      <div class="fade-in" id="qContent">
        <h2 class="text-lg font-semibold leading-relaxed mb-4" id="qText"></h2>
        <div id="qMatching" class="matching-grid hidden"></div>
        <div class="space-y-3" id="qOptions"></div>
      </div>

      <div class="flex items-center justify-between pt-4 border-t" style="border-color: var(--border);">
        <button onclick="prevQuestion()" class="btn-secondary" id="btnPrev">Əvvəlki</button>
        <div class="flex gap-2">
          <button onclick="finishExam()" class="btn-secondary text-red-500 border-red-200" id="btnFinish">Bitir</button>
          <button onclick="nextQuestion()" class="btn-primary" id="btnNext">Növbəti</button>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="resultModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
  <div class="card w-full max-w-2xl p-6 space-y-6">
    <div class="text-center">
      <div class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white" style="background: var(--primary);" id="resultScoreIcon">0</div>
      <h2 class="text-2xl font-bold mb-1">Nəticə</h2>
      <p class="text-sm" id="resultMessage" style="color: var(--muted);"></p>

    <div class="grid grid-cols-3 gap-4">

    <div class="flex gap-3 justify-center">
      <button onclick="showReview()" class="btn-primary">Səhvlərə bax</button>
      <button onclick="resetExam()" class="btn-secondary">Yenidən</button>

</div>

        let answersCount = 0;

                // Подсчёт правильных ответов
                for (let i = 0; i < currentVariant.questions.length; i++) {
                    const q = currentVariant.questions[i];
                    const key = `${currentVariant.id || 'A'}-${q.id}`;
                    if (answers[key] === q.correct) {
                        correctCount++;
                    }
                }
                completed = state.finished === true;
            }

            // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)

            answers = state.ans || {};
            answersCount = Object.keys(answers).length;
            
            for (let i = 0; i < variantQs.length; i++) {
                const q = variantQs[i];
                const userAns = answers[q.id];
                if (userAns !== undefined) {
                    if (q.t === 'choice') {
                        if (userAns === q.ans) correctCount++;
                    } else if (q.t === 'open' || q.t === 'match') {
                        if (String(userAns).trim().toLowerCase() === String(q.ans_text || '').trim().toLowerCase()) correctCount++;

            completed = state.finished === true;

        }
    });
    
    // Отправляем прогресс при загрузке
    setTimeout(sendProgress, 500);
})();
</script>
