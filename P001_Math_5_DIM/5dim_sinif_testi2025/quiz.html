  <style>
    /* ── Quiz-specific overrides ─────────────────────────── */
    .hidden { display: none !important; }

    /* Lesson picker list */
    .lesson-list {
      max-height: 400px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: 10px;
    }
    .lesson-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .12s;
    }
    .lesson-item:last-child { border-bottom: none; }
    .lesson-item:hover { background: var(--primary-light); }
    .lesson-item input[type=checkbox] {
      width: 17px; height: 17px; cursor: pointer;
      accent-color: var(--primary); flex-shrink: 0;
    }
    .lesson-item label { cursor: pointer; flex: 1; font-size: 13px; line-height: 1.4; }
    .lesson-qs {
      font-size: 11px; white-space: nowrap; background: var(--primary-light);
      color: var(--primary); padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
    }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-around;
    }
    .stat-pill { text-align: center; min-width: 70px; }
    .stat-val { font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* Q count input */
    .q-count-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .q-count-row input[type=number] {
      width: 90px; padding: 8px 10px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: 20px; font-weight: 700; color: var(--primary);
      text-align: center; outline: none; font-family: inherit;
      background: var(--bg);
      -moz-appearance: textfield;
    }
    .q-count-row input[type=number]::-webkit-outer-spin-button,
    .q-count-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .q-count-row input[type=number]:focus { border-color: var(--primary); }
    .q-max-lbl { font-size: 13px; color: var(--muted); }
    .range-wrap { margin: 8px 0; }
    .range-wrap input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

    /* Loading spinner */
    .spin { display: inline-block; animation: spin 1s linear infinite; font-size: 48px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Quiz option buttons — extend existing .option */
    .option-letter {
      min-width: 28px; height: 28px; border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; flex-shrink: 0;
    }
    .option.selected .option-letter { background: var(--primary); color: white; }
    .option.correct .option-letter  { background: #22c55e; color: white; }
    .option.wrong   .option-letter  { background: var(--danger); color: white; }
    .option { cursor: pointer; }
    .option:disabled, .option[data-disabled] { cursor: default; }

    /* Question dot grid */
    .q-dot {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; cursor: pointer;
      transition: all .15s;
    }
    .q-dot.cur   { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .q-dot.ans   { background: var(--primary); border-color: var(--primary); color: white; }
    .q-dot.ok    { background: #22c55e; border-color: #22c55e; color: white; }
    .q-dot.fail  { background: var(--danger); border-color: var(--danger); color: white; }

    /* Timer */
    .timer-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .timer-urgent { color: var(--danger); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* Error box */
    .err-box {
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
      color: #b91c1c; margin-top: 8px;
    }

    /* Section header */
    .sec-hdr { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  </style>

  /* ══════════════════════════════════════════════════════
     EXTRACT examData FROM FETCHED HTML
     examData uses numberLine(...) in image fields — we
     pass a real implementation so images render correctly.
  ══════════════════════════════════════════════════════ */
  function _numberLine(min, max, step, points, labels) {
    const w = 400, h = 80, pad = 30;
    const scale = (w - 2 * pad) / (max - min);
    const NS = 'http://www.w3.org/2000/svg';
    let s = `<svg viewBox="0 0 ${w} ${h}" class="number-line" xmlns="${NS}">`;
    s += `<line x1="${pad}" y1="${h/2}" x2="${w-pad}" y2="${h/2}" stroke="currentColor" stroke-width="2"/>`;
    s += `<polygon points="${w-pad},${h/2} ${w-pad-8},${h/2-5} ${w-pad-8},${h/2+5}" fill="currentColor"/>`;
    for (let v = min; v <= max; v += step) {
      const x = pad + (v - min) * scale;
      s += `<line x1="${x}" y1="${h/2-6}" x2="${x}" y2="${h/2+6}" stroke="currentColor" stroke-width="2"/>`;
      s += `<text x="${x}" y="${h/2+22}" text-anchor="middle" font-size="12" fill="currentColor">${v}</text>`;
    }
    points.forEach((p, i) => {
      const x = pad + (p - min) * scale;
      s += `<circle cx="${x}" cy="${h/2}" r="5" fill="var(--primary)" stroke="white" stroke-width="2"/>`;
      s += `<text x="${x}" y="${h/2-12}" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--primary)">${labels[i]}</text>`;
    });
    return s + '</svg>';
  }

  function extractExamData(html) {
    const marker = 'const examData =';
    const pos = html.indexOf(marker);
    if (pos === -1) return null;
    const objStart = html.indexOf('{', pos + marker.length);
    if (objStart === -1) return null;
    let depth = 0, inStr = false, strCh = '', i = objStart;
    while (i < html.length) {
      const ch = html[i];
      if (inStr) {
        if (ch === '\\') { i += 2; continue; }
        if (ch === strCh) inStr = false;
      } else {
        if (ch === '"' || ch === "'") { inStr = true; strCh = ch; }
        else if (ch === '{') depth++;
        else if (ch === '}') { depth--; if (depth === 0) break; }
      }
      i++;
    }
    try {
      const fn = new Function('numberLine', 'return ' + html.slice(objStart, i + 1));
      return fn(_numberLine);
    } catch(e) { console.warn('Parse error in', e); return null; }
  }

      paramTitle:'⚙️ Settings', qLbl:'Question count:',
      listTitle:'📚 Lessons',
      selAll:'Select all', clrAll:'Clear all',
      startBtn:'Start Quiz',
      loading:'Loading questions…',
      errNoSel:'Select at least one lesson.',
      errCount:'Count must be between 1 and {max}.',
      errFetch:'Load error. Open via local server.',
      gridTitle:'Question grid',
      finishBtn:'✓ Finish', prevBtn:'← Previous', nextBtn:'Next →',
      resultTitle:'Result',
      correctL:'Correct', wrongL:'Wrong', emptyL:'Empty',
      reviewBtn:'Review answers', newQuizBtn:'New quiz',
      confirmFinish:'Finish the quiz?',
      passMsg:'Passed 🎉', failMsg:'Keep trying 💪',
    },
  };
  const t = () => T[lang];

  /* ══════════════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════════════ */
  const selected = new Set();
  let quizQ      = [];   // [{text, options, correct (0-idx), image, lessonTitle, lessonIcon}]
  let answers    = [];   // null | 0–4
  let curIdx     = 0;
  let timer      = null;
  let timeLeft   = 0;
  let finished   = false;

  /* ══════════════════════════════════════════════════════
     LANG / THEME
  ══════════════════════════════════════════════════════ */
  function setLang(l) {
    lang = l;
    localStorage.setItem('dim2025_lang', l);
    ['AZ','RU','EN'].forEach(x =>
      document.getElementById('lb'+x).classList.toggle('active', x.toLowerCase()===l));
    applyLangStrings();
    buildLessonList();
    updateStats();
    document.documentElement.lang = l;
  }

  function applyLangStrings() {
    const ids = {
      hdrTitle:'hdrTitle', hdrSub:'hdrSub', backLink:'back',
      statTopicsL:'topicsL', statAvailL:'availL', statSelL:'selL', statTimeL:'timeL',
      paramTitle:'paramTitle', qCountLabel:'qLbl',
      listTitle:'listTitle', selAllTxt:'selAll', clrAllTxt:'clrAll',
      startBtnTxt:'startBtn', loadingTxt:'loading',
      gridTitle:'gridTitle',
    };
    Object.entries(ids).forEach(([el, key]) => {
      const node = document.getElementById(el);
      if (node && t()[key] !== undefined) node.textContent = t()[key];
    });
  }

  function toggleTheme() {
    const dark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('dim2025_theme', dark ? 'dark' : 'light');
  }

  /* ══════════════════════════════════════════════════════
     BUILDER
  ══════════════════════════════════════════════════════ */
  function buildLessonList() {
    const cont = document.getElementById('lessonList');
    cont.innerHTML = '';
    LESSONS.forEach((L, i) => {
      const row = document.createElement('div');
      row.className = 'lesson-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.id = 'cb_'+i; cb.checked = selected.has(i);
      cb.addEventListener('change', () => {
        selected[cb.checked ? 'add' : 'delete'](i);
        updateStats();
      });
      const lbl = document.createElement('label');
      lbl.htmlFor = 'cb_'+i;
      lbl.innerHTML = `<span style="color:var(--primary);font-weight:700;font-size:11px;margin-right:4px">${L.id}.</span>${L.icon} ${L[lang]}`;
      const pill = document.createElement('span');
      pill.className = 'lesson-qs'; pill.textContent = '~'+L.qs+'Q';
      row.appendChild(cb); row.appendChild(lbl); row.appendChild(pill);
      row.addEventListener('click', e => {
        if (e.target.tagName !== 'INPUT') { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
      });
      cont.appendChild(row);
    });
  }

  function updateStats() {
    const totalQ = [...selected].reduce((s, i) => s + LESSONS[i].qs, 0);
    const inp = document.getElementById('qCountInp');
    const rng = document.getElementById('qRange');
    rng.max = Math.max(1, totalQ);
    inp.max  = totalQ;
    let count = parseInt(inp.value) || 0;
    if (totalQ > 0 && count > totalQ) { count = totalQ; inp.value = totalQ; }
    if (count < 1 && totalQ > 0)      { count = 1;      inp.value = 1; }
    rng.value = count;

    const mins = (count > 0 && totalQ > 0) ? Math.max(5, Math.ceil(count * 1.5)) : 0;
    document.getElementById('statTopics').textContent = selected.size;
    document.getElementById('statAvail').textContent  = totalQ;
    document.getElementById('statSel').textContent    = (count>0 && count<=totalQ) ? count : '—';
    document.getElementById('statTime').textContent   = mins || '—';
    document.getElementById('qMaxLbl').textContent    = '/ max '+totalQ;
    document.getElementById('quizStartBtn').disabled  =
      !(selected.size > 0 && count >= 1 && count <= totalQ);
    hideErr();
  }

  function onCountChange() {
    document.getElementById('qRange').value = document.getElementById('qCountInp').value;
    updateStats();
  }
  function onRangeChange(v) {
    document.getElementById('qCountInp').value = v;
    updateStats();
  }
  function selectAll(v) {
    LESSONS.forEach((_, i) => selected[v ? 'add' : 'delete'](i));
    document.querySelectorAll('#lessonList input[type=checkbox]').forEach(cb => cb.checked = v);
    updateStats();
  }

  /* ══════════════════════════════════════════════════════
     START QUIZ — fetch + parse
  ══════════════════════════════════════════════════════ */
  const LETTER = {A:0, B:1, C:2, D:3, E:4};

  async function startQuiz() {
    const totalQ = [...selected].reduce((s, i) => s + LESSONS[i].qs, 0);
    const count  = parseInt(document.getElementById('qCountInp').value);
    if (selected.size === 0) { showErr(t().errNoSel); return; }
    if (!count || count < 1 || count > totalQ) {
      showErr(t().errCount.replace('{max}', totalQ)); return;
    }

    showScreen('loadingScreen');
    document.getElementById('loadingTxt').textContent = t().loading;
    document.getElementById('loadingProg').textContent = '';

    try {
      const pool = [];
      const selArr = [...selected];
      for (let fi = 0; fi < selArr.length; fi++) {
        const L = LESSONS[selArr[fi]];
        document.getElementById('loadingProg').textContent =
          `${fi+1} / ${selArr.length}  —  ${L[lang]}`;
        const html = await fetch(L.file).then(r => r.text());
        const data = extractExamData(html);
        if (!data || !Array.isArray(data.variants)) continue;
        data.variants.forEach(v => {
          (v.questions || []).forEach(q => {
            if (!q.text || !q.options || !q.correct) return;
            const ci = LETTER[q.correct];
            if (ci === undefined) return;
            pool.push({
              text:       q.text,
              options:    q.options,
              correct:    ci,
              image:      q.image || '',
              lessonTitle: L[lang],
              lessonIcon:  L.icon,
            });
          });
        });
      }

      if (pool.length === 0) throw new Error('empty pool');

      // Fisher-Yates shuffle
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i+1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      quizQ   = pool.slice(0, Math.min(count, pool.length));
      answers = new Array(quizQ.length).fill(null);
      curIdx  = 0;
      finished = false;
      timeLeft = Math.max(300, quizQ.length * 90);

      showScreen('quizScreen');
      startTimer();
      renderQ();
      renderDots();
      updateBar();

    } catch(e) {
      console.error(e);
      showScreen('builderScreen');
      showErr(t().errFetch);
    }
  }

  /* ══════════════════════════════════════════════════════
     TIMER
  ══════════════════════════════════════════════════════ */
  function startTimer() {
    if (timer) clearInterval(timer);
    renderTimer();
    timer = setInterval(() => {
      if (timeLeft > 0) { timeLeft--; renderTimer(); }
      else { clearInterval(timer); finishQuiz(true); }
    }, 1000);
  }

  function renderTimer() {
    const el = document.getElementById('quizTimer');
    const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s = String(timeLeft % 60).padStart(2,'0');
    el.textContent = m+':'+s;
    el.classList.toggle('timer-urgent', timeLeft < 60);
  }

  /* ══════════════════════════════════════════════════════
     RENDER QUESTION
  ══════════════════════════════════════════════════════ */
  function renderQ() {
    const q    = quizQ[curIdx];
    const total = quizQ.length;
    const LETTERS = ['A','B','C','D','E'];

    document.getElementById('qBadge').textContent = curIdx+1;
    document.getElementById('qMeta').textContent  =
      `${curIdx+1} / ${total}  ·  ${q.lessonIcon} ${q.lessonTitle}`;

    const qText = q.text[lang] || q.text.az;
    document.getElementById('qText').textContent = qText;

    const imgEl = document.getElementById('qImage');
    imgEl.innerHTML = q.image || '';
    imgEl.style.display = q.image ? '' : 'none';

    const opts = q.options[lang] || q.options.az;
    const optsCont = document.getElementById('qOptions');
    optsCont.innerHTML = '';
    opts.forEach((opt, i) => {
      const btn = document.createElement('div');
      btn.className = 'option';
      btn.setAttribute('role', 'button');
      btn.setAttribute('tabindex', '0');

      const ua = answers[curIdx];
      if (finished) {
        if (i === q.correct)      btn.classList.add('correct');
        else if (ua === i)        btn.classList.add('wrong');
      } else {
        if (ua === i)             btn.classList.add('selected');
      }

      btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span><span class="flex-1 text-sm">${opt}</span>`;

      if (!finished) {
        btn.addEventListener('click', () => pickAnswer(i));
        btn.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); pickAnswer(i); } });
      } else {
        btn.style.cursor = 'default';
      }
      optsCont.appendChild(btn);
    });

    document.getElementById('btnPrev').textContent = t().prevBtn;
    document.getElementById('btnPrev').disabled    = curIdx === 0;
    document.getElementById('btnNext').textContent =
      (curIdx === total-1) ? t().finishBtn : t().nextBtn;
    document.getElementById('btnFinishTop').textContent = t().finishBtn;
    document.getElementById('gridTitle').textContent    = t().gridTitle;
  }

  function pickAnswer(idx) {
    answers[curIdx] = idx;
    renderQ();
    renderDots();
    updateBar();
  }

  function prevQ() { if (curIdx > 0) { curIdx--; renderQ(); renderDots(); } }
  function nextQ() {
    if (curIdx < quizQ.length-1) { curIdx++; renderQ(); renderDots(); }
    else finishQuiz(false);
  }

  /* ══════════════════════════════════════════════════════
     DOTS
  ══════════════════════════════════════════════════════ */
  function renderDots() {
    const cont = document.getElementById('quizDots');
    cont.innerHTML = '';
    quizQ.forEach((q, i) => {
      const d = document.createElement('button');
      d.className = 'q-dot';
      d.textContent = i+1;
      if (i === curIdx) d.classList.add('cur');
      if (finished) {
        if      (answers[i] === null)      {} // empty
        else if (answers[i] === q.correct) d.classList.add('ok');
        else                               d.classList.add('fail');
      } else {
        if (answers[i] !== null) d.classList.add('ans');
      }
      d.addEventListener('click', () => { curIdx = i; renderQ(); renderDots(); });
      cont.appendChild(d);
    });
  }

  /* ══════════════════════════════════════════════════════
     PROGRESS BAR
  ══════════════════════════════════════════════════════ */
  function updateBar() {
    const done = answers.filter(a => a !== null).length;
    const pct  = Math.round(done / quizQ.length * 100);
    document.getElementById('quizAnsCount').textContent = `${done} / ${quizQ.length}`;
    document.getElementById('quizProgFill').style.width = pct + '%';
    document.getElementById('quizProgPct').textContent  = pct + '%';
  }

  /* ══════════════════════════════════════════════════════
     FINISH QUIZ
  ══════════════════════════════════════════════════════ */
  function finishQuiz(auto) {
    if (!auto && !confirm(t().confirmFinish)) return;
    if (timer) { clearInterval(timer); timer = null; }
    finished = true;
    renderQ(); renderDots();

    let correct=0, wrong=0, empty=0;
    quizQ.forEach((q,i) => {
      const a = answers[i];
      if (a === null)       empty++;
      else if (a===q.correct) correct++;
      else                  wrong++;
    });
    const total = quizQ.length;
    const pct   = Math.round(correct / total * 100);

    showScreen('resultScreen');
    const circle = document.getElementById('resultCircle');
    circle.textContent = pct+'%';
    circle.style.background = pct>=70 ? '#22c55e' : pct>=50 ? 'var(--warning)' : 'var(--danger)';

    document.getElementById('resultTitle').textContent = t().resultTitle;
    document.getElementById('resultMsg').textContent   =
      `${correct} / ${total}  ·  ${pct>=70 ? t().passMsg : t().failMsg}`;
    document.getElementById('resCorrect').textContent  = correct;
    document.getElementById('resWrong').textContent    = wrong;
    document.getElementById('resEmpty').textContent    = empty;
    document.getElementById('resCorrectL').textContent = t().correctL;
    document.getElementById('resWrongL').textContent   = t().wrongL;
    document.getElementById('resEmptyL').textContent   = t().emptyL;
    document.getElementById('btnReview').textContent   = t().reviewBtn;
    document.getElementById('btnNewQuiz').textContent  = t().newQuizBtn;
    document.getElementById('reviewWrap').classList.add('hidden');

    // Show certificate button if passed (≥60%)
    const certBtn = document.getElementById('btnCert');
    const certTxt = { az:'Sertifikat', ru:'Сертификат', en:'Certificate' };
    certBtn.style.display = pct >= 60 ? '' : 'none';
    document.getElementById('btnCertTxt').textContent = certTxt[lang] || 'Sertifikat';

    // Store result for certificate
    certBtn._result = { correct, total, pct };
  }

  /* ══════════════════════════════════════════════════════
     REVIEW
  ══════════════════════════════════════════════════════ */
  function showReview() {
    const wrap = document.getElementById('reviewWrap');
    wrap.classList.remove('hidden');
    wrap.innerHTML = '';
    const LETTERS = ['A','B','C','D','E'];
    quizQ.forEach((q, i) => {
      const ua   = answers[i];
      const ok   = ua === q.correct;
      const none = ua === null;
      const opts = q.options[lang] || q.options.az;
      const card = document.createElement('div');
      card.className = 'card p-4';
      card.style.borderLeft = `4px solid ${none ? 'var(--border)' : ok ? '#22c55e' : 'var(--danger)'}`;

      const statusIcon = none ? '⬜' : ok ? '✅' : '❌';
      const optsHtml = opts.map((o, oi) => {
        let cls = 'text-sm px-2 py-1 rounded';
        if (oi === q.correct) cls += ' font-bold text-emerald-600';
        if (oi === ua && !ok) cls += ' text-red-500';
        return `<div class="${cls}"><b>${LETTERS[oi]})</b> ${o}</div>`;
      }).join('');

      card.innerHTML = `
        <p class="font-semibold text-sm mb-2">${statusIcon} Q${i+1}: ${q.text[lang]||q.text.az}</p>
        ${q.image ? `<div class="mb-2 flex justify-center">${q.image}</div>` : ''}
        <div class="mt-1 space-y-1">${optsHtml}</div>
        <p class="text-xs mt-2" style="color:var(--muted)">
          ${q.lessonIcon} ${q.lessonTitle}
          ${!none && !ok ? ` · ${t().correctL}: ${LETTERS[q.correct]}) ${opts[q.correct]}` : ''}
        </p>`;
      wrap.appendChild(card);
    });
    wrap.scrollIntoView({ behavior:'smooth' });
  }

  /* ══════════════════════════════════════════════════════
     CERTIFICATE
  ══════════════════════════════════════════════════════ */
  function openCertificate() {
    const btn = document.getElementById('btnCert');
    const r   = btn._result || {};
    // Build achievement label from selected lessons
    const selLessons = LESSONS.filter(l => selectedIds.has(l.id));
    const achTitle = selLessons.length === 1
      ? selLessons[0][lang] || selLessons[0].az
      : `${selLessons.length} ${lang==='ru' ? 'модулей' : lang==='en' ? 'modules' : 'modul'}`;
    const name = prompt(
      lang==='ru' ? 'Введите ваше имя:' : lang==='en' ? 'Enter your name:' : 'Adınızı daxil edin:'
    );
    if (!name) return;
    EduCert.generate({
      name,
      platform:    'P001',
      achievement: achTitle,
      score:       r.correct,
      total:       r.total,
      percent:     r.pct,
      lang,
    });
  }

  /* ══════════════════════════════════════════════════════
     HELPERS
  ══════════════════════════════════════════════════════ */
  function showScreen(id) {
    ['builderScreen','loadingScreen','quizScreen','resultScreen']
      .forEach(s => document.getElementById(s).classList.toggle('hidden', s!==id));
  }
  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.classList.remove('hidden');
  }
  function hideErr() {
    document.getElementById('errMsg').classList.add('hidden');
  }
  function backToBuilder() {
    if (timer) { clearInterval(timer); timer = null; }
    finished = false; quizQ = []; answers = [];
    showScreen('builderScreen');
  }

  /* ══════════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════════ */
  (function init() {
    const theme = localStorage.getItem('dim2025_theme');
    if (theme === 'dark') document.documentElement.classList.add('dark');
    LESSONS.forEach((_, i) => selected.add(i));
    setLang(lang);
  })();

  </script>
</body>
