<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DİM 2025 – Fəza Fiqurları</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
      onload="
        renderMathInElement(document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
          ],
        })
      "
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen">
    <header
      class="sticky top-0 z-50 backdrop-blur-md bg-opacity-90"
      style="background: var(--surface); border-bottom: 1px solid var(--border)"
    >
      <div
        class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg"
            style="background: var(--primary)"
          >
            DİM
          </div>
          <div>
            <h1
              class="text-sm sm:text-base font-bold leading-tight"
              id="examTitle"
            ></h1>
            <p
              class="text-xs"
              style="color: var(--muted)"
              id="examSubtitle"
            ></p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="lang-selector">
            <button onclick="setLang('az')" class="lang-btn active" id="lbAZ">
              AZ
            </button>
            <button onclick="setLang('ru')" class="lang-btn" id="lbRU">
              RU
            </button>
            <button onclick="setLang('en')" class="lang-btn" id="lbEN">
              EN
            </button>
          </div>
          <button onclick="toggleTheme()" class="tab" aria-label="Dark mode">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid gap-6">
      <div class="card p-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="timer">60:00</div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblTimer"
            ></div>
          </div>
          <div class="w-px h-10" style="background: var(--border)"></div>
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="answeredCount">
              0/10
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblAnswered"
            ></div>
          </div>
        </div>
        <div class="flex-1 min-w-[200px]">
          <div
            class="flex justify-between text-xs mb-1"
            style="color: var(--muted)"
          >
            <span id="lblProgress"></span><span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-2 overflow-x-auto pb-1" id="variantTabs"></div>

      <div class="grid lg:grid-cols-[280px_1fr] gap-6">
        <aside class="space-y-4">
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-3" id="lblGrid"></h3>
            <div class="grid grid-cols-5 gap-2" id="questionGrid"></div>
          </div>
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-2" id="lblLegend"></h3>
            <div
              class="flex items-center gap-2 text-xs mb-1"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm border"
                style="border-color: var(--border); background: var(--surface)"
              ></span>
              <span id="legEmpty"></span>
            </div>
            <div
              class="flex items-center gap-2 text-xs mb-1"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm"
                style="background: var(--primary)"
              ></span>
              <span id="legAnswered"></span>
            </div>
            <div
              class="flex items-center gap-2 text-xs"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm"
                style="
                  background: var(--primary-light);
                  border: 2px solid var(--primary);
                "
              ></span>
              <span id="legCurrent"></span>
            </div>
          </div>
        </aside>

        <section class="card p-6 flex flex-col gap-6" id="questionCard">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span
                class="px-3 py-1 rounded-lg text-sm font-bold text-white"
                style="background: var(--primary)"
                id="qBadge"
                >A1</span
              >
              <span
                class="text-sm font-medium"
                style="color: var(--muted)"
                id="qCounter"
                >1 / 10</span
              >
            </div>
            <span
              class="text-xs px-2 py-1 rounded-md"
              style="background: var(--primary-light); color: var(--primary)"
              id="qType"
            ></span>
          </div>

          <div class="fade-in" id="qContent">
            <h2
              class="text-lg font-semibold leading-relaxed mb-4"
              id="qText"
            ></h2>
            <div id="qImage" class="mb-4 flex justify-center"></div>
            <div class="space-y-3" id="qOptions"></div>
          </div>

          <div
            class="flex items-center justify-between pt-4 border-t"
            style="border-color: var(--border)"
          >
            <button
              onclick="prevQuestion()"
              class="btn-secondary"
              id="btnPrev"
            ></button>
            <div class="flex gap-2">
              <button
                onclick="finishExam()"
                class="btn-secondary text-red-500 border-red-200 hover:bg-red-50"
                id="btnFinish"
              ></button>
              <button
                onclick="nextQuestion()"
                class="btn-primary"
                id="btnNext"
              ></button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      id="resultModal"
      class="fixed inset-0 z-[100] hidden items-center justify-center p-4"
      style="background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px)"
    >
      <div
        class="card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 space-y-6"
      >
        <div class="text-center">
          <div
            class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white"
            style="background: var(--primary)"
            id="resultScoreIcon"
          >
            0
          </div>
          <h2 class="text-2xl font-bold mb-1" id="resTitle"></h2>
          <p class="text-sm" style="color: var(--muted)" id="resultMessage"></p>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-emerald-500" id="correctCount">
              0
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblCorrect"
            ></div>
          </div>
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-red-500" id="wrongCount">0</div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblWrong"
            ></div>
          </div>
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-amber-500" id="emptyCount">
              0
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblEmpty"
            ></div>
          </div>
        </div>
        <div class="flex gap-3 justify-center flex-wrap">
          <button
            onclick="showReview()"
            class="btn-primary"
            id="btnReview"
          ></button>
          <button
            onclick="resetExam()"
            class="btn-secondary"
            id="btnRestart"
          ></button>
          <button
            onclick="closeResults()"
            class="btn-secondary"
            id="btnClose"
          ></button>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "dim2025_feza_fiqurlar_v1";

      const _SVG_CUBOID = `<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" width="200" style="max-width:100%"><polygon points="30,140 180,140 180,50 30,50" fill="rgba(14,165,233,.08)" stroke="#0ea5e9" stroke-width="2"/><polygon points="180,50 230,20 230,110 180,140" fill="rgba(14,165,233,.13)" stroke="#0ea5e9" stroke-width="2"/><polygon points="30,50 180,50 230,20 80,20" fill="rgba(14,165,233,.18)" stroke="#0ea5e9" stroke-width="2"/><line x1="30" y1="140" x2="80" y2="110" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="80" y1="110" x2="230" y2="110" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="80" y1="110" x2="80" y2="20" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5 3"/><text x="95" y="155" fill="currentColor" font-size="11" font-weight="800" font-family="monospace">a (uzunluq)</text><text x="188" y="85" fill="currentColor" font-size="11" font-weight="800" font-family="monospace">b (en)</text><text x="192" y="42" fill="currentColor" font-size="11" font-weight="800" font-family="monospace">h</text><text x="55" y="105" fill="#0ea5e9" font-size="10" font-weight="700" font-family="monospace">V=a·b·h</text></svg>`;

      const _SVG_CUBE = `<svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" width="200" style="max-width:100%"><polygon points="40,140 160,140 160,60 40,60" fill="rgba(16,185,129,.08)" stroke="#10b981" stroke-width="2"/><polygon points="160,60 200,30 200,110 160,140" fill="rgba(16,185,129,.13)" stroke="#10b981" stroke-width="2"/><polygon points="40,60 160,60 200,30 80,30" fill="rgba(16,185,129,.18)" stroke="#10b981" stroke-width="2"/><line x1="40" y1="140" x2="80" y2="110" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="80" y1="110" x2="200" y2="110" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="80" y1="110" x2="80" y2="30" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 3"/><text x="85" y="157" fill="currentColor" font-size="11" font-weight="800" font-family="monospace">a</text><text x="168" y="90" fill="currentColor" font-size="11" font-weight="800" font-family="monospace">a</text><text x="168" y="48" fill="currentColor" font-size="11" font-weight="800" font-family="monospace">a</text><text x="50" y="105" fill="#10b981" font-size="10" font-weight="700" font-family="monospace">V=a³</text><text x="50" y="120" fill="#0ea5e9" font-size="10" font-weight="700" font-family="monospace">S=6a²</text></svg>`;

      const _SVG_PRISM = `<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" width="200" style="max-width:100%"><polygon points="40,150 130,150 130,60 40,60" fill="rgba(245,158,11,.08)" stroke="#f59e0b" stroke-width="2"/><polygon points="130,60 200,100 200,160 130,150" fill="rgba(245,158,11,.13)" stroke="#f59e0b" stroke-width="2"/><polygon points="40,60 130,60 200,100 110,100" fill="rgba(245,158,11,.18)" stroke="#f59e0b" stroke-width="2"/><line x1="40" y1="150" x2="110" y2="150" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="110" y1="100" x2="110" y2="150" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="110" y1="100" x2="200" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/><text x="60" y="170" fill="currentColor" font-size="10" font-weight="800" font-family="monospace">oturacaq (S₀)</text><text x="140" y="130" fill="#f59e0b" font-size="10" font-weight="700" font-family="monospace">h</text><text x="40" y="105" fill="#f59e0b" font-size="10" font-weight="700" font-family="monospace">V=S₀·h</text></svg>`;

      const CUBOID_IMG = `<div style="display:flex;justify-content:center;padding:8px 0">${_SVG_CUBOID}</div>`;
      const CUBE_IMG = `<div style="display:flex;justify-content:center;padding:8px 0">${_SVG_CUBE}</div>`;
      const PRISM_IMG = `<div style="display:flex;justify-content:center;padding:8px 0">${_SVG_PRISM}</div>`;

      const _TBL = (rows, th_az, th_ru, th_en) => ({
        az: `<table style="width:100%;margin-top:10px;border-collapse:collapse;font-size:0.87em"><tr><th style="padding:5px 8px;border:1px solid #94a3b8;background:rgba(14,165,233,0.12);text-align:left">${th_az[0]}</th><th style="padding:5px 8px;border:1px solid #94a3b8;background:rgba(14,165,233,0.12);text-align:left">${th_az[1]}</th></tr>${rows.az}</table>`,
        ru: `<table style="width:100%;margin-top:10px;border-collapse:collapse;font-size:0.87em"><tr><th style="padding:5px 8px;border:1px solid #94a3b8;background:rgba(14,165,233,0.12);text-align:left">${th_ru[0]}</th><th style="padding:5px 8px;border:1px solid #94a3b8;background:rgba(14,165,233,0.12);text-align:left">${th_ru[1]}</th></tr>${rows.ru}</table>`,
        en: `<table style="width:100%;margin-top:10px;border-collapse:collapse;font-size:0.87em"><tr><th style="padding:5px 8px;border:1px solid #94a3b8;background:rgba(14,165,233,0.12);text-align:left">${th_en[0]}</th><th style="padding:5px 8px;border:1px solid #94a3b8;background:rgba(14,165,233,0.12);text-align:left">${th_en[1]}</th></tr>${rows.en}</table>`,
      });

      const _TR = (left, right_az, right_ru, right_en) => ({
        az: `<tr><td style="padding:5px 8px;border:1px solid #94a3b8;font-weight:600">${left}</td><td style="padding:5px 8px;border:1px solid #94a3b8">${right_az}</td></tr>`,

      });
      const _TR_EMPTY = (right_az, right_ru, right_en) => ({
        az: `<tr><td style="padding:5px 8px;border:1px solid #94a3b8"></td><td style="padding:5px 8px;border:1px solid #94a3b8">${right_az}</td></tr>`,

      });
      const _joinRows = (...rs) => ({
        az: rs.map(r => r.az).join(""),
        ru: rs.map(r => r.ru).join(""),
        en: rs.map(r => r.en).join(""),
      });

      /* A10 table: cuboid dims increase m,n,k times → volume */
      const _A10rows = _joinRows(
        _TR("1. m=2, n=3, k=5", "a. həcmi 80 dəfə artar", "a. объём увеличится в 80 раз", "a. volume increases 80 times"),
        _TR("2. m=4, n=5, k=8", "b. həcmi 216 dəfə artar", "b. объём увеличится в 216 раз", "b. volume increases 216 times"),
        _TR("3. m=12, n=6, k=3", "c. həcmi 160 dəfə artar", "c. объём увеличится в 160 раз", "c. volume increases 160 times"),
        _TR_EMPTY("d. həcmi 50 dəfə artar", "d. объём увеличится в 50 раз", "d. volume increases 50 times"),
        _TR_EMPTY("e. həcmi 30 dəfə artar", "e. объём увеличится в 30 раз", "e. volume increases 30 times"),
      );
      const _A10tbl = _TBL(_A10rows, ["Sol sütun","Sağ sütun"], ["Левый столбец","Правый столбец"], ["Left column","Right column"]);

      /* B10 table: cuboid dims decrease m,n,k times → volume */
      const _B10rows = _joinRows(
        _TR("1. m=3, n=4, k=2", "a. həcmi 80 dəfə azalar", "a. объём уменьшится в 80 раз", "a. volume decreases 80 times"),
        _TR("2. m=6, n=2, k=5", "b. həcmi 60 dəfə azalar", "b. объём уменьшится в 60 раз", "b. volume decreases 60 times"),
        _TR("3. m=10, n=5, k=3", "c. həcmi 16 dəfə azalar", "c. объём уменьшится в 16 раз", "c. volume decreases 16 times"),
        _TR_EMPTY("d. həcmi 24 dəfə azalar", "d. объём уменьшится в 24 раза", "d. volume decreases 24 times"),
        _TR_EMPTY("e. həcmi 150 dəfə azalar", "e. объём уменьшится в 150 раз", "e. volume decreases 150 times"),
      );
      const _B10tbl = _TBL(_B10rows, ["Sol sütun","Sağ sütun"], ["Левый столбец","Правый столбец"], ["Left column","Right column"]);

      /* C10 table: cube edge a → S₁, S (math same all langs) */
      const _C10rowsBase = [
        _TR("1. a = 5", "a. S₁ = 64", "a. S₁ = 64", "a. S₁ = 64"),
        _TR("2. a = 6", "b. S = 216", "b. S = 216", "b. S = 216"),
        _TR("3. a = 8", "c. S₁ = 36", "c. S₁ = 36", "c. S₁ = 36"),
        _TR_EMPTY("d. S = 384", "d. S = 384", "d. S = 384"),
        _TR_EMPTY("e. S = 150", "e. S = 150", "e. S = 150"),
      ];
      const _C10rows = _joinRows(..._C10rowsBase);
      const _C10tbl = _TBL(_C10rows, ["Sol sütun","Sağ sütun"], ["Левый столбец","Правый столбец"], ["Left column","Right column"]);

      /* D10 table: cube edge a → L (total edge), V (volume) */
      const _D10rowsBase = [
        _TR("1. a = 4", "a. V = 64", "a. V = 64", "a. V = 64"),
        _TR("2. a = 5", "b. L = 72", "b. L = 72", "b. L = 72"),
        _TR("3. a = 6", "c. L = 60", "c. L = 60", "c. L = 60"),
        _TR_EMPTY("d. L = 48", "d. L = 48", "d. L = 48"),
        _TR_EMPTY("e. V = 125", "e. V = 125", "e. V = 125"),
      ];
      const _D10rows = _joinRows(..._D10rowsBase);
      const _D10tbl = _TBL(_D10rows, ["Sol sütun","Sağ sütun"], ["Левый столбец","Правый столбец"], ["Left column","Right column"]);

      const examData = {
        title: {
          az: "Fəza Fiqurları",
          ru: "Пространственные фигуры",
          en: "Solid Figures",
        },
        subtitle: {
          az: "Riyaziyyat | V sinif | Dövlət İmtahan Mərkəzi 2025",
          ru: "Математика | 5 класс | Государственный Экзаменационный Центр 2025",
          en: "Mathematics | Grade 5 | State Examination Center 2025",
        },
        timeLimit: 60,
        variants: [
          {
            id: "A",
            name: { az: "A variantı", ru: "Вариант A", en: "Variant A" },
            questions: [
              {
                id: 1,

                  az: "Otaq kuboid şəklindədir. Otağın hündürlüyü <b>3 m</b>, uzunluğu bundan <b>3 dəfə böyük</b>, eni isə uzunluğundan <b>2 m kiçikdir</b>. Otağın həcmini tapın.",
                  ru: "Комната имеет форму прямоугольного параллелепипеда. Высота комнаты <b>3 м</b>, длина в <b>3 раза больше</b>, а ширина на <b>2 м меньше длины</b>. Найдите объём комнаты.",
                  en: "A room has the shape of a cuboid. The height of the room is <b>3 m</b>, the length is <b>3 times greater</b>, and the width is <b>2 m smaller than the length</b>. Find the volume of the room.",

                options: {
                  az: ["189 m³", "18 m³", "33 m³", "54 m³", "48 m³"],
                  ru: ["189 м³", "18 м³", "33 м³", "54 м³", "48 м³"],
                  en: ["189 m³", "18 m³", "33 m³", "54 m³", "48 m³"],

                correct: "A",
                image: CUBOID_IMG,

              {
                id: 2,
                text: {
                  az: "Su hovuzunun həcmi <b>100 m³</b>, oturacağının tərəfləri isə <b>10 m</b> və <b>5 m</b>-dir. Hovuzu kafel vurmaq üçün neçə kvadrat metr kafel lazımdır?",
                  ru: "Объём водоёма <b>100 м³</b>, а стороны его дна — <b>10 м</b> и <b>5 м</b>. Сколько квадратных метров плитки нужно для облицовки бассейна?",

                  en: ["20 m²", "110 m²", "10 m²", "5000 m²", "40 m²"],
