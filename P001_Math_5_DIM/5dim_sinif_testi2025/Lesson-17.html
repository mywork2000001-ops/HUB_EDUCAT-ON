<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>İllik Material — Yekunlaşdırıcı Test | DİM V sinif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
      onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Slide animations */
      @keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
      @keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
      .slide-in-right{animation:slideInRight 0.27s cubic-bezier(.25,.46,.45,.94) both}
      .slide-in-left{animation:slideInLeft 0.27s cubic-bezier(.25,.46,.45,.94) both}
      /* Fraction display */
      .frac{display:inline-block;text-align:center;vertical-align:middle}
      .frac .num{display:block;border-bottom:1.5px solid currentColor;padding:0 3px;font-size:.85em;line-height:1.3}
      .frac .den{display:block;padding:0 3px;font-size:.85em;line-height:1.3}
      /* Modal show state */
      .mover.show{opacity:1!important;pointer-events:all!important}
      .mover.show .modal{transform:scale(1)!important}
      /* Variant tabs (JS-built) */
      .vtab{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:0.8rem;color:var(--muted);background:transparent;transition:all 0.2s;white-space:nowrap}
      .vtab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
      /* Question grid nav buttons (JS-built) */
      .qnb{width:100%;aspect-ratio:1;border-radius:7px;border:2px solid var(--border);background:var(--surface);font-weight:700;font-size:0.72rem;cursor:pointer;color:var(--text);transition:all 0.18s;display:flex;align-items:center;justify-content:center}
      .qnb.done{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
      .qnb.active{background:var(--primary);border-color:var(--primary);color:#fff;transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
      .qnb:hover:not(.active){border-color:var(--primary);color:var(--primary)}
      /* Question card content (JS-built) */
      .qhdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
      .qnum{background:var(--primary);color:#fff;font-weight:800;font-size:0.75rem;padding:4px 12px;border-radius:20px;letter-spacing:0.04em}
      .qtbadge{background:var(--bg);color:var(--muted);font-weight:700;font-size:0.68rem;padding:3px 10px;border-radius:20px;letter-spacing:0.05em;text-transform:uppercase;border:1.5px solid var(--border)}
      .qnav-btn{padding:5px 12px;border-radius:7px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-weight:700;font-size:0.78rem;cursor:pointer;transition:all 0.2s}
      .qnav-btn:hover{border-color:var(--primary);color:var(--primary)}
      .qtxt{font-size:0.98rem;font-weight:600;line-height:1.8;margin-bottom:16px;color:var(--text)}
      .qshape{text-align:center;margin:8px 0 14px;opacity:0.9}
      /* Options grid (JS-built) */
      .ogrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
      @media(max-width:560px){.ogrid{grid-template-columns:1fr}}
      .obtn{text-align:left;padding:11px 14px;border-radius:11px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:0.88rem;cursor:pointer;transition:all 0.2s;line-height:1.5}
      .obtn:hover{border-color:var(--primary);background:var(--primary-light)}
      .obtn.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:700}
      /* Match question (JS-built) */
      .mwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
      @media(max-width:520px){.mwrap{grid-template-columns:1fr}}
      .mcol{display:flex;flex-direction:column;gap:6px}
      .mit{padding:8px 12px;border-radius:8px;background:var(--bg);border:2px solid var(--border);font-weight:600;font-size:0.83rem;line-height:1.5}
      .mbox{margin-top:10px;padding:12px;border-radius:11px;background:var(--primary-light);border:2px solid var(--primary)}
      .mbox label{font-size:0.7rem;font-weight:700;color:var(--primary);display:block;margin-bottom:6px;letter-spacing:0.05em}
      .minp,.oinp{width:100%;padding:9px 12px;border-radius:9px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:0.9rem;transition:border-color 0.2s}
      .minp:focus,.oinp:focus{outline:none;border-color:var(--primary)}
      .oinp{margin-top:8px}
      /* Hint (JS-built) */
      .hbtn{margin-top:10px;padding:5px 12px;border-radius:8px;border:2px solid var(--warning);background:transparent;color:var(--warning);font-weight:700;font-size:0.74rem;cursor:pointer;transition:all 0.2s}
      .hbtn:hover{background:var(--warning);color:#fff}
      .hint{display:none;margin-top:8px;padding:9px 12px;border-radius:9px;background:rgba(245,158,11,0.08);border:2px solid rgba(245,158,11,0.25);font-size:0.8rem;font-weight:600;color:var(--warning);line-height:1.6}
      .hint.show{display:block}
      /* Progress bar inside question (JS-built) */
      .qprog{display:flex;align-items:center;gap:10px;margin-top:18px;padding-top:14px;border-top:2px solid var(--border)}
      .qprog span{font-size:0.7rem;font-weight:700;color:var(--muted);white-space:nowrap}
      .qpbar{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
      .qpfil{height:100%;background:var(--primary);border-radius:99px;transition:width 0.4s}
      /* Wrong answers summary in modal */
      .wrong-summary{margin-top:1rem}
      .wrong-summary-title{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#ef4444;margin-bottom:0.5rem}
      .wrong-item{display:flex;align-items:center;gap:0.65rem;padding:0.5rem 0.75rem;border-radius:0.55rem;border:1px solid rgba(239,68,68,0.25);background:rgba(239,68,68,0.07);margin-bottom:0.35rem}
      .wrong-item-num{font-weight:800;font-size:0.78rem;color:#ef4444;flex-shrink:0;min-width:1.8rem}
      .wrong-item-text{font-size:0.78rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .wrong-item-user{background:rgba(239,68,68,0.2);color:#ef4444;padding:0.1rem 0.45rem;border-radius:0.3rem;font-weight:800;font-size:0.75rem}
      .wrong-item-correct{background:rgba(34,197,94,0.2);color:#22c55e;padding:0.1rem 0.45rem;border-radius:0.3rem;font-weight:800;font-size:0.75rem}
      .wrong-item-arrow{color:#64748b;font-size:0.7rem}
    </style>
  </head>
  <body class="min-h-screen">
    <header
      class="sticky top-0 z-50 backdrop-blur-md bg-opacity-90"
      style="background: var(--surface); border-bottom: 1px solid var(--border)"
    >
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg"
            style="background: var(--primary)"
          >
            DİM
          </div>
          <div>
            <h1 class="text-sm sm:text-base font-bold leading-tight">
              İllik Material — Yekunlaşdırıcı Test
            </h1>
            <p class="text-xs" style="color: var(--muted)">
              Riyaziyyat | V sinif | DİM 2025 | A–H Variant
            </p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="lang-selector">
            <button onclick="setLang('az')" class="lang-btn active" id="lbAZ">AZ</button>
            <button onclick="setLang('ru')" class="lang-btn" id="lbRU">RU</button>
            <button onclick="setLang('en')" class="lang-btn" id="lbEN">EN</button>
          </div>
          <button onclick="toggleDark()" class="tab" aria-label="Dark mode" id="DB">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid gap-6">
      <!-- Stats row -->
      <div class="card p-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="TMR">60:00</div>
            <div class="text-xs" style="color: var(--muted)" id="SLBL_TIME">Vaxt</div>
          </div>
          <div class="w-px h-10" style="background: var(--border)"></div>
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="PRG">0/20</div>
            <div class="text-xs" style="color: var(--muted)" id="SLBL_DONE">Tamamlandı</div>
          </div>
          <div class="w-px h-10" style="background: var(--border)"></div>
          <div class="text-center">
            <div class="text-xl font-bold" id="VAR">A</div>
            <div class="text-xs" style="color: var(--muted)" id="SLBL_VAR">Variant</div>
          </div>
        </div>
        <div class="flex-1 min-w-[200px]">
          <div class="flex justify-between text-xs mb-1" style="color: var(--muted)">
            <span id="SLBL_PRG">İrəliləyiş</span><span id="PCT">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="PFI" style="width: 0%"></div>
          </div>
        </div>
        <button onclick="showRes()" class="btn-primary" style="white-space:nowrap">✓ Bitir</button>
      </div>

      <!-- Variant tabs -->
      <div class="flex gap-2 overflow-x-auto pb-1" id="VT"></div>

      <!-- Two-column layout -->
      <div class="grid lg:grid-cols-[280px_1fr] gap-6">
        <aside class="space-y-4">
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-3">Suallar</h3>
            <div class="grid grid-cols-5 gap-2" id="QN"></div>
          </div>
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-2">İzah</h3>
            <div class="flex items-center gap-2 text-xs mb-1" style="color: var(--muted)">
              <span class="w-3 h-3 rounded-sm border" style="border-color: var(--border); background: var(--surface)"></span>
              <span>Cavabsız</span>
            </div>
            <div class="flex items-center gap-2 text-xs mb-1" style="color: var(--muted)">
              <span class="w-3 h-3 rounded-sm" style="background: var(--primary)"></span>
              <span>Cavablanıb</span>
            </div>
            <div class="flex items-center gap-2 text-xs" style="color: var(--muted)">
              <span class="w-3 h-3 rounded-sm" style="background: var(--primary-light); border: 2px solid var(--primary)"></span>
              <span>Cari sual</span>
            </div>
          </div>
          <!-- TMR2 hidden for JS timer sync compatibility -->
          <span id="TMR2" style="display:none">60:00</span>
        </aside>

        <section class="card p-6" id="questionCard">
          <div id="QAREA" class="fade-in"></div>
        </section>
      </div>
    </main>

    <!-- Result Modal -->
    <div
      id="MO"
      class="mover"
      style="position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity 0.3s"
    >
      <div class="modal" style="background:var(--surface);border-radius:20px;max-width:480px;width:100%;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.3);transform:scale(0.9);transition:transform 0.3s">
        <div style="background:var(--primary);padding:28px;text-align:center">
          <div style="font-size:3rem;font-weight:900;color:#fff" id="RSC">-</div>
          <div style="font-size:0.88rem;color:rgba(255,255,255,0.85);font-weight:700;margin-top:3px" id="RSB"></div>
        </div>
        <div style="padding:22px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px">
            <div class="card p-3 text-center" style="background:var(--bg)">
              <div class="text-xl font-bold text-emerald-500" id="RCO">-</div>
              <div class="text-xs" style="color:var(--muted)" id="RLBL_CO">Doğru</div>
            </div>
            <div class="card p-3 text-center" style="background:var(--bg)">
              <div class="text-xl font-bold text-red-500" id="RWR">-</div>
              <div class="text-xs" style="color:var(--muted)" id="RLBL_WR">Səhv</div>
            </div>
            <div class="card p-3 text-center" style="background:var(--bg)">
              <div class="text-xl font-bold text-amber-500" id="RBL">-</div>
              <div class="text-xs" style="color:var(--muted)" id="RLBL_BL">Boş</div>
            </div>
            <div class="card p-3 text-center" style="background:var(--bg)">
              <div class="text-xl font-bold" style="color:var(--primary)" id="RTM">-</div>
              <div class="text-xs" style="color:var(--muted)" id="RLBL_TM">Vaxt</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
            <button class="btn-primary" id="RBTN_RESTART" onclick="restart()">&#x1F504; Yenidən başla</button>
            <button class="btn-secondary" id="RBTN_CLOSE" onclick="document.getElementById('MO').classList.remove('show')">Bağla</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const QS = [
        /* ══ A VARIANT ══ */
        {
          id: "A1",
          v: "A",
          t: "choice",
          az: `8,61 ≈ 8,6; 13,099 ≈ 13; 15,499 ≈ 16; 0,9009 ≈ 0,91; 24,491 ≈ 24,5 bərabərliklərdən neçəsi <b>doğru deyil</b>?`,
          en: `How many of the equalities are <b>incorrect</b>?<br>8.61 ≈ 8.6; 13.099 ≈ 13; 15.499 ≈ 16; 0.9009 ≈ 0.91; 24.491 ≈ 24.5`,
          ru: `Сколько из равенств <b>неверны</b>?<br>8,61 ≈ 8,6; 13,099 ≈ 13; 15,499 ≈ 16; 0,9009 ≈ 0,91; 24,491 ≈ 24,5`,
          opts: ["A) 1", "B) 3", "C) 2", "D) 5", "E) 4"],
          opts_en: ["A) 1", "B) 3", "C) 2", "D) 5", "E) 4"],
          opts_ru: ["A) 1", "B) 3", "C) 2", "D) 5", "E) 4"],
          ans: 1,
          hint: {
            az: "13,099 ≈ 13 (doğru: onluqlara qədər). 15,499 ≈ 15 deyil 16 (yanlış). 0,9009 ≈ 0,90 (yanlış). Sayın.",
            en: "13,099 ≈ 13 (correct: onluqlara qədər). 15,499 ≈ 15 deyil 16 (incorrect). 0,9009 ≈ 0,90 (incorrect). Sayın.",
            ru: "13,099 ≈ 13 (верно: до десятых). 15,499 ≈ 15, а не 16 (неверно). 0,9009 ≈ 0,90 (неверно). Считай.",
          },
        },
        {
          id: "A2",
          v: "A",
          t: "choice",
          az: `Qonşu bucaqlardan biri digərindən 4 dəfə böyükdür. Bu bucaqlardan kiçiyini tapın.`,
          en: `One of two adjacent angles is 4 times greater than the other. Find the smaller angle.`,
          ru: `Один из смежных углов в 4 раза больше другого. Найдите меньший угол.`,
          opts: ["A) 30°", "B) 36°", "C) 25°", "D) 50°", "E) 40°"],
          opts_en: ["A) 30°", "B) 36°", "C) 25°", "D) 50°", "E) 40°"],
          opts_ru: ["A) 30°", "B) 36°", "C) 25°", "D) 50°", "E) 40°"],
          ans: 1,
          hint: {
            az: "Qonşu bucaqlar: x + 4x = 180° → 5x = 180° → x = 36°.",
            en: "Qonşu bucaqlar: x + 4x = 180° → 5x = 180° → x = 36°.",
            ru: "Смежные углы: x + 4x = 180° → 5x = 180° → x = 36°.",
          },
        },
        {
          id: "A3",
          v: "A",
          t: "choice",
          az: `c – d = 650 olarsa, (c + 200) – d ifadəsinin qiymətini tapın.`,
          en: `If c – d = 650, find the value of the expression (c + 200) – d.`,
          ru: `Если c – d = 650, найдите значение выражения (c + 200) – d.`,
          opts: ["A) 300", "B) 650", "C) 200", "D) 850", "E) 450"],
          opts_en: ["A) 300", "B) 650", "C) 200", "D) 850", "E) 450"],
          opts_ru: ["A) 300", "B) 650", "C) 200", "D) 850", "E) 450"],
          ans: 3,
          hint: {
            az: "(c+200) – d = (c–d) + 200 = 650 + 200 = 850.",
            en: "(c+200) – d = (c–d) + 200 = 650 + 200 = 850.",
            ru: "(c + 200) – d = (c – d) + 200 = 650 + 200 = 850.",
          },
        },
        {
          id: "A4",
          v: "A",
          t: "choice",
          az: `60 km-in 4,5%-ini hesablayın.`,
          en: `Calculate 4.5% of 60 km.`,
          ru: `Вычислите 4,5% от 60 км.`,
          opts: [
            "A) 27 km",
            "B) 2,7 km",
            "C) 0,27 km",
            "D) 270 km",
            "E) 0,027 km",
          ],
          opts_en: [
            "A) 27 km",
            "B) 2,7 km",
            "C) 0,27 km",
            "D) 270 km",
            "E) 0,027 km",
          ],
          opts_ru: [
            "A) 27 км",
            "B) 2,7 км",
            "C) 0,27 км",
            "D) 270 км",
            "E) 0,027 км",
          ],
          ans: 1,
          hint: {
            az: "60 × 0,045 = 2,7 km.",
            en: "60 × 0,045 = 2,7 km.",
            ru: "60 × 0,045 = 2,7 км.",
          },
        },
        {
          id: "A5",
          v: "A",
          t: "choice",
          az: `x + (x – 35) + (x + 100) = 875 tənliyini həll edin.`,
          en: `Solve the equation: x + (x – 35) + (x + 100) = 875.`,
          ru: `Решите уравнение: x + (x – 35) + (x + 100) = 875.`,
          opts: ["A) 270", "B) 265", "C) 250", "D) 290", "E) 255"],
          opts_en: ["A) 270", "B) 265", "C) 250", "D) 290", "E) 255"],
          opts_ru: ["A) 270", "B) 265", "C) 250", "D) 290", "E) 255"],
          ans: 0,
          hint: {
            az: "3x + 65 = 875 → 3x = 810 → x = 270.",
            en: "3x + 65 = 875 → 3x = 810 → x = 270.",
            ru: "3x + 65 = 875 → 3x = 810 → x = 270.",
          },
        },
        {
          id: "A6",
          v: "A",
          t: "choice",
          az: `m + n = 7,5 olarsa, 4(m + n + 130) ifadəsinin qiymətini tapın.`,
          en: `If m + n = 7.5, find the value of the expression 4(m + n + 130).`,
          ru: `Если m + n = 7,5, найдите значение выражения 4(m + n + 130).`,
          opts: ["A) 520", "B) 550", "C) 280", "D) 500", "E) 380"],
          opts_en: ["A) 520", "B) 550", "C) 280", "D) 500", "E) 380"],
          opts_ru: ["A) 520", "B) 550", "C) 280", "D) 500", "E) 380"],
          ans: 1,
          hint: {
            az: "4(7,5 + 130) = 4 × 137,5 = 550.",
            en: "4(7,5 + 130) = 4 × 137,5 = 550.",
            ru: "4(7,5 + 130) = 4 × 137,5 = 550.",
          },
        },
        {
          id: "A7",
          v: "A",
          t: "choice",
          az: `6x + 4x + 110 = 500 tənliyini həll edin.`,
          en: `Solve the equation: 6x + 4x + 110 = 500.`,
          ru: `Решите уравнение: 6x + 4x + 110 = 500.`,
          opts: ["A) 59", "B) 61", "C) 50", "D) 39", "E) 49"],
          opts_en: ["A) 59", "B) 61", "C) 50", "D) 39", "E) 49"],
          opts_ru: ["A) 59", "B) 61", "C) 50", "D) 39", "E) 49"],
          ans: 3,
          hint: {
            az: "10x = 390 → x = 39.",
            en: "10x = 390 → x = 39.",
            ru: "10x = 390 → x = 39.",
          },
        },
        {
          id: "A8",
          v: "A",
          t: "choice",
          az: `a – b = 4,5 olarsa, 4a – 4b ifadəsinin qiymətini tapın.`,
          en: `If a – b = 4.5, find the value of the expression 4a – 4b.`,
          ru: `Если a – b = 4,5, найдите значение выражения 4a – 4b.`,
          opts: ["A) 5", "B) 10,5", "C) 18", "D) 9", "E) 12"],
          opts_en: ["A) 5", "B) 10,5", "C) 18", "D) 9", "E) 12"],
          opts_ru: ["A) 5", "B) 10,5", "C) 18", "D) 9", "E) 12"],
          ans: 2,
          hint: {
            az: "4(a–b) = 4 × 4,5 = 18.",
            en: "4(a–b) = 4 × 4,5 = 18.",
            ru: "4(a – b) = 4 × 4,5 = 18.",
          },
        },
        {
          id: "A9",

        if (S.timerLeft <= 0) {
          clearInterval(S.tid);
          document.getElementById("TMR").textContent = "00:00";
          document.getElementById("TMR").style.color = "var(--danger)";
          showRes();

        const txt = m + ":" + sc;
        document.getElementById("TMR").textContent = txt;
        const t2 = document.getElementById("TMR2");
        if (t2) t2.textContent = txt;
        if (S.timerLeft <= 300)
          document.getElementById("TMR").style.color = "var(--danger)";
        else if (S.timerLeft <= 600)
          document.getElementById("TMR").style.color = "var(--warning)";
      }

      function buildTabs() {
        const L = T[S.lang];
        ["VT", "VM"].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.innerHTML = "";
          VARS.forEach((v) => {
            const b = document.createElement("button");
            b.className = "vtab" + (S.v === v ? " active" : "");
            b.textContent = L.variantLabel + " " + v;
            b.onclick = () => {
              S.v = v;
              S.ans = {};
              S.activeQ = null;
              buildTabs();
              renderSidebar();
              showQ(0);
            };
            el.appendChild(b);
          });

        return QS.filter((q) => q.v === S.v);

        const done = qs.filter((q) => S.ans[q.id] !== undefined).length;

        const pct = qs.length ? Math.round((done / qs.length) * 100) : 0;

      ${idx > 0 ? `<button class="qnav-btn" onclick="showQ(${idx - 1})">← </button>` : ""}

          const optTexts = q["opts_" + S.lang] || q.opts_en || q.opts;
          optTexts.forEach((o, oi) => {
            h += `<button class="obtn${S.ans[q.id] === oi ? " sel" : ""}" onclick="pick('${q.id}',${oi},this)">${o}</button>`;
          });
          h += `</div>`;
        } else if (q.t === "match") {
          const leftItems = q.left;
          const rightItems = q.right;
          h += `<div class="mwrap">
      <div class="mcol">${leftItems.map((l) => `<div class="mit">${l}</div>`).join("")}</div>
      <div class="mcol">${rightItems.map((r) => `<div class="mit">${r}</div>`).join("")}</div>
    </div>
    <div class="mbox"><label>${L.writeAns}</label>
    <input class="minp" type="text" placeholder="${L.placeholder}" value="${S.ans[q.id] || ""}"
           onchange="saveT('${q.id}',this.value)"/></div>`;
        } else {
          h += `<input class="oinp" type="text" placeholder="${L.openPlaceholder}"
             value="${S.ans[q.id] || ""}" onchange="saveT('${q.id}',this.value)"/>`;
        }
        if (q.hint) {
          const htext = q.hint[S.lang] || q.hint.ru || q.hint.az;
          const hv = S.hint && S.hint[q.id];
          h += `<button class="hbtn" onclick="tHint('${q.id}')">${L.hint}</button>
        <div class="hint${hv ? " show" : ""}" id="HH${q.id}">💡 ${htext}</div>`;
        }
        // progress bar inside card
        h += `<div class="qprog"><span>${idx + 1} / ${qs.length}</span>
    <div class="qpbar"><div class="qpfil" style="width:${Math.round(((idx + 1) / qs.length) * 100)}%"></div></div>
  </div>`;

        area.innerHTML = h;
        area.style.animation = "none";
        area.offsetHeight;
        area.style.animation = _sd === "right"
          ? "slideInRight .27s cubic-bezier(0.25,0.46,0.45,0.94) both"
          : "slideInLeft .27s cubic-bezier(0.25,0.46,0.45,0.94) both";
      }

      function pick(id, oi, btn) {
        S.ans[id] = oi;
        btn
          .closest(".ogrid")
          .querySelectorAll(".obtn")
          .forEach((b, i) => {
            b.className = "obtn" + (i === oi ? " sel" : "");
          });
        renderSidebar();
        // auto advance after short delay
        setTimeout(() => {
          const qs = getQs();
          const idx = qs.findIndex((q) => q.id === id);
          if (idx < qs.length - 1) showQ(idx + 1);
        }, 400);
      }
      function saveT(id, v) {
        if (v.trim()) S.ans[id] = v.trim();
        else delete S.ans[id];
        renderSidebar();
      }
      function tHint(id) {
        if (!S.hint) S.hint = {};
        S.hint[id] = !S.hint[id];
        const el = document.getElementById("HH" + id);
        if (el) el.className = "hint" + (S.hint[id] ? " show" : "");
      }
      function toggleDark() {
        S.dark = !S.dark;
        document.documentElement.classList.toggle("dark", S.dark);
        const DB = document.getElementById("DB");
        DB.innerHTML = S.dark
          ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`
          : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
      }
      function setLang(l) {
        S.lang = l;
        ["az", "ru", "en"].forEach((x) => {
          const el = document.getElementById("lb" + x.toUpperCase());
          if (el) el.classList.toggle("active", x === l);
        });
        buildTabs();
        renderSidebar();
        if (S.activeQ !== null) showQ(S.activeQ);
      }
      function toggleLang() {
        setLang(
          ["az", "ru", "en"][(["az", "ru", "en"].indexOf(S.lang) + 1) % 3],
        );
      }
      function showRes() {
        const qs = getQs(),
          L = T[S.lang];
        let ok = 0,
          wr = 0,
          bl = 0;
        qs.forEach((q) => {
          const a = S.ans[q.id];
          if (a === undefined) {
            bl++;
            return;
          }
          if (q.t === "choice") {
            if (a === q.ans) ok++;
            else wr++;
          } else {
            if (
              String(a).trim().toLowerCase() ===
              String(q.ans_text || "")
                .trim()
                .toLowerCase()
            )
              ok++;
            else wr++;
          }
        });
        const total = qs.length,
          pct = Math.round((ok / total) * 100);
        const elapsed = 3600 - S.timerLeft;
        const em = Math.floor(elapsed / 60),
          es = elapsed % 60;
        document.getElementById("RSC").textContent = pct + "%";
        document.getElementById("RSB").textContent =
          ok + "/" + total + " " + L.score + " — " + L.variantLabel + " " + S.v;
        document.getElementById("RCO").textContent = ok;
        document.getElementById("RWR").textContent = wr;
        document.getElementById("RBL").textContent = bl;
        document.getElementById("RTM").textContent =
          em + ":" + String(es).padStart(2, "0");
        document.getElementById("RBTN_RESTART").textContent = L.restart;
        document.getElementById("RBTN_CLOSE").textContent = L.close;
        document.getElementById("RLBL_CO").textContent = L.correct;
        document.getElementById("RLBL_WR").textContent = L.wrong;
        document.getElementById("RLBL_BL").textContent = L.blank;
        document.getElementById("RLBL_TM").textContent = L.time;
        /* ── wrong answers list ── */
        const LTRS_W = ["A","B","C","D","E"];
        const wqList = qs.filter(q => q.t === "choice" && S.ans[q.id] !== undefined && S.ans[q.id] !== q.ans);
        let wsEl = document.getElementById("wrongSumLS");
        if (!wsEl) {
          wsEl = document.createElement("div");
          wsEl.id = "wrongSumLS";
          wsEl.className = "wrong-summary";
          const mbody = document.querySelector("#MO .mbody");
          if (mbody) {
            const mbtns = mbody.querySelector(".mbtns");
            if (mbtns) mbody.insertBefore(wsEl, mbtns); else mbody.appendChild(wsEl);
          }
        }
        if (wqList.length === 0) {
          wsEl.innerHTML = ""; wsEl.style.display = "none";
        } else {
          const lbl = {az:"Səhv cavablar",ru:"Неверные ответы",en:"Wrong answers"};
          wsEl.style.display = "";
          wsEl.innerHTML = `<div class="wrong-summary-title">✗ ${lbl[S.lang]||lbl.az}</div>` +
            wqList.map(q => {
              const qtext = q[S.lang] || q.en || q.az || "";
              const plain = qtext.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
              const excr = plain.length > 55 ? plain.slice(0,55)+"…" : plain;
              return `<div class="wrong-item">
                <span class="wrong-item-num">${q.id}</span>
                <span class="wrong-item-text" title="${plain}">${excr}</span>
                <span style="display:flex;gap:.3rem;align-items:center;flex-shrink:0">
                  <span class="wrong-item-user">${LTRS_W[S.ans[q.id]]||S.ans[q.id]}</span>
                  <span class="wrong-item-arrow">→</span>
                  <span class="wrong-item-correct">${LTRS_W[q.ans]||q.ans}</span>
                </span>
              </div>`;
            }).join("");
        }
        document.getElementById("MO").classList.add("show");
      }
      function restart() {
        S.ans = {};
        S.hint = {};
        S.timerLeft = 3600;
        S.activeQ = null;
        clearInterval(S.tid);
        S.tid = setInterval(tick, 1000);
        document.getElementById("TMR").style.color = "";
        document.getElementById("MO").classList.remove("show");
        renderSidebar();
        showQ(0);
      }

      /* ===== АВТОПАТЧ: английский язык ===== */
      (function () {
        function addEn(o, d) {
          if (d > 25 || o == null || typeof o !== "object") return;
          if (Array.isArray(o)) {
            for (var i = 0; i < o.length; i++) addEn(o[i], d + 1);
            return;
          }
          if (o.ru !== undefined && o.en === undefined) {
            o.en = o.ru;
          } else if (
            o.az !== undefined &&
            o.en === undefined &&
            o.ru === undefined
          ) {
            o.en = o.az;
          }
          // Копируем en→ru если ru отсутствует
          if (o.en !== undefined && o.ru === undefined) {
            o.ru = o.en;
          }
          // opts_ru ← opts_en
          if (o.opts_en !== undefined && o.opts_ru === undefined) {
            o.opts_ru = o.opts_en;
          }
          for (var k in o) {
            if (Object.prototype.hasOwnProperty.call(o, k)) {
              if (k.length > 3 && k.slice(-3) === "_ru") {
                var ek = k.slice(0, -3) + "_en";
                if (o[ek] === undefined) o[ek] = o[k];
              }
              if (k.length > 3 && k.slice(-3) === "_az") {
                var ek2 = k.slice(0, -3) + "_en";
                if (
                  o[ek2] === undefined &&
                  o[k.slice(0, -3) + "_ru"] === undefined
                )
                  o[ek2] = o[k];
              }
            }
          }
          for (var k2 in o) {
            if (k2 !== "en" && Object.prototype.hasOwnProperty.call(o, k2)) {
              try {
                addEn(o[k2], d + 1);
              } catch (e) {}
            }
          }
        }
        try {
          if (typeof examData !== "undefined") addEn(examData, 0);
        } catch (e) {}
        try {
          if (typeof QS !== "undefined") addEn(QS, 0);
        } catch (e) {}
        try {
          if (typeof variants !== "undefined") addEn(variants, 0);
        } catch (e) {}
        try {
          if (typeof ui !== "undefined") addEn(ui, 0);
        } catch (e) {}
        try {
          if (typeof UI !== "undefined") addEn(UI, 0);
        } catch (e) {}
        try {
          if (typeof L !== "undefined" && typeof L === "object") addEn(L, 0);
        } catch (e) {}
        try {
          if (typeof TXT !== "undefined") addEn(TXT, 0);
        } catch (e) {}
        try {
          if (typeof i18n !== "undefined") addEn(i18n, 0);
        } catch (e) {}
        try {
          if (typeof T !== "undefined" && typeof T === "object") addEn(T, 0);
        } catch (e) {}
      })();
      /* Безопасный ре-рендер после патча данных */
      (function () {
        function _rr() {
          try {
            if (typeof renderAll === "function") {
              renderAll();
              return;
            }
          } catch (e) {}
          try {
            if (typeof render === "function") {
              render();
              return;
            }
          } catch (e) {}
          try {
            if (typeof renderQuestion === "function") {
              renderQuestion();
            }
          } catch (e) {}
          try {
            if (typeof updateTexts === "function") {
              updateTexts();
            }
          } catch (e) {}
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(_rr, 0);
          });
        } else {
          setTimeout(_rr, 0);
        }
      })();
    </script>
    <script>
      (function () {
        // Функция отправки прогресса родительскому окну
        function sendProgress() {
          if (!window.parent) return;

          // Получаем данные о прогрессе из глобальных переменных урока
          let answersCount = 0;
          let totalQuestions = 0;
          let correctCount = 0;
          let completed = false;
          let answers = {};

          // Определяем тип урока по наличию переменных
          if (typeof state !== "undefined" && state.answers) {
            // Для уроков с state.answers (Lesson-1...12, 15, 16, 17)
            const variant =
              state.variantIndex !== undefined ? state.variantIndex : 0;
            const qs =
              typeof QS !== "undefined"
                ? QS
                : typeof examData !== "undefined" && examData.variants
                  ? examData.variants
                  : [];
            const currentVariant = qs[variant] || qs[0];

            if (currentVariant && currentVariant.questions) {
              totalQuestions = currentVariant.questions.length;
              answers = state.answers || {};
              answersCount = Object.keys(answers).length;

              // Подсчёт правильных ответов
              for (let i = 0; i < currentVariant.questions.length; i++) {
                const q = currentVariant.questions[i];
                const key = `${currentVariant.id || "A"}-${q.id}`;
                if (answers[key] === q.correct) {
                  correctCount++;
                }
              }
              completed = state.finished === true;
            }
          } else if (typeof state !== "undefined" && state.ans) {
            // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === state.v);
            totalQuestions = variantQs.length;
            answers = state.ans || {};
            answersCount = Object.keys(answers).length;

            for (let i = 0; i < variantQs.length; i++) {
              const q = variantQs[i];
              const userAns = answers[q.id];
              if (userAns !== undefined) {
                if (q.t === "choice") {
                  if (userAns === q.ans) correctCount++;
                } else if (q.t === "open" || q.t === "match") {
                  if (
                    String(userAns).trim().toLowerCase() ===
                    String(q.ans_text || "")
                      .trim()
                      .toLowerCase()
                  )
                    correctCount++;
                }
              }
            }
            completed = state.finished === true;
          } else if (typeof S !== "undefined" && S.ans) {
            // Альтернативная структура (Lesson-13, 14)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === S.v);
            totalQuestions = variantQs.length;
            answers = S.ans || {};
            answersCount = Object.keys(answers).length;
            completed = S.finished === true;
          }

          if (totalQuestions === 0) return;

          window.parent.postMessage(
            {
              type: "lessonProgress",
              lessonId: parseInt(
                window.location.pathname.match(/Lesson-(\d+)/)?.[1] || "0",
              ),
              answersCount: answersCount,
              totalQuestions: totalQuestions,
              correctCount: correctCount,
              completed: completed,
              answers: answers,
            },
            "*",
          );
        }

        // Перехватываем вызовы finishExam/resetExam/showReview для отправки прогресса
        const originalFinish = window.finishExam;
        if (originalFinish) {
          window.finishExam = function (...args) {
            const result = originalFinish.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalReset = window.resetExam;
        if (originalReset) {
          window.resetExam = function (...args) {
            const result = originalReset.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalShowReview = window.showReview;
        if (originalShowReview) {
          window.showReview = function (...args) {
            const result = originalShowReview.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        // Отправляем прогресс при каждом ответе (перехватываем выбор варианта)
        const originalPick = window.pick;
        if (originalPick) {
          window.pick = function (...args) {
            const result = originalPick.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        const originalSaveT = window.saveT;
        if (originalSaveT) {
          window.saveT = function (...args) {
            const result = originalSaveT.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Для уроков с toggleVariant и т.д.
        const originalRenderAll = window.renderAll;
        if (originalRenderAll) {
          window.renderAll = function (...args) {
            const result = originalRenderAll.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Периодическая отправка прогресса (каждые 3 секунды)
        setInterval(sendProgress, 3000);

        // Запрос времени у родителя
        if (window.parent) {
          window.parent.postMessage({ type: "requestTimer" }, "*");
        }

        // Приём сообщений от родителя
        window.addEventListener("message", function (event) {
          if (event.data && event.data.type === "syncTimer") {
            if (typeof state !== "undefined" && state.timeLeft !== undefined) {
              state.timeLeft = event.data.timeLeft;
              if (typeof updateTimerDisplay === "function")
                updateTimerDisplay();
            } else if (typeof S !== "undefined" && S.timer !== undefined) {
              S.timer = event.data.timeLeft;
            }
          }
          if (event.data && event.data.type === "forceFinish") {
            if (typeof finishExam === "function") finishExam();
          }
          if (event.data && event.data.type === "restoreProgress") {
            // Восстановление сохранённых ответов
            const saved = event.data.progress;
            if (saved && saved.answers) {
              if (typeof state !== "undefined" && state.answers) {
                state.answers = saved.answers;
                if (typeof renderAll === "function") renderAll();
              }
            }
          }
        });

        // Отправляем прогресс при загрузке
        setTimeout(sendProgress, 500);
      })();
    </script>
  </body>
