<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DİM 2025 – Natural ədədlərin vurulması və bölünməsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>

      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"

  <body class="min-h-screen">
    <header
      class="sticky top-0 z-50 backdrop-blur-md bg-opacity-90"
      style="background: var(--surface); border-bottom: 1px solid var(--border)"
    >
      <div
        class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg"
            style="background: var(--primary)"
          >
            DİM
          </div>
          <div>
            <h1
              class="text-sm sm:text-base font-bold leading-tight"
              id="examTitle"
            ></h1>
            <p
              class="text-xs"
              style="color: var(--muted)"
              id="examSubtitle"
            ></p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="lang-selector">
            <button onclick="setLang('az')" class="lang-btn active" id="lbAZ">
              AZ
            </button>
            <button onclick="setLang('ru')" class="lang-btn" id="lbRU">
              RU
            </button>
            <button onclick="setLang('en')" class="lang-btn" id="lbEN">
              EN
            </button>
          </div>
          <button onclick="toggleTheme()" class="tab" aria-label="Dark mode">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid gap-6">
      <div class="card p-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="timer">60:00</div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblTimer"
            ></div>
          </div>
          <div class="w-px h-10" style="background: var(--border)"></div>
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="answeredCount">
              0/40
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblAnswered"
            ></div>
          </div>
        </div>
        <div class="flex-1 min-w-[200px]">
          <div
            class="flex justify-between text-xs mb-1"
            style="color: var(--muted)"
          >
            <span id="lblProgress"></span><span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-2 overflow-x-auto pb-1" id="variantTabs"></div>

      <div class="grid lg:grid-cols-[280px_1fr] gap-6">
        <aside class="space-y-4">
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-3" id="lblGrid"></h3>
            <div class="grid grid-cols-5 gap-2" id="questionGrid"></div>
          </div>
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-2" id="lblLegend"></h3>
            <div
              class="flex items-center gap-2 text-xs mb-1"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm border"
                style="border-color: var(--border); background: var(--surface)"
              ></span>
              <span id="legEmpty"></span>
            </div>
            <div
              class="flex items-center gap-2 text-xs mb-1"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm"
                style="background: var(--primary)"
              ></span>
              <span id="legAnswered"></span>
            </div>
            <div
              class="flex items-center gap-2 text-xs"
              style="color: var(--muted)"
            >
              <span
                class="w-3 h-3 rounded-sm"
                style="
                  background: var(--primary-light);
                  border: 2px solid var(--primary);
                "
              ></span>
              <span id="legCurrent"></span>
            </div>
          </div>
        </aside>

        <section class="card p-6 flex flex-col gap-6" id="questionCard">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span
                class="px-3 py-1 rounded-lg text-sm font-bold text-white"
                style="background: var(--primary)"
                id="qBadge"
                >A1</span
              >
              <span
                class="text-sm font-medium"
                style="color: var(--muted)"
                id="qCounter"
                >1 / 10</span
              >
            </div>
            <span
              class="text-xs px-2 py-1 rounded-md"
              style="background: var(--primary-light); color: var(--primary)"
              id="qType"
            ></span>
          </div>

          <div class="fade-in" id="qContent">
            <h2
              class="text-lg font-semibold leading-relaxed mb-4"
              id="qText"
            ></h2>
            <div id="qImage" class="mb-4 flex justify-center"></div>
            <div class="space-y-3" id="qOptions"></div>
          </div>

          <div
            class="flex items-center justify-between pt-4 border-t"
            style="border-color: var(--border)"
          >
            <button
              onclick="prevQuestion()"
              class="btn-secondary"
              id="btnPrev"
            ></button>
            <div class="flex gap-2">
              <button
                onclick="finishExam()"
                class="btn-secondary text-red-500 border-red-200 hover:bg-red-50"
                id="btnFinish"
              ></button>
              <button
                onclick="nextQuestion()"
                class="btn-primary"
                id="btnNext"
              ></button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      id="resultModal"
      class="fixed inset-0 z-[100] hidden items-center justify-center p-4"
      style="background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px)"
    >

      >
        <div class="text-center">
          <div
            class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white"
            style="background: var(--primary)"
            id="resultScoreIcon"
          >
            0
          </div>
          <h2 class="text-2xl font-bold mb-1" id="resTitle"></h2>
          <p class="text-sm" style="color: var(--muted)" id="resultMessage"></p>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-emerald-500" id="correctCount">
              0
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblCorrect"
            ></div>
          </div>
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-red-500" id="wrongCount">0</div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblWrong"
            ></div>
          </div>
          <div class="card p-3 text-center" style="background: var(--bg)">
            <div class="text-xl font-bold text-amber-500" id="emptyCount">
              0
            </div>
            <div
              class="text-xs"
              style="color: var(--muted)"
              id="lblEmpty"
            ></div>
          </div>
        </div>
        <div class="flex gap-3 justify-center flex-wrap">

            onclick="showReview()"
            class="btn-primary"
            id="btnReview"
          ></button>
          <button
            onclick="resetExam()"
            class="btn-secondary"
            id="btnRestart"
          ></button>
          <button
            onclick="closeResults()"
            class="btn-secondary"
            id="btnClose"
          ></button>
        </div>
      </div>
    </div>
