<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riyaziyyat Testi - Natural ədədlərin vurulması və bölünməsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-card: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #eab308;
        --border: #475569;
      }
      * {
        font-family: "Inter", sans-serif;
      }
      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
      }
      .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .option-btn {
        background: var(--bg-card);
        border: 2px solid var(--border);
        color: var(--text-primary);
        transition: all 0.2s;
        cursor: pointer;
      }
      .option-btn:hover {
        border-color: var(--accent);
        background: rgba(99, 102, 241, 0.1);
      }
      .option-btn.selected {
        border-color: var(--accent);
        background: rgba(99, 102, 241, 0.2);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
      }
      .option-btn.correct {
        border-color: var(--success);
        background: rgba(34, 197, 94, 0.2);
      }
      .option-btn.wrong {
        border-color: var(--error);
        background: rgba(239, 68, 68, 0.2);
      }
      .variant-tab {
        background: var(--bg-card);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
      }
      .variant-tab.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      .q-nav-btn {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }
      .q-nav-btn:hover {
        border-color: var(--accent);
        color: var(--text-primary);
      }
      .q-nav-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .q-nav-btn.answered {
        border-color: var(--success);
        color: var(--success);
      }
      .progress-bar {
        height: 6px;
        background: var(--bg-card);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #818cf8);
        transition: width 0.3s;
        border-radius: 3px;
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .katex-display {
        margin: 0.5em 0;
      }
      .review-correct {
        color: var(--success);
        font-weight: 600;
      }
      .review-wrong {
        color: var(--error);
        font-weight: 600;
      }
      .hidden {
        display: none !important;
      }
      .fade-in {
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .lang-btn {
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-secondary);
        transition: all 0.2s;
      }
      .lang-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
    </style>
    <base target="_blank" />
  </head>
  <body class="p-4 md:p-6">
    <div class="max-w-4xl mx-auto">
      <!-- Header -->
      <div class="card p-6 mb-6">
        <div
          class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4"
        >
          <div>
            <h1
              class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent"
              id="titleText"
            >
              Natural ədədlərin vurulması və bölünməsi
            </h1>
            <p class="text-sm text-slate-400 mt-1" id="subtitleText">
              Dövlət İmtahan Mərkəzi - 2025 | V sinif
            </p>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex gap-1">
              <button
                class="lang-btn active"
                onclick="setLang('az')"
                id="btnAz"
              >
                AZ
              </button>
              <button class="lang-btn" onclick="setLang('ru')" id="btnRu">
                RU
              </button>
              <button class="lang-btn" onclick="setLang('en')" id="btnEn">
                EN
              </button>
            </div>
            <div class="timer text-xl text-indigo-400" id="timer">60:00</div>
          </div>
        </div>

        <!-- Variant Tabs -->
        <div class="flex gap-2 mt-6 flex-wrap" id="variantTabs">
          <button
            class="variant-tab active px-4 py-2 rounded-lg font-semibold"
            onclick="switchVariant(0)"
          >
            A variantı
          </button>
          <button
            class="variant-tab px-4 py-2 rounded-lg font-semibold"
            onclick="switchVariant(1)"
          >
            B variantı
          </button>
          <button
            class="variant-tab px-4 py-2 rounded-lg font-semibold"
            onclick="switchVariant(2)"
          >
            C variantı
          </button>
          <button
            class="variant-tab px-4 py-2 rounded-lg font-semibold"
            onclick="switchVariant(3)"
          >
            D variantı
          </button>
        </div>

        <!-- Progress -->
        <div class="mt-4">
          <div class="flex justify-between text-xs text-slate-400 mb-1">
            <span id="progressText">0 / 10</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="card p-6 mb-6 fade-in" id="questionCard">
        <div class="flex items-start gap-3 mb-4">
          <span
            class="bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-lg font-bold text-sm"
            id="qNumber"
            >Sual 1</span
          >
          <span class="text-xs text-slate-500 mt-1" id="qType"
            >Çox variantlı</span
          >
        </div>
        <div class="text-lg md:text-xl leading-relaxed mb-6" id="qText"></div>
        <div class="grid gap-3" id="options"></div>
      </div>

      <!-- Navigation -->
      <div class="card p-4 mb-6">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-4"
        >
          <div class="flex gap-2 flex-wrap justify-center" id="qNav"></div>
          <div class="flex gap-2">
            <button
              onclick="prevQuestion()"
              class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white font-medium transition"
              id="btnPrev"
            >
              ← Əvvəlki
            </button>
            <button
              onclick="nextQuestion()"
              class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition"
              id="btnNext"
            >
              Növbəti →
            </button>
          </div>
        </div>
        <div class="text-center mt-3 text-xs text-slate-500" id="keyboardHint">
          Klaviatura: ← → naviqasiya, 1-5 cavab seçimi
        </div>
      </div>

      <!-- Actions -->
      <div class="flex justify-center gap-3 mb-8">
        <button
          onclick="finishTest()"
          class="px-6 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-lg transition shadow-lg shadow-emerald-900/20"
          id="btnFinish"
        >
          Testi bitir
        </button>
        <button
          onclick="resetTest()"
          class="px-6 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-bold text-lg transition"
          id="btnReset"
        >
          Sıfırla
        </button>
      </div>

      <!-- Results -->
      <div class="card p-6 mb-6 hidden" id="resultsCard">
        <h2 class="text-2xl font-bold mb-4 text-center" id="resultsTitle">
          Nəticələr
        </h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div
            class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700"
          >
            <div class="text-3xl font-bold text-indigo-400" id="resTotal">
              10
            </div>
            <div class="text-xs text-slate-400 mt-1" id="resTotalLabel">
              Ümumi sual
            </div>
          </div>
          <div
            class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700"
          >
            <div class="text-3xl font-bold text-emerald-400" id="resCorrect">
              0
            </div>
            <div class="text-xs text-slate-400 mt-1" id="resCorrectLabel">
              Düzgün
            </div>
          </div>
          <div
            class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700"
          >
            <div class="text-3xl font-bold text-rose-400" id="resWrong">0</div>
            <div class="text-xs text-slate-400 mt-1" id="resWrongLabel">
              Səhv
            </div>
          </div>
          <div
            class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700"
          >
            <div class="text-3xl font-bold text-amber-400" id="resPercent">
              0%
            </div>
            <div class="text-xs text-slate-400 mt-1" id="resPercentLabel">
              Faiz
            </div>
          </div>
        </div>
        <div class="text-center mb-4">
          <button
            onclick="toggleReview()"
            class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition"
            id="btnReview"
          >
            Cavablara bax
          </button>
        </div>
      </div>

      <!-- Review Mode -->
      <div class="hidden" id="reviewSection"></div>
    </div>

    <script>
      // ===================== DATA =====================
      const variants = [
        {
          id: "A",
          name: { az: "A variantı", ru: "Вариант A", en: "Variant A" },
          questions: [
            {
              id: 1,
              text: {
                az: "*-un əvəzinə hansı rəqəm yazdıqda $\\mathbf{5*62}$ ədədi 9-a bölünər?",
                ru: "Какую цифру нужно написать вместо *, чтобы число $\\mathbf{5*62}$ делилось на 9?",
                en: "What digit must be written instead of * so that the number $\\mathbf{5*62}$ is divisible by 9?",
              },
              options: [
                { key: "A", text: { az: "5", ru: "5", en: "5" } },

            {
              id: 2,
              text: {

                en: "Find the value of the numerical expression: $\\left(3^4 - 2^5\\right) \\cdot 5000 - 145000$",
              },
              options: [
                { key: "A", text: { az: "40000", ru: "40000", en: "40000" } },
                { key: "B", text: { az: "29160", ru: "29160", en: "29160" } },
                { key: "C", text: { az: "81000", ru: "81000", en: "81000" } },
                {
                  key: "D",
                  text: { az: "113500", ru: "113500", en: "113500" },
                },
                {
                  key: "E",
                  text: { az: "100000", ru: "100000", en: "100000" },
                },
              ],
              correct: "E",
            },
            {
              id: 3,
              text: {

            {

                { key: "C", text: { az: "26", ru: "26", en: "26" } },

            {

              correct: "E",

            {

                ru: "Из металлической пластины прямоугольной формы длиной 63 см и шириной 56 см сколько минимально квадратных пластин можно вырезать без потерь?",
                en: "From a rectangular metal plate 63 cm long and 56 cm wide, what is the minimum number of square plates that can be cut without waste?",
              },
              options: [
                { key: "A", text: { az: "56", ru: "56", en: "56" } },
                { key: "B", text: { az: "72", ru: "72", en: "72" } },

                { key: "D", text: { az: "110", ru: "110", en: "110" } },
                { key: "E", text: { az: "104", ru: "104", en: "104" } },
              ],
              correct: "B",
            },
            {
              id: 10,
              text: {
                az: "Ədədlər üçün uyğunluğu müəyyən edin.<br>1. $A = 43 · 3256$ və $B = 34 · 3256$<br>2. $A = 4356 · 56$ və $B = 4465 · 56$<br>3. $A = 43 · 32 · 56$ və $B = 32 · 14 · 4 · 43$<br>a. $A - B = 0$ &nbsp; b. $A = B$ &nbsp; c. $A · B = 0$<br>d. $A > B$ &nbsp; e. $A < B$",
                ru: "Установите соответствие для чисел.<br>1. $A = 43 · 3256$ и $B = 34 · 3256$<br>2. $A = 4356 · 56$ и $B = 4465 · 56$<br>3. $A = 43 · 32 · 56$ и $B = 32 · 14 · 4 · 43$<br>a. $A - B = 0$ &nbsp; b. $A = B$ &nbsp; c. $A · B = 0$<br>d. $A > B$ &nbsp; e. $A < B$",

              },
              options: [
                {
                  key: "A",
                  text: {
                    az: "1-d, 2-e, 3-b",
                    ru: "1-d, 2-e, 3-b",
                    en: "1-d, 2-e, 3-b",
                  },
                },
                {
                  key: "B",
                  text: {
                    az: "1-d, 2-e, 3-a",

                {
                  key: "C",

                },

        document.getElementById("btnFinish").textContent = t.finish;
        document.getElementById("btnReset").textContent = t.reset;
        document.getElementById("resultsTitle").textContent = t.results;
        document.getElementById("resTotalLabel").textContent = t.totalQ;
        document.getElementById("resCorrectLabel").textContent = t.correct;
        document.getElementById("resWrongLabel").textContent = t.wrong;
        document.getElementById("resPercentLabel").textContent = t.percent;
        document.getElementById("btnReview").textContent = t.review;
        document.getElementById("keyboardHint").textContent = t.keyboard;
        updateProgress();
      }

      // ===================== RENDER =====================
      function renderVariantTabs() {
        const tabs = document.getElementById("variantTabs");
        tabs.innerHTML = "";
        variants.forEach((v, i) => {
          const btn = document.createElement("button");
          btn.className =
            "variant-tab px-4 py-2 rounded-lg font-semibold " +
            (i === currentVariant ? "active" : "");
          btn.textContent = v.name[currentLang];
          btn.onclick = () => switchVariant(i);
          tabs.appendChild(btn);
        });
      }

      function switchVariant(idx) {
        currentVariant = idx;
        currentQuestion = 0;
        renderVariantTabs();
        renderQuestionNav();
        renderQuestion();
        updateProgress();
      }

      function renderQuestionNav() {
        const nav = document.getElementById("qNav");
        nav.innerHTML = "";
        const qCount = variants[currentVariant].questions.length;
        for (let i = 0; i < qCount; i++) {
          const btn = document.createElement("button");
          const key = `${currentVariant}-${i}`;
          const hasAnswer = answers[key] !== undefined;
          btn.className =
            "q-nav-btn " +
            (i === currentQuestion ? "active" : "") +
            (hasAnswer ? " answered" : "");
          btn.textContent = i + 1;
          btn.onclick = () => {
            currentQuestion = i;
            renderQuestion();
            renderQuestionNav();
          };
          nav.appendChild(btn);
        }
      }

      function renderQuestion() {
        window.scrollTo({ top: 0, behavior: "instant" });
        const q = variants[currentVariant].questions[currentQuestion];
        const key = `${currentVariant}-${currentQuestion}`;
        const selected = answers[key];

        document.getElementById("qNumber").textContent =
          `${translations[currentLang].question} ${q.id}`;
        document.getElementById("qText").innerHTML = q.text[currentLang];

        const optsDiv = document.getElementById("options");
        optsDiv.innerHTML = "";
        q.options.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.className =
            "option-btn p-4 rounded-xl text-left font-medium flex items-center gap-3";
          if (selected === opt.key) btn.classList.add("selected");
          if (reviewMode) {
            if (opt.key === q.correct) btn.classList.add("correct");
            else if (selected === opt.key && opt.key !== q.correct)
              btn.classList.add("wrong");
          }
          btn.innerHTML = `<span class="bg-slate-700 text-slate-300 w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm shrink-0">${opt.key}</span><span>${opt.text[currentLang]}</span>`;
          btn.onclick = () => selectAnswer(opt.key);
          optsDiv.appendChild(btn);
        });

        renderQuestionNav();
        renderMath();
      }

      function renderMath() {
        if (window.renderMathInElement) {
          if (typeof renderMathInElement === "function")
            renderMathInElement(document.getElementById("questionCard"), {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
              ],
              throwOnError: false,
            });
        } else if (window.katex) {
          setTimeout(renderMath, 100);
        }
      }

      function selectAnswer(key) {
        if (finished && !reviewMode) return;
        const mapKey = `${currentVariant}-${currentQuestion}`;
        answers[mapKey] = key;
        saveState();
        renderQuestion();
        updateProgress();
      }

      function updateProgress() {
        const qCount = variants[currentVariant].questions.length;
        let answered = 0;
        for (let i = 0; i < qCount; i++) {
          if (answers[`${currentVariant}-${i}`] !== undefined) answered++;
        }
        document.getElementById("progressText").textContent =
          `${answered} / ${qCount} ${translations[currentLang].progress}`;
        document.getElementById("progressPercent").textContent =
          Math.round((answered / qCount) * 100) + "%";
        document.getElementById("progressBar").style.width =
          (answered / qCount) * 100 + "%";
      }

      // ===================== NAVIGATION =====================
      function prevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion--;
          renderQuestion();
        }
      }
      function nextQuestion() {
        const qCount = variants[currentVariant].questions.length;
        if (currentQuestion < qCount - 1) {
          currentQuestion++;
          renderQuestion();
        }
      }

      function handleKeydown(e) {
        if (finished && !reviewMode) return;
        if (e.key === "ArrowLeft") prevQuestion();
        if (e.key === "ArrowRight") nextQuestion();
        if (e.key >= "1" && e.key <= "5") {
          const idx = parseInt(e.key) - 1;
          const q = variants[currentVariant].questions[currentQuestion];
          if (q.options[idx]) selectAnswer(q.options[idx].key);
        }
      }

      // ===================== TIMER =====================
      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (finished) return;
          timeLeft--;
          if (timeLeft <= 0) {
            timeLeft = 0;
            clearInterval(timerInterval);
            alert(translations[currentLang].timerEnd);
            finishTest(true);
          }
          updateTimerDisplay();
          saveState();
        }, 1000);
        updateTimerDisplay();
      }

      function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60)
          .toString()
          .padStart(2, "0");
        const s = (timeLeft % 60).toString().padStart(2, "0");
        document.getElementById("timer").textContent = `${m}:${s}`;
        if (timeLeft < 300)
          document.getElementById("timer").classList.add("text-red-400");
      }

      // ===================== FINISH & REVIEW =====================
      function finishTest(force = false) {
        if (!force && !confirm(translations[currentLang].confirmFinish)) return;
        finished = true;
        clearInterval(timerInterval);
        document.getElementById("questionCard").classList.add("hidden");
        document.getElementById("resultsCard").classList.remove("hidden");
        document.getElementById("btnFinish").classList.add("hidden");

        const qCount = variants[currentVariant].questions.length;
        let correct = 0;
        for (let i = 0; i < qCount; i++) {
          const key = `${currentVariant}-${i}`;
          if (answers[key] === variants[currentVariant].questions[i].correct)
            correct++;
        }
        const wrong = qCount - correct;
        const percent = Math.round((correct / qCount) * 100);

        document.getElementById("resTotal").textContent = qCount;
        document.getElementById("resCorrect").textContent = correct;
        document.getElementById("resWrong").textContent = wrong;
        document.getElementById("resPercent").textContent = percent + "%";
        saveState();
      }

      function toggleReview() {
        reviewMode = !reviewMode;
        document.getElementById("questionCard").classList.remove("hidden");
        document.getElementById("resultsCard").classList.add("hidden");
        document.getElementById("btnFinish").classList.remove("hidden");
        document.getElementById("btnFinish").textContent = reviewMode
          ? currentLang === "az"
            ? "Nəticələrə qayıt"
            : "Вернуться к результатам"
          : translations[currentLang].finish;
        document.getElementById("btnFinish").onclick = reviewMode
          ? () => {
              reviewMode = false;
              finishTest(true);
            }
          : finishTest;
        currentQuestion = 0;
        renderQuestion();
        renderQuestionNav();
      }

      // ===================== RESET =====================
      function resetTest() {
        if (!confirm(translations[currentLang].confirmReset)) return;
        answers = {};
        timeLeft = 3600;
        finished = false;
        reviewMode = false;
        currentQuestion = 0;
        document.getElementById("questionCard").classList.remove("hidden");
        document.getElementById("resultsCard").classList.add("hidden");
        document.getElementById("btnFinish").classList.remove("hidden");
        document.getElementById("btnFinish").textContent =
          translations[currentLang].finish;
        document.getElementById("btnFinish").onclick = finishTest;
        saveState();
        renderQuestion();
        renderQuestionNav();
        updateProgress();
        startTimer();
      }

      // ===================== STORAGE =====================
      function saveState() {
        const state = {
          answers,
          timeLeft,
          finished,
          currentVariant,
          currentQuestion,
          currentLang,
          reviewMode,
        };
        localStorage.setItem("mathTest_state_v2", JSON.stringify(state));
      }

      function loadState() {
        const raw = localStorage.getItem("mathTest_state_v2");
        if (!raw) return;
        try {
          const state = JSON.parse(raw);
          if (state.answers) answers = state.answers;
          if (state.timeLeft !== undefined) timeLeft = state.timeLeft;
          if (state.finished) finished = state.finished;
          if (state.reviewMode) reviewMode = state.reviewMode;
          if (state.currentVariant !== undefined)
            currentVariant = state.currentVariant;
          if (state.currentQuestion !== undefined)
            currentQuestion = state.currentQuestion;
          if (state.currentLang) currentLang = state.currentLang;

          if (finished) {
            document.getElementById("questionCard").classList.add("hidden");
            document.getElementById("resultsCard").classList.remove("hidden");
            document.getElementById("btnFinish").classList.add("hidden");
            const qCount = variants[currentVariant].questions.length;
            let correct = 0;
            for (let i = 0; i < qCount; i++) {
              const key = `${currentVariant}-${i}`;
              if (
                answers[key] === variants[currentVariant].questions[i].correct
              )
                correct++;
            }
            document.getElementById("resTotal").textContent = qCount;
            document.getElementById("resCorrect").textContent = correct;
            document.getElementById("resWrong").textContent = qCount - correct;
            document.getElementById("resPercent").textContent =
              Math.round((correct / qCount) * 100) + "%";
          }
        } catch (e) {
          console.error(e);
        }
      }

      // ===================== START =====================
      window.addEventListener("DOMContentLoaded", () => {
        if (window.renderMathInElement) {
          init();
        } else {
          setTimeout(init, 500);
        }
      });

      /* ===== АВТОПАТЧ: английский язык ===== */
      (function () {
        function addEn(o, d) {
          if (d > 25 || o == null || typeof o !== "object") return;
          if (Array.isArray(o)) {
            for (var i = 0; i < o.length; i++) addEn(o[i], d + 1);
            return;
          }
          if (o.ru !== undefined && o.en === undefined) {
            o.en = o.ru;
          } else if (
            o.az !== undefined &&
            o.en === undefined &&
            o.ru === undefined
          ) {
            o.en = o.az;
          }
          for (var k in o) {
            if (Object.prototype.hasOwnProperty.call(o, k)) {
              if (k.length > 3 && k.slice(-3) === "_ru") {
                var ek = k.slice(0, -3) + "_en";
                if (o[ek] === undefined) o[ek] = o[k];
              }
              if (k.length > 3 && k.slice(-3) === "_az") {
                var ek2 = k.slice(0, -3) + "_en";
                if (
                  o[ek2] === undefined &&
                  o[k.slice(0, -3) + "_ru"] === undefined
                )
                  o[ek2] = o[k];
              }
            }
          }
          for (var k2 in o) {
            if (k2 !== "en" && Object.prototype.hasOwnProperty.call(o, k2)) {
              try {
                addEn(o[k2], d + 1);
              } catch (e) {}
            }
          }
        }
        try {
          if (typeof examData !== "undefined") addEn(examData, 0);
        } catch (e) {}
        try {
          if (typeof QS !== "undefined") addEn(QS, 0);
        } catch (e) {}
        try {
          if (typeof variants !== "undefined") addEn(variants, 0);
        } catch (e) {}
        try {
          if (typeof ui !== "undefined") addEn(ui, 0);
        } catch (e) {}
        try {
          if (typeof UI !== "undefined") addEn(UI, 0);
        } catch (e) {}
        try {
          if (typeof L !== "undefined" && typeof L === "object") addEn(L, 0);
        } catch (e) {}
        try {
          if (typeof TXT !== "undefined") addEn(TXT, 0);
        } catch (e) {}
        try {
          if (typeof i18n !== "undefined") addEn(i18n, 0);
        } catch (e) {}
        try {
          if (typeof translations !== "undefined") addEn(translations, 0);
        } catch (e) {}
        try {
          if (typeof T !== "undefined" && typeof T === "object") addEn(T, 0);
        } catch (e) {}
      })();
      /* Безопасный ре-рендер после патча данных */
      (function () {
        function _rr() {
          try {
            if (typeof renderAll === "function") {
              renderAll();
              return;
            }
          } catch (e) {}
          try {
            if (typeof render === "function") {
              render();
              return;
            }
          } catch (e) {}
          try {
            if (typeof renderQuestion === "function") {
              renderQuestion();
            }
          } catch (e) {}
          try {
            if (typeof updateTexts === "function") {
              updateTexts();
            }
          } catch (e) {}
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(_rr, 0);
          });
        } else {
          setTimeout(_rr, 0);
        }
      })();
    </script>
    <script>
      (function () {
        // Функция отправки прогресса родительскому окну
        function sendProgress() {
          if (!window.parent) return;

          // Получаем данные о прогрессе из глобальных переменных урока
          let answersCount = 0;
          let totalQuestions = 0;
          let correctCount = 0;
          let completed = false;
          let answers = {};

          // Определяем тип урока по наличию переменных
          if (typeof state !== "undefined" && state.answers) {
            // Для уроков с state.answers (Lesson-1...12, 15, 16, 17)
            const variant =
              state.variantIndex !== undefined ? state.variantIndex : 0;
            const qs =
              typeof QS !== "undefined"
                ? QS
                : typeof examData !== "undefined" && examData.variants
                  ? examData.variants
                  : [];
            const currentVariant = qs[variant] || qs[0];

            if (currentVariant && currentVariant.questions) {
              totalQuestions = currentVariant.questions.length;
              answers = state.answers || {};
              answersCount = Object.keys(answers).length;

              // Подсчёт правильных ответов
              for (let i = 0; i < currentVariant.questions.length; i++) {
                const q = currentVariant.questions[i];
                const key = `${currentVariant.id || "A"}-${q.id}`;
                if (answers[key] === q.correct) {
                  correctCount++;
                }
              }
              completed = state.finished === true;
            }
          } else if (typeof state !== "undefined" && state.ans) {
            // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === state.v);
            totalQuestions = variantQs.length;
            answers = state.ans || {};
            answersCount = Object.keys(answers).length;

            for (let i = 0; i < variantQs.length; i++) {
              const q = variantQs[i];
              const userAns = answers[q.id];
              if (userAns !== undefined) {
                if (q.t === "choice") {
                  if (userAns === q.ans) correctCount++;
                } else if (q.t === "open" || q.t === "match") {
                  if (
                    String(userAns).trim().toLowerCase() ===
                    String(q.ans_text || "")
                      .trim()
                      .toLowerCase()
                  )
                    correctCount++;
                }
              }
            }
            completed = state.finished === true;
          } else if (typeof S !== "undefined" && S.ans) {
            // Альтернативная структура (Lesson-13, 14)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === S.v);
            totalQuestions = variantQs.length;
            answers = S.ans || {};
            answersCount = Object.keys(answers).length;
            completed = S.finished === true;
          }

          if (totalQuestions === 0) return;

          window.parent.postMessage(
            {
              type: "lessonProgress",
              lessonId: parseInt(
                window.location.pathname.match(/Lesson-(\d+)/)?.[1] || "0",
              ),
              answersCount: answersCount,
              totalQuestions: totalQuestions,
              correctCount: correctCount,
              completed: completed,
              answers: answers,
            },
            "*",
          );
        }

        // Перехватываем вызовы finishExam/resetExam/showReview для отправки прогресса
        const originalFinish = window.finishExam;
        if (originalFinish) {
          window.finishExam = function (...args) {
            const result = originalFinish.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalReset = window.resetExam;
        if (originalReset) {
          window.resetExam = function (...args) {
            const result = originalReset.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalShowReview = window.showReview;
        if (originalShowReview) {
          window.showReview = function (...args) {
            const result = originalShowReview.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        // Отправляем прогресс при каждом ответе (перехватываем выбор варианта)
        const originalPick = window.pick;
        if (originalPick) {
          window.pick = function (...args) {
            const result = originalPick.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        const originalSaveT = window.saveT;
        if (originalSaveT) {
          window.saveT = function (...args) {
            const result = originalSaveT.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Для уроков с toggleVariant и т.д.
        const originalRenderAll = window.renderAll;
        if (originalRenderAll) {
          window.renderAll = function (...args) {
            const result = originalRenderAll.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Периодическая отправка прогресса (каждые 3 секунды)
        setInterval(sendProgress, 3000);

        // Запрос времени у родителя
        if (window.parent) {
          window.parent.postMessage({ type: "requestTimer" }, "*");
        }

        // Приём сообщений от родителя
        window.addEventListener("message", function (event) {
          if (event.data && event.data.type === "syncTimer") {
            if (typeof state !== "undefined" && state.timeLeft !== undefined) {
              state.timeLeft = event.data.timeLeft;
              if (typeof updateTimerDisplay === "function")
                updateTimerDisplay();
            } else if (typeof S !== "undefined" && S.timer !== undefined) {
              S.timer = event.data.timeLeft;
            }
          }
          if (event.data && event.data.type === "forceFinish") {
            if (typeof finishExam === "function") finishExam();
          }
          if (event.data && event.data.type === "restoreProgress") {
            // Восстановление сохранённых ответов
            const saved = event.data.progress;
            if (saved && saved.answers) {
              if (typeof state !== "undefined" && state.answers) {
                state.answers = saved.answers;
                if (typeof renderAll === "function") renderAll();
              }
            }
          }
        });

        // Отправляем прогресс при загрузке
        setTimeout(sendProgress, 500);
      })();
    </script>
