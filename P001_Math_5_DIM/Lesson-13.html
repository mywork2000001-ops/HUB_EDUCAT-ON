<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Müstəvi Fiqurlar — DİM | 5-ci sinif</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap");
      :root {
        --primary: #4f46e5;
        --pl: #818cf8;
        --secondary: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --bg: #f1f5f9;
        --card: #fff;
        --text: #1e293b;
        --muted: #64748b;
        --border: #e2e8f0;
      }
      .dark {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* MATH inline styles */
      .mf {
        font-family: "JetBrains Mono", monospace;
        font-style: italic;
        font-size: 1em;
        color: var(--primary);
      }
      .mfr {
        font-family: "JetBrains Mono", monospace;
        font-style: italic;
        font-size: 0.95em;
        color: var(--primary);
      }
      .deg {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.95em;
      }
      .frac {
        display: inline-block;
        text-align: center;
        vertical-align: middle;
        font-family: "JetBrains Mono", monospace;
      }
      .frac .num {
        display: block;
        border-bottom: 1.5px solid currentColor;
        padding: 0 3px;
        font-size: 0.85em;
        line-height: 1.3;
      }
      .frac .den {
        display: block;
        padding: 0 3px;
        font-size: 0.85em;
        line-height: 1.3;
      }
      .angle-sym {
        font-family: "JetBrains Mono", monospace;
        color: var(--primary);
      }

      /* HEADER */
      .hdr {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(14px);
        border-bottom: 2px solid var(--border);
        height: 64px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: background 0.3s;
      }
      .dark .hdr {
        background: rgba(15, 23, 42, 0.9);
      }
      .logo {
        font-size: 1.15rem;
        font-weight: 900;
        background: linear-gradient(135deg, var(--primary), var(--pl));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .vtabs {
        display: flex;
        gap: 5px;
        background: var(--bg);
        border-radius: 12px;
        padding: 4px;
      }
      .dark .vtabs {
        background: #0f172a;
      }
      .vtab {
        padding: 5px 13px;
        border-radius: 9px;
        border: none;
        cursor: pointer;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.82rem;
        color: var(--muted);
        background: transparent;
        transition: all 0.2s;
      }
      .vtab.active {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 2px 8px rgba(79, 70, 229, 0.4);
      }
      .hdr-r {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .bsm {
        padding: 7px 14px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .bsm:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .bicn {
        width: 37px;
        height: 37px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--card);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        color: var(--text);
      }
      .bicn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .bfin {
        padding: 8px 18px;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.88rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .bfin:hover {
        background: #4338ca;
        transform: translateY(-1px);
      }
      .vmob {
        display: none;
        overflow-x: auto;
        background: var(--card);
        border-bottom: 2px solid var(--border);
        padding: 7px 12px;
        gap: 5px;
        scrollbar-width: none;
      }
      .vmob::-webkit-scrollbar {
        display: none;
      }
      @media (max-width: 760px) {
        .vtabs {
          display: none;
        }
        .vmob {
          display: flex;
        }
        .logo {
          font-size: 1rem;
        }
      }

      /* MAIN */
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 26px 14px 60px;
      }

      /* STATS */
      .sbar {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 2fr;
        gap: 13px;
        margin-bottom: 26px;
      }
      @media (max-width: 680px) {
        .sbar {
          grid-template-columns: 1fr 1fr;
        }
      }
      .scard {
        background: var(--card);
        border-radius: 16px;
        border: 2px solid var(--border);
        padding: 13px 16px;
        display: flex;
        align-items: center;
        gap: 11px;
        box-shadow: 0 4px 20px rgba(79, 70, 229, 0.07);
      }
      .sicn {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sicn.b {
        background: #eff6ff;
        color: #3b82f6;
      }
      .dark .sicn.b {
        background: #1e3a8a;
        color: #93c5fd;
      }
      .sicn.g {
        background: #ecfdf5;
        color: var(--secondary);
      }
      .dark .sicn.g {
        background: #064e3b;
        color: #6ee7b7;
      }
      .sicn.y {
        background: #fffbeb;
        color: var(--warning);
      }
      .dark .sicn.y {
        background: #78350f;
        color: #fcd34d;
      }
      .slbl {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .sval {
        font-size: 1.35rem;
        font-weight: 900;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
      }
      .qnav {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 5px;
      }
      .qnb {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 2px solid var(--border);
        background: var(--card);
        font-weight: 800;
        font-size: 0.78rem;
        cursor: pointer;
        color: var(--text);
        transition: all 0.2s;
        font-family: "Nunito", sans-serif;
      }
      .qnb.ok {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      .qnb:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .pbar {
        height: 4px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
        margin-top: 7px;
      }
      .pfil {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--pl));
        border-radius: 99px;
        transition: width 0.4s;
      }

      /* QUESTION CARD */
      .qcard {
        background: var(--card);
        border-radius: 16px;
        border: 2px solid var(--border);
        padding: 26px;
        margin-bottom: 18px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        animation: su 0.3s ease both;
      }
      @keyframes su {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .qcard:hover {
        border-color: rgba(79, 70, 229, 0.3);
        box-shadow: 0 6px 28px rgba(79, 70, 229, 0.11);
      }
      .qhdr {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 14px;
      }
      .qnum {
        background: var(--primary);
        color: #fff;
        font-weight: 900;
        font-size: 0.78rem;
        padding: 4px 12px;
        border-radius: 20px;
        letter-spacing: 0.04em;
      }
      .qtbadge {
        background: var(--bg);
        color: var(--muted);
        font-weight: 800;
        font-size: 0.68rem;
        padding: 3px 10px;
        border-radius: 20px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        border: 1.5px solid var(--border);
      }
      .qtxt {
        font-size: 1.02rem;
        font-weight: 700;
        line-height: 1.75;
        margin-bottom: 16px;
        color: var(--text);
      }

      /* SVG figure */
      .figbox {
        background: var(--bg);
        border-radius: 12px;
        padding: 14px;
        margin: 14px 0;
        border: 2px dashed var(--border);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .figbox svg {
        max-width: 100%;
        height: auto;
      }

      /* OPTIONS */
      .ogrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
      }
      @media (max-width: 480px) {
        .ogrid {
          grid-template-columns: 1fr;
        }
      }
      .obtn {
        text-align: left;
        padding: 13px 16px;
        border-radius: 12px;
        border: 2px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.93rem;
        cursor: pointer;
        transition: all 0.2s;
        line-height: 1.5;
      }
      .obtn:hover {
        border-color: var(--primary);
        background: rgba(79, 70, 229, 0.05);
        transform: translateY(-1px);
      }
      .obtn.sel {
        border-color: var(--primary);
        background: rgba(79, 70, 229, 0.1);
        color: var(--primary);
      }

      /* MATCHING */
      .mwrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 10px;
      }
      @media (max-width: 520px) {
        .mwrap {
          grid-template-columns: 1fr;
        }
      }
      .mcol {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .mit {
        padding: 9px 13px;
        border-radius: 9px;
        background: var(--bg);
        border: 2px solid var(--border);
        font-weight: 700;
        font-size: 0.88rem;
        line-height: 1.5;
      }
      .mbox {
        margin-top: 12px;
        padding: 13px;
        border-radius: 12px;
        background: rgba(79, 70, 229, 0.05);
        border: 2px solid rgba(79, 70, 229, 0.2);
      }
      .mbox label {
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--primary);
        display: block;
        margin-bottom: 7px;
        letter-spacing: 0.05em;
      }
      .minp {
        width: 100%;
        padding: 9px 13px;
        border-radius: 9px;
        border: 2px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        transition: border-color 0.2s;
      }
      .minp:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* OPEN */
      .oinp {
        width: 100%;
        padding: 11px 15px;
        border-radius: 11px;
        border: 2px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.98rem;
        font-weight: 700;
        transition: border-color 0.2s;
        margin-top: 9px;
      }
      .oinp:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* HINT */
      .hbtn {
        margin-top: 7px;
        padding: 5px 13px;
        border-radius: 8px;
        border: 2px solid var(--warning);
        background: transparent;
        color: var(--warning);
        font-family: "Nunito", sans-serif;
        font-weight: 800;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .hbtn:hover {
        background: var(--warning);
        color: #fff;
      }
      .hint {
        display: none;
        margin-top: 8px;
        padding: 9px 13px;
        border-radius: 9px;
        background: rgba(245, 158, 11, 0.08);
        border: 2px solid rgba(245, 158, 11, 0.25);
        font-size: 0.84rem;
        font-weight: 700;
        color: var(--warning);
        line-height: 1.6;
      }
      .hint.show {
        display: block;
      }

      /* MODAL */
      .mover {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(6px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .mover.show {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--card);
        border-radius: 22px;
        max-width: 460px;
        width: 100%;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        transform: scale(0.9);
        transition: transform 0.3s;
      }
      .mover.show .modal {
        transform: scale(1);
      }
      .mhdr {
        background: linear-gradient(135deg, var(--primary), var(--pl));
        padding: 30px;
        text-align: center;
      }
      .mscore {
        font-size: 3.2rem;
        font-weight: 900;
        color: #fff;
      }
      .msub {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 700;
        margin-top: 3px;
      }
      .mbody {
        padding: 26px;
      }
      .rgrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 11px;
        margin-bottom: 22px;
      }
      .rbox {
        padding: 15px;
        border-radius: 13px;
        text-align: center;
        border: 2px solid var(--border);
      }
      .rbox label {
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.07em;
        color: var(--muted);
        display: block;
        margin-bottom: 5px;
      }
      .rval {
        font-size: 1.9rem;
        font-weight: 900;
      }
      .rval.g {
        color: var(--secondary);
      }
      .rval.r {
        color: var(--danger);
      }
      .rval.b {
        color: var(--primary);
      }
      .brest {
        width: 100%;
        padding: 13px;
        border-radius: 13px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        font-size: 0.97rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .brest:hover {
        background: #4338ca;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <header class="hdr">
      <div style="display: flex; align-items: center; gap: 15px">
        <span class="logo">📐 DİM · 5-ci sinif</span>
        <div class="vtabs" id="VT"></div>
      </div>
      <div class="hdr-r">
        <button class="bsm" onclick="toggleLang()" id="LB">AZ / RU</button>
        <button class="bicn" onclick="toggleDark()" id="DB" title="Tema">
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button class="bfin" onclick="showRes()">✓ Bitir</button>
      </div>
    </header>
    <div class="vmob" id="VM"></div>

    <main>
      <div class="sbar">
        <div class="scard">
          <div class="sicn b">
            <svg
              width="21"
              height="21"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </div>
          <div>
            <div class="slbl" id="L_time">Zaman</div>
            <div class="sval" id="TMR">60:00</div>
          </div>
        </div>
        <div class="scard">
          <div class="sicn g">
            <svg
              width="21"
              height="21"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
            </svg>
          </div>
          <div>
            <div class="slbl" id="L_prog">Tərəqqi</div>
            <div class="sval" id="PRG">0/10</div>
            <div class="pbar">
              <div class="pfil" id="PFI" style="width: 0%"></div>
            </div>
          </div>
        </div>
        <div class="scard">
          <div class="sicn y">
            <svg
              width="21"
              height="21"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              />
            </svg>
          </div>
          <div>
            <div class="slbl" id="L_var">Variant</div>
            <div class="sval" id="VAR">A</div>
          </div>
        </div>
        <div class="scard">
          <div style="flex: 1">
            <div class="slbl" id="L_nav">Sual Naviqasiyası</div>
            <div class="qnav" id="QN"></div>
          </div>
        </div>
      </div>
      <div id="QW"></div>
    </main>

    <div class="mover" id="MO">
      <div class="modal">
        <div class="mhdr">
          <div class="mscore" id="RSC">—</div>
          <div class="msub" id="RSB">Nəticə</div>
        </div>
        <div class="mbody">
          <div class="rgrid">
            <div class="rbox">
              <label id="L_cor">Düzgün</label>
              <div class="rval g" id="RCO">0</div>
            </div>
            <div class="rbox">
              <label id="L_wr">Səhv</label>
              <div class="rval r" id="RWR">0</div>
            </div>
            <div class="rbox">
              <label id="L_bl">Boş</label>
              <div class="rval b" id="RBL">0</div>
            </div>
            <div class="rbox">
              <label id="L_tm">Vaxt</label>
              <div class="rval b" id="RTM">0:00</div>
            </div>
          </div>
          <button class="brest" onclick="restart()">🔄 Yenidən başla</button>
        </div>
      </div>
    </div>

    <script>
      /* ── MATH HELPERS ─────────────────────────────────────────── */
      // These produce clean HTML without any LaTeX dependency
      const M = (s) => `<span class="mf">${s}</span>`;
      const D = (n) => `<span class="deg">${n}°</span>`;
      const ANG = (s) => `<span class="angle-sym">∠${s}</span>`;
      const FR = (a, b) =>
        `<span class="frac"><span class="num">${a}</span><span class="den">${b}</span></span>`;
      const SUP = (s) => `<sup>${s}</sup>`;
      const SUB2 = (s) => `<sub>${s}</sub>`;
      // Degree with variable: (4x−10)°
      const EXP = (s) => `<span class="mfr">(${s})°</span>`;

      /* ── SVG FIGURES ─────────────────────────────────────────── */
      const F = {
        /* A7 – ∠EBC: horizontal line ABC, vertical BD from B, ray BE at 40° left of BD */
        A7: `<svg viewBox="0 0 290 155" xmlns="http://www.w3.org/2000/svg" width="270">
  <line x1="15" y1="118" x2="275" y2="118" stroke="currentColor" stroke-width="2.2"/>
  <line x1="140" y1="118" x2="140" y2="18" stroke="currentColor" stroke-width="2.2"/>
  <line x1="140" y1="118" x2="88" y2="20" stroke="currentColor" stroke-width="2.2"/>
  <rect x="133" y="111" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.6"/>

               value="${S.ans[q.id] || ""}" onchange="saveT('${q.id}',this.value)"/>`;
          }
          if (q.hint) {
            const hv = S.hint[q.id];
            h += `<button class="hbtn" onclick="tHint('${q.id}')">💡 ${{ az: "İpucu", ru: "Подсказка", en: "Hint" }[S.lang]}</button>
          <div class="hint${hv ? " show" : ""}" id="H${q.id}">💡 ${q.hint[S.lang] || q.hint.az}</div>`;
          }
          card.innerHTML = h;
          wrap.appendChild(card);
        });
      }

      function pick(id, oi) {
        S.ans[id] = oi;
        document
          .getElementById("q" + id)
          .querySelectorAll(".obtn")
          .forEach((b, i) => {
            b.className = "obtn" + (i === oi ? " sel" : "");
          });
        upStat();
      }
      function saveT(id, v) {
        if (v.trim()) S.ans[id] = v.trim();
        else delete S.ans[id];
        upStat();
      }
      function tHint(id) {
        S.hint[id] = !S.hint[id];
        const el = document.getElementById("H" + id);
        if (el) el.className = "hint" + (S.hint[id] ? " show" : "");
      }
      function upStat() {
        const qs = QS.filter((q) => q.v === S.v);
        const done = qs.filter((q) => S.ans[q.id] !== undefined).length;
        document.getElementById("PRG").textContent = done + "/" + qs.length;
        document.getElementById("PFI").style.width =
          (qs.length ? (done / qs.length) * 100 : 0) + "%";
        document
          .getElementById("QN")
          .querySelectorAll(".qnb")
          .forEach((b, i) => {
            b.className = "qnb" + (S.ans[qs[i].id] !== undefined ? " ok" : "");
          });
      }

      const UIL = {
        az: {
          time: "Zaman",
          prog: "Tərəqqi",
          vari: "Variant",
          nav: "Sual Naviqasiyası",
          cor: "Düzgün",
          wr: "Səhv",
          bl: "Boş",
          tm: "Vaxt",
          fin: "✓ Bitir",
          restart: "🔄 Yenidən başla",
          badgeC: "Test",
          badgeM: "Uyğunluq",
          badgeO: "Açıq",
          sual: "SUAL",
        },
        ru: {
          time: "Время",
          prog: "Прогресс",
          vari: "Вариант",
          nav: "Навигация",
          cor: "Верно",
          wr: "Неверно",
          bl: "Пусто",
          tm: "Время",
          fin: "✓ Завершить",
          restart: "🔄 Начать заново",
          badgeC: "Тест",
          badgeM: "Соответствие",
          badgeO: "Открытый",
          sual: "ВОПРОС",
        },
        en: {
          time: "Time",
          prog: "Progress",
          vari: "Variant",
          nav: "Question navigation",
          cor: "Correct",
          wr: "Wrong",
          bl: "Empty",
          tm: "Time",
          fin: "✓ Finish",
          restart: "🔄 Restart",
          badgeC: "Test",
          badgeM: "Matching",
          badgeO: "Open",
          sual: "QUESTION",
        },
      };
      function applyUI() {
        const L = UIL[S.lang] || UIL.az;
        const set = (id, v) => {
          const e = document.getElementById(id);
          if (e) e.textContent = v;
        };
        set("L_time", L.time);
        set("L_prog", L.prog);
        set("L_var", L.vari);
        set("L_nav", L.nav);
        set("L_cor", L.cor);
        set("L_wr", L.wr);
        set("L_bl", L.bl);
        set("L_tm", L.tm);
        const fb = document.querySelector(".bfin");
        if (fb) fb.textContent = L.fin;
        const rb = document.querySelector(".brest");
        if (rb) rb.textContent = L.restart;
      }

      function toggleLang() {
        const _lg = ["az", "ru", "en"];
        S.lang = _lg[(_lg.indexOf(S.lang) + 1) % 3];
        document.getElementById("LB").textContent = {
          az: "RU",
          ru: "EN",
          en: "AZ",
        }[S.lang];
        renderAll();
        applyUI();
      }
      function toggleDark() {
        S.dark = !S.dark;
        document.documentElement.classList.toggle("dark", S.dark);
        document.getElementById("DB").innerHTML = S.dark
          ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`
          : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
      }
      function showRes() {
        const qs = QS.filter((q) => q.v === S.v);
        let ok = 0,
          wr = 0,
          bl = 0;
        qs.forEach((q) => {
          const a = S.ans[q.id];
          if (a === undefined) {
            bl++;
            return;
          }
          if (q.t === "choice") {
            if (a === q.ans) ok++;
            else wr++;
          } else if (q.t === "open" || q.t === "match") {
            if (a.trim() === q.ans_text.trim()) ok++;
            else wr++;
          }
        });
        const pct = Math.round((ok / qs.length) * 100);
        document.getElementById("RSC").textContent = pct + "%";
        document.getElementById("RSB").textContent =
          ok +
          "/" +
          qs.length +
          {
            az: " doğru — Variant ",
            ru: " верно — Вариант ",
            en: " correct — Variant ",
          }[S.lang] +
          S.v;
        document.getElementById("RCO").textContent = ok;
        document.getElementById("RWR").textContent = wr;
        document.getElementById("RBL").textContent = bl;
        const _el = 3600 - S.timer;
        const m = Math.floor(_el / 60),
          sc = _el % 60;
        document.getElementById("RTM").textContent =
          m + ":" + String(sc).padStart(2, "0");
        document.getElementById("MO").classList.add("show");
      }
      function restart() {
        S.ans = {};
        S.hint = {};
        S.timer = 3600;
        document.getElementById("MO").classList.remove("show");
        renderAll();
      }

      /* ===== АВТОПАТЧ: английский язык ===== */
      (function () {
        function addEn(o, d) {
          if (d > 25 || o == null || typeof o !== "object") return;
          if (Array.isArray(o)) {
            for (var i = 0; i < o.length; i++) addEn(o[i], d + 1);
            return;
          }
          if (o.ru !== undefined && o.en === undefined) {
            o.en = o.ru;
          } else if (
            o.az !== undefined &&
            o.en === undefined &&
            o.ru === undefined
          ) {
            o.en = o.az;
          }
          for (var k in o) {
            if (Object.prototype.hasOwnProperty.call(o, k)) {
              if (k.length > 3 && k.slice(-3) === "_ru") {
                var ek = k.slice(0, -3) + "_en";
                if (o[ek] === undefined) o[ek] = o[k];
              }
              if (k.length > 3 && k.slice(-3) === "_az") {
                var ek2 = k.slice(0, -3) + "_en";
                if (
                  o[ek2] === undefined &&
                  o[k.slice(0, -3) + "_ru"] === undefined
                )
                  o[ek2] = o[k];
              }
            }
          }
          for (var k2 in o) {
            if (k2 !== "en" && Object.prototype.hasOwnProperty.call(o, k2)) {
              try {
                addEn(o[k2], d + 1);
              } catch (e) {}
            }
          }
        }
        try {
          if (typeof examData !== "undefined") addEn(examData, 0);
        } catch (e) {}
        try {
          if (typeof QS !== "undefined") addEn(QS, 0);
        } catch (e) {}
        try {
          if (typeof variants !== "undefined") addEn(variants, 0);
        } catch (e) {}
        try {
          if (typeof ui !== "undefined") addEn(ui, 0);
        } catch (e) {}
        try {
          if (typeof UI !== "undefined") addEn(UI, 0);
        } catch (e) {}
        try {
          if (typeof L !== "undefined" && typeof L === "object") addEn(L, 0);
        } catch (e) {}
        try {
          if (typeof TXT !== "undefined") addEn(TXT, 0);
        } catch (e) {}
        try {
          if (typeof i18n !== "undefined") addEn(i18n, 0);
        } catch (e) {}
        try {
          if (typeof T !== "undefined" && typeof T === "object") addEn(T, 0);
        } catch (e) {}
      })();
      /* Безопасный ре-рендер после патча данных */
      (function () {
        function _rr() {
          try {
            if (typeof renderAll === "function") {
              renderAll();
              return;
            }
          } catch (e) {}
          try {
            if (typeof render === "function") {
              render();
              return;
            }
          } catch (e) {}
          try {
            if (typeof renderQuestion === "function") {
              renderQuestion();
            }
          } catch (e) {}
          try {
            if (typeof updateTexts === "function") {
              updateTexts();
            }
          } catch (e) {}
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(_rr, 0);
          });
        } else {
          setTimeout(_rr, 0);
        }
      })();
    </script>
    <script>
      (function () {
        // Функция отправки прогресса родительскому окну
        function sendProgress() {
          if (!window.parent) return;

          // Получаем данные о прогрессе из глобальных переменных урока
          let answersCount = 0;
          let totalQuestions = 0;
          let correctCount = 0;
          let completed = false;
          let answers = {};

          // Определяем тип урока по наличию переменных
          if (typeof state !== "undefined" && state.answers) {
            // Для уроков с state.answers (Lesson-1...12, 15, 16, 17)
            const variant =
              state.variantIndex !== undefined ? state.variantIndex : 0;
            const qs =
              typeof QS !== "undefined"
                ? QS
                : typeof examData !== "undefined" && examData.variants
                  ? examData.variants
                  : [];
            const currentVariant = qs[variant] || qs[0];

            if (currentVariant && currentVariant.questions) {
              totalQuestions = currentVariant.questions.length;
              answers = state.answers || {};
              answersCount = Object.keys(answers).length;

              // Подсчёт правильных ответов
              for (let i = 0; i < currentVariant.questions.length; i++) {
                const q = currentVariant.questions[i];
                const key = `${currentVariant.id || "A"}-${q.id}`;
                if (answers[key] === q.correct) {
                  correctCount++;
                }
              }
              completed = state.finished === true;
            }
          } else if (typeof state !== "undefined" && state.ans) {
            // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === state.v);
            totalQuestions = variantQs.length;
            answers = state.ans || {};
            answersCount = Object.keys(answers).length;

            for (let i = 0; i < variantQs.length; i++) {
              const q = variantQs[i];
              const userAns = answers[q.id];
              if (userAns !== undefined) {
                if (q.t === "choice") {
                  if (userAns === q.ans) correctCount++;
                } else if (q.t === "open" || q.t === "match") {
                  if (
                    String(userAns).trim().toLowerCase() ===
                    String(q.ans_text || "")
                      .trim()
                      .toLowerCase()
                  )
                    correctCount++;
                }
              }
            }
            completed = state.finished === true;
          } else if (typeof S !== "undefined" && S.ans) {
            // Альтернативная структура (Lesson-13, 14)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === S.v);
            totalQuestions = variantQs.length;
            answers = S.ans || {};
            answersCount = Object.keys(answers).length;
            completed = S.finished === true;
          }

          if (totalQuestions === 0) return;

          window.parent.postMessage(
            {
              type: "lessonProgress",
              lessonId: parseInt(
                window.location.pathname.match(/Lesson-(\d+)/)?.[1] || "0",
              ),
              answersCount: answersCount,
              totalQuestions: totalQuestions,
              correctCount: correctCount,
              completed: completed,
              answers: answers,
            },
            "*",
          );
        }

        // Перехватываем вызовы finishExam/resetExam/showReview для отправки прогресса
        const originalFinish = window.finishExam;
        if (originalFinish) {
          window.finishExam = function (...args) {
            const result = originalFinish.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalReset = window.resetExam;
        if (originalReset) {
          window.resetExam = function (...args) {
            const result = originalReset.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        const originalShowReview = window.showReview;
        if (originalShowReview) {
          window.showReview = function (...args) {
            const result = originalShowReview.apply(this, args);
            setTimeout(sendProgress, 100);
            return result;
          };
        }

        // Отправляем прогресс при каждом ответе (перехватываем выбор варианта)
        const originalPick = window.pick;
        if (originalPick) {
          window.pick = function (...args) {
            const result = originalPick.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        const originalSaveT = window.saveT;
        if (originalSaveT) {
          window.saveT = function (...args) {
            const result = originalSaveT.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Для уроков с toggleVariant и т.д.
        const originalRenderAll = window.renderAll;
        if (originalRenderAll) {
          window.renderAll = function (...args) {
            const result = originalRenderAll.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Периодическая отправка прогресса (каждые 3 секунды)
        setInterval(sendProgress, 3000);

        // Запрос времени у родителя
        if (window.parent) {
          window.parent.postMessage({ type: "requestTimer" }, "*");
        }

        // Приём сообщений от родителя
        window.addEventListener("message", function (event) {
          if (event.data && event.data.type === "syncTimer") {
            if (typeof state !== "undefined" && state.timeLeft !== undefined) {
              state.timeLeft = event.data.timeLeft;
              if (typeof updateTimerDisplay === "function")
                updateTimerDisplay();
            } else if (typeof S !== "undefined" && S.timer !== undefined) {
              S.timer = event.data.timeLeft;
            }
          }
          if (event.data && event.data.type === "forceFinish") {
            if (typeof finishExam === "function") finishExam();
          }
          if (event.data && event.data.type === "restoreProgress") {
            // Восстановление сохранённых ответов
            const saved = event.data.progress;
            if (saved && saved.answers) {
              if (typeof state !== "undefined" && state.answers) {
                state.answers = saved.answers;
                if (typeof renderAll === "function") renderAll();
              }
            }
          }
        });

        // Отправляем прогресс при загрузке
        setTimeout(sendProgress, 500);
      })();
    </script>
