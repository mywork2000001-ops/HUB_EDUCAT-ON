<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DİM 2025 – Adi kəsrlərin vurulması və bölünməsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --primary-light: #eff6ff;
        --danger: #ef4444;
        --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        --radius: 1rem;
      }
      .dark {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --primary: #60a5fa;
        --primary-light: #1e3a8a;
      }
      * {
        font-family: "Inter", system-ui, sans-serif;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.3s,
          color 0.3s;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: 0.2s;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: var(--border);
        color: var(--text);
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border);
      }
      .q-btn {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.65rem;
        font-weight: 600;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }
      .q-btn.active {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
      }
      .q-btn.answered {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
      }
      .option {
        padding: 1rem;
        border: 2px solid var(--border);
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .option:hover {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .option.selected {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .option.correct {
        border-color: #10b981;
        background: #ecfdf5;
      }
      .option.wrong {
        border-color: var(--danger);
        background: #fef2f2;
      }
      .tab {
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--muted);
      }
      .tab.active {
        background: var(--primary-light);
        color: var(--primary);
      }
      .progress-bar {
        height: 0.5rem;
        background: var(--border);
        border-radius: 9999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--primary);
        transition: width 0.5s ease;
      }
      .matching-area {
        background: var(--bg);
        padding: 1rem;
        border-radius: 0.75rem;
        border: 1px dashed var(--border);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <header
      class="sticky top-0 z-50 backdrop-blur-md bg-opacity-90 border-b"
      style="background: var(--surface); border-color: var(--border)"

      <div

      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg bg-blue-600"
          >
            DİM
          </div>
          <div>
            <h1 class="text-sm sm:text-base font-bold leading-tight">
              Adi kəsrlərin vurulması və bölünməsi
            </h1>
            <p class="text-xs text-slate-500">Riyaziyyat | V sinif | 2025</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="toggleLang()" class="tab" id="langBtn">RU</button>
          <button onclick="toggleTheme()" class="tab">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 grid gap-6">
      <div class="card p-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="timer">60:00</div>
            <div class="text-xs text-slate-500">Qalan vaxt</div>
          </div>
          <div class="w-px h-10 bg-slate-200"></div>
          <div class="text-center">
            <div class="text-2xl font-bold tabular-nums" id="answeredCount">
              0/40
            </div>
            <div class="text-xs text-slate-500">Cavablanıb</div>
          </div>
        </div>
        <div class="flex-1 min-w-[200px]">
          <div class="flex justify-between text-xs mb-1 text-slate-500">
            <span>Progress</span><span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="flex gap-2 overflow-x-auto pb-1" id="variantTabs"></div>

      <div class="grid lg:grid-cols-[280px_1fr] gap-6">
        <aside class="space-y-4">
          <div class="card p-4">
            <h3 class="text-sm font-semibold mb-3">Sual gridi</h3>
            <div class="grid grid-cols-5 gap-2" id="questionGrid"></div>
          </div>
        </aside>

        <section class="card p-6 flex flex-col gap-6">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span
                class="px-3 py-1 rounded-lg text-sm font-bold text-white bg-blue-500"
                id="qBadge"
                >A1</span
              >
              <span class="text-sm font-medium text-slate-500" id="qCounter"
                >1 / 10</span
              >
            </div>
            <span class="text-xs px-2 py-1 rounded-md bg-blue-50 text-blue-600"
              >Vurulma və Bölünmə</span
            >
          </div>

          <div class="fade-in" id="qContent">
            <h2
              class="text-lg font-semibold leading-relaxed mb-4"
              id="qText"
            ></h2>
            <div id="qMatching" class="matching-area hidden mb-4"></div>
            <div class="space-y-3" id="qOptions"></div>
          </div>

          <div
            class="flex items-center justify-between pt-4 border-t border-slate-100"
          >
            <button onclick="prevQuestion()" class="btn-secondary">
              Əvvəlki
            </button>
            <div class="flex gap-2">
              <button
                onclick="finishExam()"
                class="btn-secondary text-red-500 border-red-100"
              >
                Bitir
              </button>
              <button onclick="nextQuestion()" class="btn-primary">
                Növbəti
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      id="resultModal"
      class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm"
    >
      <div class="card w-full max-w-xl p-8 space-y-6">
        <div class="text-center">

          <h2 class="text-2xl font-bold">İmtahan nəticəsi</h2>
          <p class="text-sm text-slate-500" id="resultMessage"></p>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="card p-4 text-center border-green-100 bg-green-50/30">
            <div class="text-xl font-bold text-green-600" id="correctCount">

            </div>
            <div class="text-xs">Düz</div>
          </div>
          <div class="card p-4 text-center border-red-100 bg-red-50/30">
            <div class="text-xl font-bold text-red-600" id="wrongCount">0</div>
            <div class="text-xs">Səhv</div>
          </div>
          <div class="card p-4 text-center border-amber-100 bg-amber-50/30">
            <div class="text-xl font-bold text-amber-600" id="emptyCount">
              0
            </div>
            <div class="text-xs">Boş</div>
          </div>
        </div>
        <div class="flex gap-3 justify-center">
          <button onclick="showReview()" class="btn-primary">
            Suallara bax
          </button>
          <button onclick="location.reload()" class="btn-secondary">
            Yenidən başla
          </button>
        </div>
      </div>
    </div>

                    "$1\\frac{2}{5}$ и $\\frac{3}{5}$",
                    "$3\\frac{1}{3}$ и $\\frac{2}{5}$",
                    "$\\frac{3}{5}$ и $3\\frac{1}{3}$",
                    "$\\frac{3}{10}$ и $3\\frac{1}{3}$",
                    "$3\\frac{3}{7}$ и $\\frac{4}{7}$",
                  ],
                },
                correct: "D",
              },
              {
                id: 8,
                text: {
                  az: "Mağazadakı malın $\\frac{1}{6}$ hissəsini satdılar və 75 kq satılmamış qaldı. Mağazada cəmi neçə kiloqram mal var idi?",
                  ru: "Продали $\\frac{1}{6}$ товара, осталось 75 кг. Сколько было всего?",
                  en: "Продали $\\frac{1}{6}$ товара, осталось 75 kg. How many было всего?",
                },
                options: {
                  az: ["90", "150", "100", "80", "120"],
                  ru: ["90", "150", "100", "80", "120"],
                  en: ["90", "150", "100", "80", "120"],
                },
                correct: "A",
              },
              {
                id: 9,
                text: {
                  az: "$\\frac{3}{10}$ hissəsi 36 olan ədədi tapın.",
                  ru: "Найдите число, $\\frac{3}{10}$ которого равна 36.",
                  en: "Find number, $\\frac{3}{10}$ whose is equal 36.",
                },
                options: {
                  az: ["120", "100", "150", "108", "90"],
                  ru: ["120", "100", "150", "108", "90"],
                  en: ["120", "100", "150", "108", "90"],
                },
                correct: "A",
              },
              {
                id: 10,
                text: {
                  az: "$a$ və $b$ ədədləri üçün uyğunluğu müəyyən edin.",
                  ru: "Установите соответствие.",
                  en: "Установите correspondence.",
                },
                matching: {
                  left: [
                    "1. $a=7,5$ və $b=\\frac{2}{15}$",
                    "2. $a=8$ və $b=15$",
                    "3. $a=8\\frac{4}{5}$ və $b=2,8$",
                  ],
                  right: [
                    "a. $a$ və $b$ ədədləri qarşılıqlı tərs ədədlərdir",
                    "b. $a-b$ fərqi natural ədəddir",
                    "c. $a+b$ cəmi 5-dən kiçikdir",
                    "d. $ab$ hasili sadə tək ədəddir",
                    "e. $a$ və $b$ qarşılıqlı sadə ədədlərdir",
                  ],
                },
                options: {
                  az: [
                    "1-a, 2-e, 3-b",
                    "1-b, 2-a, 3-c",
                    "1-c, 2-d, 3-a",
                    "1-d, 2-c, 3-e",
                    "1-e, 2-b, 3-d",
                  ],
                  ru: [
                    "1-a, 2-e, 3-b",
                    "1-b, 2-a, 3-c",
                    "1-c, 2-d, 3-a",
                    "1-d, 2-c, 3-e",
                    "1-e, 2-b, 3-d",
                  ],
                  en: [
                    "1-a, 2-e, 3-b",
                    "1-b, 2-a, 3-c",
                    "1-c, 2-d, 3-a",
                    "1-d, 2-c, 3-e",
                    "1-e, 2-b, 3-d",
                  ],
                },
                correct: "A",
              },
            ],
          },
        ],
      };

      let state = {
        variantIndex: 0,
        questionIndex: 0,
        answers: {},
        timeLeft: 3600,
        finished: false,
        review: false,
        lang: "az",
      };

      function renderAll() {
        const variant = examData.variants[state.variantIndex];
        const q = variant.questions[state.questionIndex];
        const key = `${variant.id}-${q.id}`;

        // Tabs
        const tabs = document.getElementById("variantTabs");
        tabs.innerHTML = "";
        examData.variants.forEach((v, i) => {
          const b = document.createElement("button");
          b.className = `tab ${i === state.variantIndex ? "active" : ""}`;
          b.textContent = v.name[state.lang];
          b.onclick = () => {
            state.variantIndex = i;
            state.questionIndex = 0;
            renderAll();
          };
          tabs.appendChild(b);
        });

        // Grid
        const grid = document.getElementById("questionGrid");
        grid.innerHTML = "";
        variant.questions.forEach((qv, i) => {
          const b = document.createElement("button");
          const qKey = `${variant.id}-${qv.id}`;
          b.className = `q-btn ${i === state.questionIndex ? "active" : ""} ${state.answers[qKey] ? "answered" : ""}`;
          b.textContent = qv.id;
          b.onclick = () => {
            state.questionIndex = i;
            renderAll();
          };
          grid.appendChild(b);
        });

        // Question UI
        document.getElementById("qBadge").textContent = variant.id + q.id;
        document.getElementById("qCounter").textContent =
          `${state.questionIndex + 1} / 10`;
        document.getElementById("qText").innerHTML = q.text[state.lang];

        const matchDiv = document.getElementById("qMatching");
        if (q.matching) {
          matchDiv.classList.remove("hidden");
          matchDiv.innerHTML = `
      <div class="space-y-2 border-r pr-4 border-dashed border-slate-300">${q.matching.left.join("<br>")}</div>
      <div class="space-y-2 pl-4">${q.matching.right.join("<br>")}</div>
    `;
        } else {
          matchDiv.classList.add("hidden");
        }

        const opts = document.getElementById("qOptions");
        opts.innerHTML = "";
        q.options[state.lang].forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          const div = document.createElement("div");
          div.className = `option ${state.answers[key] === letter ? "selected" : ""}`;
          if (state.review) {
            if (letter === q.correct) div.classList.add("correct");
            else if (state.answers[key] === letter) div.classList.add("wrong");
          }
          div.innerHTML = `<span class="w-8 h-8 rounded-lg flex items-center justify-center font-bold bg-blue-100 text-blue-600">${letter}</span><span>${opt}</span>`;
          div.onclick = () => {
            if (!state.finished) {
              state.answers[key] = letter;
              renderAll();
            }
          };
          opts.appendChild(div);
        });

        // Progress
        const ansCount = Object.keys(state.answers).length;
        document.getElementById("answeredCount").textContent = `${ansCount}/40`;
        document.getElementById("progressPercent").textContent =
          `${Math.round((ansCount / 40) * 100)}%`;
        document.getElementById("progressBar").style.width =
          `${(ansCount / 40) * 100}%`;

        renderMath();
      }

      function renderMath() {
        if (typeof renderMathInElement === "function")
          renderMathInElement(document.body, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
            ],
            throwOnError: false,
          });
      }

      function prevQuestion() {
        if (state.questionIndex > 0) {
          state.questionIndex--;
          renderAll();
        }
      }
      function nextQuestion() {
        if (state.questionIndex < 9) {
          state.questionIndex++;
          renderAll();
        }
      }
      function toggleLang() {
        const _lg = ["az", "ru", "en"];
        state.lang = _lg[(_lg.indexOf(state.lang) + 1) % 3];
        document.getElementById("langBtn").textContent =
          state.lang.toUpperCase();
        renderAll();
      }
      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
      }

      function finishExam() {
        state.finished = true;
        let c = 0,
          w = 0,
          e = 0;
        examData.variants.forEach((v) => {
          v.questions.forEach((q) => {
            const a = state.answers[`${v.id}-${q.id}`];
            if (!a) e++;
            else if (a === q.correct) c++;
            else w++;
          });
        });
        document.getElementById("correctCount").textContent = c;
        document.getElementById("wrongCount").textContent = w;
        document.getElementById("emptyCount").textContent = e;
        document.getElementById("resultScoreIcon").textContent = c;
        document.getElementById("resultModal").classList.remove("hidden");
        document.getElementById("resultModal").classList.add("flex");
      }

      function showReview() {
        state.review = true;
        document.getElementById("resultModal").classList.add("hidden");
        renderAll();
      }

      renderAll();
      setInterval(() => {
        if (!state.finished && state.timeLeft > 0) {
          state.timeLeft--;
          const m = Math.floor(state.timeLeft / 60)
            .toString()
            .padStart(2, "0");
          const s = (state.timeLeft % 60).toString().padStart(2, "0");
          document.getElementById("timer").textContent = `${m}:${s}`;
        }
      }, 1000);

      /* ===== АВТОПАТЧ: английский язык ===== */
      (function () {
        function addEn(o, d) {
          if (d > 25 || o == null || typeof o !== "object") return;
          if (Array.isArray(o)) {
            for (var i = 0; i < o.length; i++) addEn(o[i], d + 1);
            return;
          }
          if (o.ru !== undefined && o.en === undefined) {
            o.en = o.ru;
          } else if (
            o.az !== undefined &&
            o.en === undefined &&
            o.ru === undefined
          ) {
            o.en = o.az;
          }
          for (var k in o) {
            if (Object.prototype.hasOwnProperty.call(o, k)) {
              if (k.length > 3 && k.slice(-3) === "_ru") {
                var ek = k.slice(0, -3) + "_en";
                if (o[ek] === undefined) o[ek] = o[k];
              }
              if (k.length > 3 && k.slice(-3) === "_az") {
                var ek2 = k.slice(0, -3) + "_en";
                if (
                  o[ek2] === undefined &&
                  o[k.slice(0, -3) + "_ru"] === undefined
                )
                  o[ek2] = o[k];
              }
            }
          }
          for (var k2 in o) {
            if (k2 !== "en" && Object.prototype.hasOwnProperty.call(o, k2)) {
              try {
                addEn(o[k2], d + 1);
              } catch (e) {}
            }
          }
        }
        try {
          if (typeof examData !== "undefined") addEn(examData, 0);
        } catch (e) {}
        try {
          if (typeof QS !== "undefined") addEn(QS, 0);
        } catch (e) {}
        try {
          if (typeof variants !== "undefined") addEn(variants, 0);
        } catch (e) {}
        try {
          if (typeof ui !== "undefined") addEn(ui, 0);
        } catch (e) {}
        try {
          if (typeof UI !== "undefined") addEn(UI, 0);
        } catch (e) {}
        try {
          if (typeof L !== "undefined" && typeof L === "object") addEn(L, 0);
        } catch (e) {}
        try {
          if (typeof TXT !== "undefined") addEn(TXT, 0);
        } catch (e) {}
        try {
          if (typeof i18n !== "undefined") addEn(i18n, 0);
        } catch (e) {}
        try {
          if (typeof T !== "undefined" && typeof T === "object") addEn(T, 0);
        } catch (e) {}
      })();
      /* Безопасный ре-рендер после патча данных */
      (function () {
        function _rr() {
          try {
            if (typeof renderAll === "function") {
              renderAll();
              return;
            }
          } catch (e) {}
          try {
            if (typeof render === "function") {
              render();
              return;
            }
          } catch (e) {}
          try {
            if (typeof renderQuestion === "function") {
              renderQuestion();
            }
          } catch (e) {}
          try {
            if (typeof updateTexts === "function") {
              updateTexts();
            }
          } catch (e) {}
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(_rr, 0);
          });
        } else {
          setTimeout(_rr, 0);
        }
      })();
    </script>
  </body>
  <script>
    (function () {
      // Функция отправки прогресса родительскому окну
      function sendProgress() {
        if (!window.parent) return;

        // Получаем данные о прогрессе из глобальных переменных урока
        let answersCount = 0;
        let totalQuestions = 0;
        let correctCount = 0;
        let completed = false;
        let answers = {};

        // Определяем тип урока по наличию переменных
        if (typeof state !== "undefined" && state.answers) {
          // Для уроков с state.answers (Lesson-1...12, 15, 16, 17)
          const variant =
            state.variantIndex !== undefined ? state.variantIndex : 0;
          const qs =
            typeof QS !== "undefined"
              ? QS
              : typeof examData !== "undefined" && examData.variants
                ? examData.variants
                : [];
          const currentVariant = qs[variant] || qs[0];

          if (currentVariant && currentVariant.questions) {
            totalQuestions = currentVariant.questions.length;
            answers = state.answers || {};
            answersCount = Object.keys(answers).length;

            // Подсчёт правильных ответов
            for (let i = 0; i < currentVariant.questions.length; i++) {
              const q = currentVariant.questions[i];
              const key = `${currentVariant.id || "A"}-${q.id}`;
              if (answers[key] === q.correct) {
                correctCount++;
              }
            }
            completed = state.finished === true;
          }
        } else if (typeof state !== "undefined" && state.ans) {
          // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)
          const qs = typeof QS !== "undefined" ? QS : [];
          const variantQs = qs.filter((q) => q.v === state.v);
          totalQuestions = variantQs.length;
          answers = state.ans || {};
          answersCount = Object.keys(answers).length;

          for (let i = 0; i < variantQs.length; i++) {
            const q = variantQs[i];
            const userAns = answers[q.id];
            if (userAns !== undefined) {
              if (q.t === "choice") {
                if (userAns === q.ans) correctCount++;
              } else if (q.t === "open" || q.t === "match") {
                if (
                  String(userAns).trim().toLowerCase() ===
                  String(q.ans_text || "")
                    .trim()
                    .toLowerCase()
                )
                  correctCount++;
              }
            }
          }
          completed = state.finished === true;
        } else if (typeof S !== "undefined" && S.ans) {
          // Альтернативная структура (Lesson-13, 14)
          const qs = typeof QS !== "undefined" ? QS : [];
          const variantQs = qs.filter((q) => q.v === S.v);
          totalQuestions = variantQs.length;
          answers = S.ans || {};
          answersCount = Object.keys(answers).length;
          completed = S.finished === true;
        }

        if (totalQuestions === 0) return;

        window.parent.postMessage(
          {
            type: "lessonProgress",
            lessonId: parseInt(
              window.location.pathname.match(/Lesson-(\d+)/)?.[1] || "0",
            ),
            answersCount: answersCount,
            totalQuestions: totalQuestions,
            correctCount: correctCount,
            completed: completed,
            answers: answers,
          },
          "*",
        );
      }

      // Перехватываем вызовы finishExam/resetExam/showReview для отправки прогресса
      const originalFinish = window.finishExam;
      if (originalFinish) {
        window.finishExam = function (...args) {
          const result = originalFinish.apply(this, args);
          setTimeout(sendProgress, 100);
          return result;
        };
      }

      const originalReset = window.resetExam;
      if (originalReset) {
        window.resetExam = function (...args) {
          const result = originalReset.apply(this, args);
          setTimeout(sendProgress, 100);
          return result;
        };
      }

      const originalShowReview = window.showReview;
      if (originalShowReview) {
        window.showReview = function (...args) {
          const result = originalShowReview.apply(this, args);
          setTimeout(sendProgress, 100);
          return result;
        };
      }

      // Отправляем прогресс при каждом ответе (перехватываем выбор варианта)
      const originalPick = window.pick;
      if (originalPick) {
        window.pick = function (...args) {
          const result = originalPick.apply(this, args);
          setTimeout(sendProgress, 50);
          return result;
        };
      }

      const originalSaveT = window.saveT;
      if (originalSaveT) {
        window.saveT = function (...args) {
          const result = originalSaveT.apply(this, args);
          setTimeout(sendProgress, 50);
          return result;
        };
      }

      // Для уроков с toggleVariant и т.д.
      const originalRenderAll = window.renderAll;
      if (originalRenderAll) {
        window.renderAll = function (...args) {
          const result = originalRenderAll.apply(this, args);
          setTimeout(sendProgress, 50);
          return result;
        };
      }

      // Периодическая отправка прогресса (каждые 3 секунды)
      setInterval(sendProgress, 3000);

      // Запрос времени у родителя
      if (window.parent) {
        window.parent.postMessage({ type: "requestTimer" }, "*");
      }

      // Приём сообщений от родителя
      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "syncTimer") {
          if (typeof state !== "undefined" && state.timeLeft !== undefined) {
            state.timeLeft = event.data.timeLeft;
            if (typeof updateTimerDisplay === "function") updateTimerDisplay();
          } else if (typeof S !== "undefined" && S.timer !== undefined) {
            S.timer = event.data.timeLeft;
          }
        }
        if (event.data && event.data.type === "forceFinish") {
          if (typeof finishExam === "function") finishExam();
        }
        if (event.data && event.data.type === "restoreProgress") {
          // Восстановление сохранённых ответов
          const saved = event.data.progress;
          if (saved && saved.answers) {
            if (typeof state !== "undefined" && state.answers) {
              state.answers = saved.answers;
              if (typeof renderAll === "function") renderAll();
            }
          }
        }
      });

      // Отправляем прогресс при загрузке
      setTimeout(sendProgress, 500);
    })();
  </script>
