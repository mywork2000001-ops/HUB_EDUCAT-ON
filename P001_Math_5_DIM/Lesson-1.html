      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --primary: #10b981;
        --primary-hover: #059669;
        --primary-light: #d1fae5;
        --danger: #ef4444;
        --warning: #f59e0b;
        --shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --radius: 1rem;
      }
      .dark {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --primary: #34d399;
        --primary-hover: #10b981;
        --primary-light: #064e3b;
        --shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
      }
      * {
        font-family: "Inter", system-ui, sans-serif;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.3s,
          color 0.3s;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 600;
        transition: all 0.2s;
        border: none;
        cursor: pointer;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: var(--border);
        color: var(--text);
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        font-weight: 500;
        transition: all 0.2s;
        border: 1px solid var(--border);
        cursor: pointer;
      }
      .btn-secondary:hover {
        background: var(--bg);
      }
      .q-btn {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.65rem;
        font-weight: 600;
        font-size: 0.875rem;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .q-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }
      .q-btn.active {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }
      .q-btn.answered {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
      }
      .option {
        padding: 1rem;
        border: 2px solid var(--border);
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .option:hover {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .option.selected {
        border-color: var(--primary);
        background: var(--primary-light);
      }
      .option.correct {
        border-color: var(--primary);
        background: #ecfdf5;
      }
      .option.wrong {
        border-color: var(--danger);
        background: #fef2f2;
      }
      .dark .option.correct {
        background: #064e3b;
      }
      .dark .option.wrong {
        background: #450a0a;
      }
      .tab {
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: transparent;
        color: var(--muted);
      }
      .tab.active {
        background: var(--primary-light);
        color: var(--primary);
      }
      .progress-bar {
        height: 0.5rem;
        background: var(--border);
        border-radius: 9999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--primary);
        border-radius: 9999px;
        transition: width 0.5s ease;
      }
      .fade-in {
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .number-line {
        width: 100%;
        height: 80px;
      }
      @media (max-width: 640px) {
        .q-btn {
          width: 2.25rem;
          height: 2.25rem;
          font-size: 0.75rem;
        }
      }

    <script>
      const SVG_NS = "http://www.w3.org/2000/svg";
      function numberLine(min, max, step, points, labels) {
        const w = 400,
          h = 80,
          pad = 30;
        const scale = (w - 2 * pad) / (max - min);
        let s = `<svg viewBox="0 0 ${w} ${h}" class="number-line" xmlns="${SVG_NS}">`;
        s += `<line x1="${pad}" y1="${h / 2}" x2="${w - pad}" y2="${h / 2}" stroke="currentColor" stroke-width="2"/>`;
        s += `<polygon points="${w - pad},${h / 2} ${w - pad - 8},${h / 2 - 5} ${w - pad - 8},${h / 2 + 5}" fill="currentColor"/>`;
        for (let v = min; v <= max; v += step) {
          const x = pad + (v - min) * scale;
          s += `<line x1="${x}" y1="${h / 2 - 6}" x2="${x}" y2="${h / 2 + 6}" stroke="currentColor" stroke-width="2"/>`;
          s += `<text x="${x}" y="${h / 2 + 22}" text-anchor="middle" font-size="12" fill="currentColor">${v}</text>`;
        }
        points.forEach((p, i) => {
          const x = pad + (p - min) * scale;
          s += `<circle cx="${x}" cy="${h / 2}" r="5" fill="var(--primary)" stroke="white" stroke-width="2"/>`;
          s += `<text x="${x}" y="${h / 2 - 12}" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--primary)">${labels[i]}</text>`;
        });
        s += `</svg>`;
        return s;
      }

        const container = document.getElementById("questionGrid");

        variant.questions.forEach((q, i) => {
          const key = variant.id + "-" + q.id;
          const btn = document.createElement("button");
          btn.className = "q-btn";
          if (i === state.questionIndex) btn.classList.add("active");
          if (state.answers[key]) btn.classList.add("answered");
          btn.textContent = q.id;
          btn.onclick = () => {
            state.questionIndex = i;
            renderAll();
          };
          container.appendChild(btn);
        });
      }

      function renderQuestion() {
        const variant = examData.variants[state.variantIndex];
        const q = variant.questions[state.questionIndex];
        const key = variant.id + "-" + q.id;
        const saved = state.answers[key];
        const L = state.lang;

        document.getElementById("qBadge").textContent = variant.id + q.id;
        document.getElementById("qCounter").textContent =
          state.questionIndex + 1 + " / " + variant.questions.length;
        document.getElementById("qText").innerHTML = q.text[L];

        const imgDiv = document.getElementById("qImage");
        imgDiv.innerHTML = q.image || "";

        const optsDiv = document.getElementById("qOptions");
        optsDiv.innerHTML = "";
        q.options[L].forEach((opt, idx) => {
          const letter = String.fromCharCode(65 + idx);
          const div = document.createElement("div");
          div.className = "option";
          if (saved === letter) div.classList.add("selected");
          if (state.review) {
            if (letter === q.correct) div.classList.add("correct");
            else if (saved === letter) div.classList.add("wrong");
          }
          div.innerHTML = `<span class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold shrink-0" style="background: var(--primary-light); color: var(--primary);">${letter}</span><span class="text-sm">${opt}</span>`;
          if (!state.review) {
            div.onclick = () => {
              state.answers[key] = letter;
              saveState();
              renderAll();
            };

        const total = examData.variants.reduce(
          (s, v) => s + v.questions.length,
          0,

        const answered = Object.keys(state.answers).length;
        const pct = Math.round((answered / total) * 100);
        document.getElementById("answeredCount").textContent =
          answered + "/" + total;
        document.getElementById("progressPercent").textContent = pct + "%";
        document.getElementById("progressBar").style.width = pct + "%";

      function renderAll() {
        renderVariantTabs();
        renderQuestionGrid();
        renderQuestion();

      function prevQuestion() {
        if (state.questionIndex > 0) {
          state.questionIndex--;
          renderAll();
        }

      function nextQuestion() {
        const variant = examData.variants[state.variantIndex];
        if (state.questionIndex < variant.questions.length - 1) {
          state.questionIndex++;
          renderAll();
        }

      let timerInterval;
      function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (state.finished) return;
          state.timeLeft--;
          saveState();
          updateTimerDisplay();
          if (state.timeLeft <= 0) {
            finishExam();
          }
        }, 1000);
      }

      function updateTimerDisplay() {
        const m = Math.floor(state.timeLeft / 60)
          .toString()
          .padStart(2, "0");
        const s = (state.timeLeft % 60).toString().padStart(2, "0");
        const el = document.getElementById("timer");
        el.textContent = m + ":" + s;
        if (state.timeLeft < 300) el.classList.add("text-red-500");
        else el.classList.remove("text-red-500");
      }

      function finishExam() {
        state.finished = true;
        saveState();
        clearInterval(timerInterval);
        showResults();
      }

      function calculateResults() {
        let correct = 0,
          wrong = 0,
          empty = 0;
        examData.variants.forEach((v) => {
          v.questions.forEach((q) => {
            const key = v.id + "-" + q.id;
            const ans = state.answers[key];
            if (!ans) empty++;
            else if (ans === q.correct) correct++;
            else wrong++;
          });
        });
        return { correct, wrong, empty, total: correct + wrong + empty };
      }

      function showResults() {
        const r = calculateResults();
        document.getElementById("correctCount").textContent = r.correct;
        document.getElementById("wrongCount").textContent = r.wrong;

        document.getElementById("resultScoreIcon").textContent = r.correct;

        const msg =
          state.lang === "ru"

        document.getElementById("resultMessage").textContent = msg;

        document.getElementById("resultModal").classList.remove("hidden");
        document.getElementById("resultModal").classList.add("flex");

      function closeResults() {
        document.getElementById("resultModal").classList.add("hidden");

        if (state.finished && !state.review) return;

        function sendProgress() {

          let answersCount = 0;
          let totalQuestions = 0;
          let correctCount = 0;
          let completed = false;
          let answers = {};

          // Определяем тип урока по наличию переменных
          if (typeof state !== "undefined" && state.answers) {
            // Для уроков с state.answers (Lesson-1...12, 15, 16, 17)
            const variant =
              state.variantIndex !== undefined ? state.variantIndex : 0;
            const qs =
              typeof QS !== "undefined"
                ? QS
                : typeof examData !== "undefined" && examData.variants
                  ? examData.variants
                  : [];
            const currentVariant = qs[variant] || qs[0];

            if (currentVariant && currentVariant.questions) {
              totalQuestions = currentVariant.questions.length;
              answers = state.answers || {};
              answersCount = Object.keys(answers).length;

              // Подсчёт правильных ответов
              for (let i = 0; i < currentVariant.questions.length; i++) {
                const q = currentVariant.questions[i];
                const key = `${currentVariant.id || "A"}-${q.id}`;
                if (answers[key] === q.correct) {
                  correctCount++;
                }
              }
              completed = state.finished === true;
            }
          } else if (typeof state !== "undefined" && state.ans) {
            // Для Lesson-13 (Müstəvi fiqurlar) и Lesson-14 (Fəza fiqurları)
            const qs = typeof QS !== "undefined" ? QS : [];
            const variantQs = qs.filter((q) => q.v === state.v);
            totalQuestions = variantQs.length;
            answers = state.ans || {};
            answersCount = Object.keys(answers).length;

            for (let i = 0; i < variantQs.length; i++) {
              const q = variantQs[i];
              const userAns = answers[q.id];
              if (userAns !== undefined) {
                if (q.t === "choice") {
                  if (userAns === q.ans) correctCount++;
                } else if (q.t === "open" || q.t === "match") {
                  if (
                    String(userAns).trim().toLowerCase() ===
                    String(q.ans_text || "")
                      .trim()
                      .toLowerCase()
                  )
                    correctCount++;
                }
              }
            }
            completed = state.finished === true;

              correctCount: correctCount,
              completed: completed,

        if (originalReset) {
          window.resetExam = function (...args) {

            return result;
          };
        }

        // Отправляем прогресс при каждом ответе (перехватываем выбор варианта)
        const originalPick = window.pick;
        if (originalPick) {
          window.pick = function (...args) {
            const result = originalPick.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        const originalSaveT = window.saveT;
        if (originalSaveT) {
          window.saveT = function (...args) {
            const result = originalSaveT.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Для уроков с toggleVariant и т.д.
        const originalRenderAll = window.renderAll;
        if (originalRenderAll) {
          window.renderAll = function (...args) {
            const result = originalRenderAll.apply(this, args);
            setTimeout(sendProgress, 50);
            return result;
          };
        }

        // Периодическая отправка прогресса (каждые 3 секунды)
        setInterval(sendProgress, 3000);

        // Запрос времени у родителя
        if (window.parent) {
          window.parent.postMessage({ type: "requestTimer" }, "*");
        }

        // Приём сообщений от родителя
        window.addEventListener("message", function (event) {
          if (event.data && event.data.type === "syncTimer") {
            if (typeof state !== "undefined" && state.timeLeft !== undefined) {
              state.timeLeft = event.data.timeLeft;
              if (typeof updateTimerDisplay === "function")
                updateTimerDisplay();
            } else if (typeof S !== "undefined" && S.timer !== undefined) {
              S.timer = event.data.timeLeft;
            }
          }
          if (event.data && event.data.type === "forceFinish") {
            if (typeof finishExam === "function") finishExam();
          }
          if (event.data && event.data.type === "restoreProgress") {
            // Восстановление сохранённых ответов
            const saved = event.data.progress;
            if (saved && saved.answers) {
              if (typeof state !== "undefined" && state.answers) {
                state.answers = saved.answers;
                if (typeof renderAll === "function") renderAll();
              }
            }
          }
        });

        // Отправляем прогресс при загрузке
        setTimeout(sendProgress, 500);
      })();
    </script>
  </body>
</html>
