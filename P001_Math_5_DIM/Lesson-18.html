<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ədədin Kvadratı, Kubu və Dərəcəsi — DİM V sinif</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap");
      :root {
        --primary: #4f46e5;
        --pl: #818cf8;
        --secondary: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --bg: #f0f9ff;
        --card: #fff;
        --text: #0c4a6e;
        --muted: #64748b;
        --border: #bae6fd;
        --sidebar: 280px;
      }
      .dark {
        --bg: #0a1929;
        --card: #0f2744;
        --text: #e0f2fe;
        --muted: #7dd3fc;
        --border: #1e4976;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition: background 0.3s, color 0.3s;
      }
      sup { font-size: 0.72em; vertical-align: super; line-height: 0; }
      .frac { display: inline-block; text-align: center; vertical-align: middle; font-family: "JetBrains Mono", monospace; }
      .frac .num { display: block; border-bottom: 1.5px solid currentColor; padding: 0 3px; font-size: 0.85em; line-height: 1.3; }
      .frac .den { display: block; padding: 0 3px; font-size: 0.85em; line-height: 1.3; }

      /* HEADER */
      .hdr {
        position: fixed; top: 0; left: 0; right: 0; z-index: 200;
        background: rgba(240, 249, 255, 0.95);
        backdrop-filter: blur(14px);
        border-bottom: 2px solid var(--border);
        height: 58px; padding: 0 16px;
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        transition: background 0.3s;
      }
      .dark .hdr { background: rgba(10, 25, 41, 0.95); }
      .logo {
        font-size: 1rem; font-weight: 900;
        background: linear-gradient(135deg, var(--primary), var(--pl));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        white-space: nowrap;
      }
      .vtabs {
        display: flex; gap: 3px; background: var(--bg); border-radius: 10px;
        padding: 3px; flex-wrap: wrap; scrollbar-width: none;
      }
      .dark .vtabs { background: #0a1929; }
      .vtab {
        padding: 4px 10px; border-radius: 7px; border: none; cursor: pointer;
        font-family: "Nunito", sans-serif; font-weight: 800; font-size: 0.75rem;
        color: var(--muted); background: transparent; transition: all 0.2s; white-space: nowrap;
      }
      .vtab.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,.4); }
      .hdr-r { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
      .tmr-wrap { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 9px; border: 2px solid var(--border); background: var(--card); }
      .tmr-icn { font-size: 0.9rem; }
      #TMR { font-family: "JetBrains Mono", monospace; font-size: 0.85rem; font-weight: 700; color: var(--text); min-width: 42px; }
      .bicn {
        width: 34px; height: 34px; border-radius: 9px; border: 2px solid var(--border);
        background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: all 0.2s; color: var(--text); font-family: "Nunito", sans-serif; font-weight: 800; font-size: 0.75rem;
      }
      .bicn:hover { border-color: var(--primary); color: var(--primary); }
      .bfin {
        padding: 7px 14px; border-radius: 9px; border: none; background: var(--primary); color: #fff;
        font-family: "Nunito", sans-serif; font-weight: 800; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
      }
      .bfin:hover { background: #4338ca; transform: translateY(-1px); }

      /* LAYOUT */
      .layout { display: flex; padding-top: 58px; min-height: 100vh; }

      /* SIDEBAR */
      .sidebar {
        position: fixed; left: 0; top: 58px; bottom: 0; width: var(--sidebar);
        background: var(--card); border-right: 2px solid var(--border);
        overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
        scrollbar-width: thin; z-index: 100;
      }
      .sidebar::-webkit-scrollbar { width: 4px; }
      .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
      .scard { background: var(--bg); border-radius: 12px; border: 2px solid var(--border); padding: 11px 12px; display: flex; align-items: center; gap: 9px; }
      .dark .scard { background: #071525; }
      .sicn { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .sicn.b { background: #eff6ff; color: #3b82f6; }
      .dark .sicn.b { background: #1e3a8a; color: #93c5fd; }
      .sicn.g { background: #ecfdf5; color: var(--secondary); }
      .dark .sicn.g { background: #064e3b; color: #6ee7b7; }
      .sicn.y { background: #fffbeb; color: var(--warning); }
      .dark .sicn.y { background: #78350f; color: #fcd34d; }
      .slbl { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
      .sval { font-size: 1.1rem; font-weight: 900; color: var(--text); font-family: "JetBrains Mono", monospace; }
      .pbar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 6px; }
      .pfil { height: 100%; background: linear-gradient(90deg, var(--primary), var(--pl)); border-radius: 99px; transition: width 0.4s; }
      .qlabel { font-size: 0.65rem; font-weight: 800; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px; }
      .qnav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
      .qnb { width: 100%; aspect-ratio: 1; border-radius: 7px; border: 2px solid var(--border); background: var(--card); font-weight: 800; font-size: 0.72rem; cursor: pointer; color: var(--text); transition: all 0.18s; font-family: "Nunito", sans-serif; display: flex; align-items: center; justify-content: center; }
      .qnb.done { background: rgba(79,70,229,.15); border-color: var(--primary); color: var(--primary); }
      .qnb.active { background: var(--primary); border-color: var(--primary); color: #fff; transform: scale(1.05); box-shadow: 0 2px 8px rgba(79,70,229,.4); }
      .qnb:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

      /* MAIN */
      .main { margin-left: var(--sidebar); flex: 1; padding: 20px 24px 60px; min-width: 0; }
      .banner {
        background: linear-gradient(135deg, #7c3aed, #4338ca);
        border-radius: 16px; padding: 18px 22px; margin-bottom: 20px; color: #fff;
        display: flex; align-items: center; gap: 14px;
      }
      .banner-icon { font-size: 2rem; }
      .banner-title { font-size: 1.1rem; font-weight: 900; }
      .banner-sub { font-size: 0.78rem; opacity: 0.85; margin-top: 2px; font-weight: 700; }

      /* QUESTION CARD */
      @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      .qcard { background: var(--card); border-radius: 16px; border: 2px solid var(--border); padding: 24px; animation: cardIn 0.25s ease both; min-height: 300px; }
      .qhdr { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
      .qnum { background: var(--primary); color: #fff; font-weight: 900; font-size: 0.73rem; padding: 4px 11px; border-radius: 20px; letter-spacing: 0.04em; }
      .qtbadge { background: var(--bg); color: var(--muted); font-weight: 800; font-size: 0.63rem; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; border: 1.5px solid var(--border); }
      .qnav-btn { padding: 4px 10px; border-radius: 7px; border: 2px solid var(--border); background: var(--card); color: var(--text); font-family: "Nunito", sans-serif; font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
      .qnav-btn:hover { border-color: var(--primary); color: var(--primary); }
      .qtxt { font-size: 0.98rem; font-weight: 700; line-height: 1.8; margin-bottom: 16px; color: var(--text); }
      .qshape { text-align: center; margin: 8px 0 14px; opacity: 0.9; }
      .ogrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      @media (max-width: 560px) { .ogrid { grid-template-columns: 1fr; } }
      .obtn { text-align: left; padding: 11px 14px; border-radius: 11px; border: 2px solid var(--border); background: var(--card); color: var(--text); font-family: "Nunito", sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s; line-height: 1.5; }
      .obtn:hover { border-color: var(--primary); background: rgba(79,70,229,.05); }
      .obtn.sel { border-color: var(--primary); background: rgba(79,70,229,.12); color: var(--primary); }
      .hbtn { margin-top: 10px; padding: 5px 12px; border-radius: 8px; border: 2px solid var(--warning); background: transparent; color: var(--warning); font-family: "Nunito", sans-serif; font-weight: 800; font-size: 0.74rem; cursor: pointer; transition: all 0.2s; }
      .hbtn:hover { background: var(--warning); color: #fff; }
      .hint { display: none; margin-top: 8px; padding: 9px 12px; border-radius: 9px; background: rgba(245,158,11,.08); border: 2px solid rgba(245,158,11,.25); font-size: 0.8rem; font-weight: 700; color: var(--warning); line-height: 1.6; }
      .hint.show { display: block; }
      .qprog { display: flex; align-items: center; gap: 10px; margin-top: 18px; padding-top: 14px; border-top: 2px solid var(--border); }
      .qprog span { font-size: 0.7rem; font-weight: 800; color: var(--muted); white-space: nowrap; }
      .qpbar { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
      .qpfil { height: 100%; background: linear-gradient(90deg, var(--primary), var(--pl)); border-radius: 99px; transition: width 0.4s; }

      /* RESULT MODAL */
      .mover { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 18px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
      .mover.show { opacity: 1; pointer-events: all; }
      .modal { background: var(--card); border-radius: 20px; max-width: 440px; width: 100%; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.3); transform: scale(0.9); transition: transform 0.3s; }
      .mover.show .modal { transform: scale(1); }
      .mhdr { background: linear-gradient(135deg, #7c3aed, var(--pl)); padding: 28px; text-align: center; }
      .mscore { font-size: 3rem; font-weight: 900; color: #fff; }
      .msub { font-size: 0.88rem; color: rgba(255,255,255,.85); font-weight: 700; margin-top: 3px; }
      .mbody { padding: 22px; }
      .rgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; }
      .rbox { padding: 13px; border-radius: 12px; text-align: center; border: 2px solid var(--border); }
      .rbox-num { font-size: 1.6rem; font-weight: 900; font-family: "JetBrains Mono", monospace; }
      .rbox-lbl { font-size: 0.67rem; font-weight: 800; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
      .rbox.ok .rbox-num { color: var(--secondary); }
      .rbox.wr .rbox-num { color: var(--danger); }
      .rbox.bl .rbox-num { color: var(--muted); }
      .rbox.tm .rbox-num { color: var(--primary); }
      .mbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
      .mbtn { padding: 11px; border-radius: 11px; border: none; font-family: "Nunito", sans-serif; font-weight: 800; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
      .mbtn.p { background: var(--primary); color: #fff; }
      .mbtn.p:hover { background: #4338ca; }
      .mbtn.s { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
      .mbtn.s:hover { border-color: var(--primary); color: var(--primary); }

      /* MOBILE */
      @media (max-width: 768px) {
        :root { --sidebar: 0px; }
        .sidebar { display: none; }
        .main { margin-left: 0; padding: 14px 12px 60px; }
        .mob-nav { display: flex !important; }
      }
      .mob-nav { display: none; overflow-x: auto; background: var(--card); border-bottom: 2px solid var(--border); padding: 8px 12px; gap: 4px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 150; scrollbar-width: none; }
      .mob-nav::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div class="hdr">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <div class="logo">📙 DİM V</div>
        <div class="vtabs" id="VT"></div>
      </div>
      <div class="hdr-r">
        <div class="tmr-wrap">
          <span class="tmr-icn">⏱</span>
          <span id="TMR">45:00</span>
        </div>
        <button class="bicn" id="LANGBTN" onclick="toggleLang()">RU</button>
        <button class="bicn" id="DB" onclick="toggleDark()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="bfin" onclick="showRes()">✓</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <div class="scard">
          <div class="sicn b">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </div>
          <div><div class="slbl" id="SLBL_DONE">Tamamlandı</div><div class="sval" id="PRG">0/20</div></div>
        </div>
        <div class="scard">
          <div class="sicn g">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div><div class="slbl" id="SLBL_TIME">Vaxt</div><div class="sval" id="TMR2">45:00</div></div>
        </div>
        <div class="scard">
          <div class="sicn y">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </div>
          <div><div class="slbl" id="SLBL_VAR">Variant</div><div class="sval" id="VAR">A</div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div class="slbl" id="SLBL_PRG">İrəliləyiş</div>
            <div style="font-size:0.72rem;font-weight:800;color:var(--primary)" id="PCT">0%</div>
          </div>
          <div class="pbar"><div class="pfil" id="PFI" style="width:0%"></div></div>
        </div>
        <div>
          <div class="qlabel">Suallar</div>
          <div class="qnav" id="QN"></div>
        </div>
      </div>

      <div class="main">
        <div class="banner">
          <div class="banner-icon">🔢</div>
          <div>
            <div class="banner-title" id="BANNER_TITLE">Ədədin Kvadratı, Kubu və Dərəcəsi</div>
            <div class="banner-sub" id="BANNER_SUB">Riyaziyyat · V sinif · DİM · Bölmə 1.5 · ⏱ 45 dəqiqə</div>
          </div>
        </div>
        <div class="qcard" id="QAREA"></div>
      </div>
    </div>

    <div class="mob-nav" id="MOB_NAV"></div>

    <div class="mover" id="MO">
      <div class="modal">
        <div class="mhdr">
          <div class="mscore" id="RSC">-</div>
          <div class="msub" id="RSB"></div>
        </div>
        <div class="mbody">
          <div class="rgrid">
            <div class="rbox ok"><div class="rbox-num" id="RCO">-</div><div class="rbox-lbl" id="RLBL_CO">Doğru</div></div>
            <div class="rbox wr"><div class="rbox-num" id="RWR">-</div><div class="rbox-lbl" id="RLBL_WR">Səhv</div></div>
            <div class="rbox bl"><div class="rbox-num" id="RBL">-</div><div class="rbox-lbl" id="RLBL_BL">Boş</div></div>
            <div class="rbox tm"><div class="rbox-num" id="RTM">-</div><div class="rbox-lbl" id="RLBL_TM">Vaxt</div></div>
          </div>
          <div class="mbtns">
            <button class="mbtn p" id="RBTN_RESTART" onclick="restart()">🔄 Yenidən başla</button>
            <button class="mbtn s" id="RBTN_CLOSE" onclick="document.getElementById('MO').classList.remove('show')">Bağla</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ══════════════════ QUESTION DATA ══════════════════ */
      const QS = [
        /* ══ VARIANT A ══ */
        {
          id:"A1", v:"A", t:"choice",
          az:`3<sup>4</sup>-ün qiymətini tapın.`,
          ru:`Найдите значение 3<sup>4</sup>.`,
          en:`Find the value of 3<sup>4</sup>.`,
          opts:["A) 12","B) 27","C) 81","D) 64","E) 36"],
          opts_ru:["A) 12","B) 27","C) 81","D) 64","E) 36"],
          opts_en:["A) 12","B) 27","C) 81","D) 64","E) 36"],
          ans:2,
          hint:{az:"3<sup>4</sup> = 3·3·3·3 = 9·9 = 81.", ru:"3<sup>4</sup> = 3·3·3·3 = 81.", en:"3<sup>4</sup> = 3·3·3·3 = 81."},
        },
        {
          id:"A2", v:"A", t:"choice",
          az:`5<sup>2</sup> + 2<sup>3</sup> ifadəsini hesablayın.`,
          ru:`Вычислите 5<sup>2</sup> + 2<sup>3</sup>.`,
          en:`Calculate 5<sup>2</sup> + 2<sup>3</sup>.`,
          opts:["A) 30","B) 35","C) 33","D) 26","E) 28"],
          opts_ru:["A) 30","B) 35","C) 33","D) 26","E) 28"],
          opts_en:["A) 30","B) 35","C) 33","D) 26","E) 28"],
          ans:2,
          hint:{az:"5² = 25, 2³ = 8 → 25 + 8 = 33.", ru:"5² = 25, 2³ = 8 → 25 + 8 = 33.", en:"5² = 25, 2³ = 8 → 25 + 8 = 33."},
        },
        {
          id:"A3", v:"A", t:"choice",
          az:`2<sup>5</sup> − 3<sup>2</sup> · 2 ifadəsini hesablayın.`,
          ru:`Вычислите 2<sup>5</sup> − 3<sup>2</sup> · 2.`,
          en:`Calculate 2<sup>5</sup> − 3<sup>2</sup> · 2.`,
          opts:["A) 14","B) 46","C) 32","D) 6","E) 50"],
          opts_ru:["A) 14","B) 46","C) 32","D) 6","E) 50"],
          opts_en:["A) 14","B) 46","C) 32","D) 6","E) 50"],
          ans:0,
          hint:{az:"2⁵ = 32, 3² = 9 → 9·2 = 18 → 32 − 18 = 14.", ru:"2⁵ = 32, 3² = 9 → 9·2 = 18 → 32 − 18 = 14.", en:"2⁵ = 32, 3² = 9 → 9·2 = 18 → 32 − 18 = 14."},
        },
        {
          id:"A4", v:"A", t:"choice",
          az:`Tərəfi 6 sm olan kvadratın sahəsini hesablayın.`,
          ru:`Найдите площадь квадрата со стороной 6 см.`,
          en:`Find the area of a square with side 6 cm.`,
          opts:["A) 24 sm²","B) 30 sm²","C) 12 sm²","D) 36 sm²","E) 42 sm²"],
          opts_ru:["A) 24 см²","B) 30 см²","C) 12 см²","D) 36 см²","E) 42 см²"],
          opts_en:["A) 24 cm²","B) 30 cm²","C) 12 cm²","D) 36 cm²","E) 42 cm²"],
          ans:3,
          hint:{az:"S = a² = 6² = 36 sm².", ru:"S = a² = 6² = 36 см².", en:"S = a² = 6² = 36 cm²."},
        },
        {
          id:"A5", v:"A", t:"choice",
          az:`4<sup>3</sup> : 2<sup>4</sup> ifadəsini hesablayın.`,
          ru:`Вычислите 4<sup>3</sup> : 2<sup>4</sup>.`,
          en:`Calculate 4<sup>3</sup> : 2<sup>4</sup>.`,
          opts:["A) 2","B) 4","C) 8","D) 16","E) 32"],
          opts_ru:["A) 2","B) 4","C) 8","D) 16","E) 32"],
          opts_en:["A) 2","B) 4","C) 8","D) 16","E) 32"],
          ans:1,
          hint:{az:"4³ = 64, 2⁴ = 16 → 64 ÷ 16 = 4.", ru:"4³ = 64, 2⁴ = 16 → 64 ÷ 16 = 4.", en:"4³ = 64, 2⁴ = 16 → 64 ÷ 16 = 4."},
        },
        {
          id:"A6", v:"A", t:"choice",
          az:`<i>a</i> = 5 olduqda <i>a</i><sup>2</sup> − 3<i>a</i> ifadəsinin qiymətini tapın.`,
          ru:`При a = 5 найдите значение выражения a<sup>2</sup> − 3a.`,
          en:`If a = 5, find the value of a<sup>2</sup> − 3a.`,
          opts:["A) 10","B) 22","C) 15","D) 20","E) 30"],
          opts_ru:["A) 10","B) 22","C) 15","D) 20","E) 30"],

          hint:{az:"x·x = 6·x → x = 6.", ru:"x·x = 6·x → x = 6.", en:"x·x = 6·x → x = 6."},
        },
        {
          id:"B18", v:"B", t:"choice",
          az:`3<sup>3</sup> · 2<sup>2</sup> ifadəsini hesablayın.`,
          ru:`Вычислите 3<sup>3</sup> · 2<sup>2</sup>.`,
          en:`Calculate 3<sup>3</sup> · 2<sup>2</sup>.`,
          opts:["A) 72","B) 54","C) 108","D) 36","E) 96"],
          opts_ru:["A) 72","B) 54","C) 108","D) 36","E) 96"],
          opts_en:["A) 72","B) 54","C) 108","D) 36","E) 96"],
          ans:2,
          hint:{az:"3³ = 27, 2² = 4 → 27·4 = 108.", ru:"27·4 = 108.", en:"27·4 = 108."},
        },
        {
          id:"B19", v:"B", t:"choice",
          az:`Sahəsi 49 sm² olan kvadratın tərəfini tapın.`,
          ru:`Найдите сторону квадрата с площадью 49 см².`,
          en:`Find the side of a square with area 49 cm².`,
          opts:["A) 6 sm","B) 7 sm","C) 8 sm","D) 9 sm","E) 5 sm"],
          opts_ru:["A) 6 см","B) 7 см","C) 8 см","D) 9 см","E) 5 см"],
          opts_en:["A) 6 cm","B) 7 cm","C) 8 cm","D) 9 cm","E) 5 cm"],
          ans:1,
          hint:{az:"a² = 49 → a = 7 sm.", ru:"a² = 49 → a = 7 см.", en:"a² = 49 → a = 7 cm."},
        },
        {
          id:"B20", v:"B", t:"choice",
          az:`3<sup>3</sup> − 3<sup>2</sup> ifadəsini hesablayın.`,
          ru:`Вычислите 3<sup>3</sup> − 3<sup>2</sup>.`,
          en:`Calculate 3<sup>3</sup> − 3<sup>2</sup>.`,
          opts:["A) 0","B) 9","C) 18","D) 27","E) 6"],
          opts_ru:["A) 0","B) 9","C) 18","D) 27","E) 6"],
          opts_en:["A) 0","B) 9","C) 18","D) 27","E) 6"],
          ans:2,
          hint:{az:"3³ = 27, 3² = 9 → 27 − 9 = 18.", ru:"27 − 9 = 18.", en:"27 − 9 = 18."},
        },
      ];

      /* ══════════════════ SVG SHAPES ══════════════════ */
      const SHAPES = {
        square_area: `<svg viewBox="0 0 160 130" width="140" height="115" style="display:block;margin:8px auto">
  <rect x="20" y="15" width="120" height="100" fill="rgba(79,70,229,.1)" stroke="#4f46e5" stroke-width="2"/>
  <text x="80" y="12" text-anchor="middle" font-size="13" fill="#4f46e5" font-weight="bold">a</text>
  <text x="8" y="70" text-anchor="middle" font-size="13" fill="#4f46e5" font-weight="bold">a</text>
  <text x="80" y="72" text-anchor="middle" font-size="14" fill="#7c3aed" font-weight="900">S = a²</text>
</svg>`,
        cube_vol: `<svg viewBox="0 0 150 130" width="130" height="115" style="display:block;margin:8px auto">
  <rect x="15" y="35" width="85" height="85" fill="rgba(16,185,129,.1)" stroke="#10b981" stroke-width="2"/>
  <polygon points="15,35 45,10 130,10 100,35" fill="rgba(16,185,129,.07)" stroke="#10b981" stroke-width="2"/>
  <polygon points="100,35 130,10 130,95 100,120" fill="rgba(16,185,129,.14)" stroke="#10b981" stroke-width="2"/>
  <text x="57" y="82" text-anchor="middle" font-size="13" fill="#10b981" font-weight="900">V = a³</text>
  <text x="57" y="30" text-anchor="middle" font-size="11" fill="#10b981">a</text>
  <text x="3" y="80" font-size="11" fill="#10b981">a</text>
  <text x="118" y="70" font-size="11" fill="#10b981">a</text>
</svg>`,
      };

      const QSHAPE = {
        A4: "square_area",
        A11: "cube_vol",
        A19: "square_area",
        B4: "square_area",
        B11: "cube_vol",
        B19: "square_area",
      };

      /* ══════════════════ I18N ══════════════════ */
      const T = {
        az: {
          title:"Test", timer:"Vaxt", done:"Tamamlandı", variant:"Variant", progress:"İrəliləyiş",
          check:"✓ Yoxla", restart:"🔄 Yenidən başla", close:"Bağla",
          correct:"Doğru", wrong:"Səhv", blank:"Boş", time:"Vaxt",
          hint:"💡 İpucu", writeAns:"CAVABINIZI YAZIN:", placeholder:"cavab...",
          openPlaceholder:"Cavabınızı yazın...", timeUp:"⏰ Vaxt bitdi!",
          badge_choice:"Test", badge_match:"Uyğunluq", badge_open:"Açıq",
          question:"SUAL", score:"doğru", variantLabel:"Variant", timerWarning:"Vaxt az qalır!",
          bannerTitle:"Ədədin Kvadratı, Kubu və Dərəcəsi",
          bannerSub:"Riyaziyyat · V sinif · DİM · Bölmə 1.5 · ⏱ 45 dəqiqə",
        },
        ru: {
          title:"Тест", timer:"Время", done:"Выполнено", variant:"Вариант", progress:"Прогресс",
          check:"✓ Проверить", restart:"🔄 Начать снова", close:"Закрыть",
          correct:"Правильно", wrong:"Неверно", blank:"Пропущено", time:"Время",
          hint:"💡 Подсказка", writeAns:"НАПИШИТЕ ОТВЕТ:", placeholder:"ответ...",
          openPlaceholder:"Введите ответ...", timeUp:"⏰ Время вышло!",
          badge_choice:"Тест", badge_match:"Соответствие", badge_open:"Открытый",
          question:"ВОПРОС", score:"правильно", variantLabel:"Вариант", timerWarning:"Мало времени!",
          bannerTitle:"Квадрат, куб и степень числа",
          bannerSub:"Математика · V класс · ДИМ · Раздел 1.5 · ⏱ 45 минут",
        },
        en: {
          title:"Test", timer:"Time", done:"Done", variant:"Variant", progress:"Progress",
          check:"✓ Check", restart:"🔄 Restart", close:"Close",
          correct:"Correct", wrong:"Wrong", blank:"Blank", time:"Time",
          hint:"💡 Hint", writeAns:"WRITE ANSWER:", placeholder:"answer...",
          openPlaceholder:"Enter your answer...", timeUp:"⏰ Time is up!",
          badge_choice:"Test", badge_match:"Matching", badge_open:"Open",
          question:"QUESTION", score:"correct", variantLabel:"Variant", timerWarning:"Time is running out!",
          bannerTitle:"Squares, Cubes and Powers of Numbers",
          bannerSub:"Mathematics · Grade 5 · DİM · Section 1.5 · ⏱ 45 minutes",
        },
      };

      /* ══════════════════ STATE ══════════════════ */
      const TIMER_TOTAL = 2700;
      let S = { v:"A", dark:false, timerLeft:TIMER_TOTAL, tid:null, ans:{}, lang:"az", activeQ:null };
      const VARS = ["A","B"];

      window.addEventListener("DOMContentLoaded", () => {
        buildTabs();
        renderSidebar();
        showQ(0);
        S.tid = setInterval(tick, 1000);
      });

      function tick() {
        if (S.timerLeft <= 0) {
          clearInterval(S.tid);
          document.getElementById("TMR").textContent = "00:00";
          document.getElementById("TMR").style.color = "var(--danger)";
          showRes(); return;
        }
        S.timerLeft--;
        const m = String(Math.floor(S.timerLeft/60)).padStart(2,"0");
        const sc = String(S.timerLeft%60).padStart(2,"0");
        const txt = m+":"+sc;
        document.getElementById("TMR").textContent = txt;
        const t2 = document.getElementById("TMR2"); if(t2) t2.textContent = txt;
        if(S.timerLeft<=300) document.getElementById("TMR").style.color="var(--danger)";
        else if(S.timerLeft<=600) document.getElementById("TMR").style.color="var(--warning)";
      }

      function buildTabs() {
        const L = T[S.lang];
        ["VT","VM"].forEach(id => {
          const el = document.getElementById(id); if(!el) return;
          el.innerHTML = "";
          VARS.forEach(v => {
            const b = document.createElement("button");
            b.className = "vtab"+(S.v===v?" active":"");
            b.textContent = L.variantLabel+" "+v;
            b.onclick = () => { S.v=v; S.ans={}; S.activeQ=null; buildTabs(); renderSidebar(); showQ(0); };
            el.appendChild(b);
          });
        });
        const bt = document.getElementById("BANNER_TITLE");
        const bs = document.getElementById("BANNER_SUB");
        if(bt) bt.textContent = T[S.lang].bannerTitle;
        if(bs) bs.textContent = T[S.lang].bannerSub;
      }

      function getQs() { return QS.filter(q=>q.v===S.v); }

      function renderSidebar() {
        const qs = getQs(), L = T[S.lang];
        const done = qs.filter(q=>S.ans[q.id]!==undefined).length;
        document.getElementById("PRG").textContent = done+"/"+qs.length;
        const pct = qs.length ? Math.round((done/qs.length)*100) : 0;
        document.getElementById("PCT").textContent = pct+"%";
        document.getElementById("PFI").style.width = pct+"%";
        document.getElementById("SLBL_DONE").textContent = L.done;
        document.getElementById("SLBL_TIME").textContent = L.timer;
        document.getElementById("SLBL_VAR").textContent = L.variant;
        document.getElementById("SLBL_PRG").textContent = L.progress;
        document.getElementById("VAR").textContent = S.v;
        const nav = document.getElementById("QN"); nav.innerHTML = "";
        qs.forEach((q,i) => {
          const b = document.createElement("button");
          const isActive = S.activeQ===i;
          const isDone = S.ans[q.id]!==undefined;
          b.className = "qnb"+(isDone?" done":"")+(isActive?" active":"");
          b.textContent = i+1;
          b.onclick = ()=>showQ(i);
          nav.appendChild(b);
        });
      }

      function showQ(idx) {
        const qs = getQs(), L = T[S.lang];
        if(idx<0||idx>=qs.length) return;
        S.activeQ = idx;
        const q = qs[idx];
        document.querySelectorAll(".qnb").forEach((b,i)=>b.classList.toggle("active",i===idx));
        const area = document.getElementById("QAREA");
        const badge = q.t==="choice" ? L.badge_choice : q.t==="match" ? L.badge_match : L.badge_open;
        const qtext = q[S.lang]||q.en||q.az;
        const shapeHTML = QSHAPE[q.id] ? `<div class="qshape">${SHAPES[QSHAPE[q.id]]||""}</div>` : "";
        let h = `<div class="qhdr">
  <span class="qnum">${L.question} ${idx+1}</span>
  <span class="qtbadge">${badge}</span>
  <div style="margin-left:auto;display:flex;gap:6px">
    ${idx>0?`<button class="qnav-btn" onclick="showQ(${idx-1})">←</button>`:""}
    ${idx<qs.length-1?`<button class="qnav-btn" onclick="showQ(${idx+1})">→</button>`:""}
  </div>
</div>
<div class="qtxt">${qtext}</div>
${shapeHTML}`;
        if(q.t==="choice") {
          h += `<div class="ogrid">`;
          const optTexts = q["opts_"+S.lang]||q.opts_en||q.opts;
          optTexts.forEach((o,oi)=>{
            h += `<button class="obtn${S.ans[q.id]===oi?" sel":""}" onclick="pick('${q.id}',${oi},this)">${o}</button>`;
          });
          h += `</div>`;
        }
        if(q.hint) {
          const htext = q.hint[S.lang]||q.hint.ru||q.hint.az;
          const hv = S.hint && S.hint[q.id];
          h += `<button class="hbtn" onclick="tHint('${q.id}')">${L.hint}</button>
<div class="hint${hv?" show":""}" id="HH${q.id}">💡 ${htext}</div>`;
        }
        h += `<div class="qprog"><span>${idx+1} / ${qs.length}</span>
  <div class="qpbar"><div class="qpfil" style="width:${Math.round(((idx+1)/qs.length)*100)}%"></div></div>
</div>`;
        area.innerHTML = h;
        area.style.animation = "none"; area.offsetHeight; area.style.animation = "cardIn .25s ease both";
      }

      function pick(id,oi,btn) {
        S.ans[id] = oi;
        btn.closest(".ogrid").querySelectorAll(".obtn").forEach((b,i)=>{b.className="obtn"+(i===oi?" sel":"");});
        renderSidebar();
        setTimeout(()=>{ const qs=getQs(); const idx=qs.findIndex(q=>q.id===id); if(idx<qs.length-1) showQ(idx+1); }, 400);
      }

      function saveT(id,v) {
        if(v.trim()) S.ans[id]=v.trim(); else delete S.ans[id];
        renderSidebar();
      }

      function tHint(id) {
        if(!S.hint) S.hint={};
        S.hint[id] = !S.hint[id];
        const el = document.getElementById("HH"+id);
        if(el) el.className = "hint"+(S.hint[id]?" show":"");
      }

      function toggleDark() {
        S.dark = !S.dark;
        document.documentElement.classList.toggle("dark", S.dark);
        const DB = document.getElementById("DB");
        DB.innerHTML = S.dark
          ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`
          : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
      }

      function toggleLang() {
        const _lg=["az","ru","en"]; S.lang=_lg[(_lg.indexOf(S.lang)+1)%3];
        document.getElementById("LANGBTN").textContent={az:"RU",ru:"EN",en:"AZ"}[S.lang];
        buildTabs(); renderSidebar(); if(S.activeQ!==null) showQ(S.activeQ);
      }

      function showRes() {
        const qs=getQs(), L=T[S.lang];
        let ok=0,wr=0,bl=0;
        qs.forEach(q=>{ const a=S.ans[q.id]; if(a===undefined){bl++;return;} a===q.ans?ok++:wr++; });
        const total=qs.length, pct=Math.round((ok/total)*100);
        const elapsed=TIMER_TOTAL-S.timerLeft, em=Math.floor(elapsed/60), es=elapsed%60;
        document.getElementById("RSC").textContent=pct+"%";
        document.getElementById("RSB").textContent=ok+"/"+total+" "+L.score+" — "+L.variantLabel+" "+S.v;
        document.getElementById("RCO").textContent=ok;
        document.getElementById("RWR").textContent=wr;
        document.getElementById("RBL").textContent=bl;
        document.getElementById("RTM").textContent=em+":"+String(es).padStart(2,"0");
        document.getElementById("RBTN_RESTART").textContent=L.restart;
        document.getElementById("RBTN_CLOSE").textContent=L.close;
        document.getElementById("RLBL_CO").textContent=L.correct;
        document.getElementById("RLBL_WR").textContent=L.wrong;
        document.getElementById("RLBL_BL").textContent=L.blank;
        document.getElementById("RLBL_TM").textContent=L.time;
        document.getElementById("MO").classList.add("show");
      }

      function restart() {
        S.ans={}; S.hint={}; S.timerLeft=TIMER_TOTAL; S.activeQ=null;
        clearInterval(S.tid); S.tid=setInterval(tick,1000);
        document.getElementById("TMR").style.color="";
        document.getElementById("MO").classList.remove("show");
        renderSidebar(); showQ(0);
      }

      /* ══ progress bridge (parent hub compatibility) ══ */
      (function(){
        function sendProgress(){
          if(!window.parent) return;
          const qs=QS.filter(q=>q.v===S.v), total=qs.length;
          if(!total) return;
          let ok=0; qs.forEach(q=>{ if(S.ans[q.id]===q.ans) ok++; });
          window.parent.postMessage({
            type:"lessonProgress",
            lessonId:18,
            answersCount:Object.keys(S.ans).length,
            totalQuestions:total,
            correctCount:ok,
            completed:false,
            answers:S.ans
          },"*");
        }
        const _pick=window.pick;
        window.pick=function(){const r=_pick.apply(this,arguments);setTimeout(sendProgress,50);return r;};
        setInterval(sendProgress,3000);
        window.addEventListener("message",function(e){
          if(e.data&&e.data.type==="forceFinish") showRes();
        });
        setTimeout(sendProgress,500);
      })();
    </script>
  </body>
</html>
